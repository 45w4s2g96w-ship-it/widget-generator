<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>C:// SETTINGS</title>
  <style>
    @font-face {
      font-family: 'ChosunGu';
      src: url('../shared/fonts/ChosunGu.TTF') format('truetype');
      font-display: swap;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #e8e8e6;
      font-family: 'ChosunGu', sans-serif;
      display: flex;
      justify-content: center;
      padding: 24px 16px 48px;
      min-height: 100vh;
    }
    .window {
      width: 100%;
      max-width: 500px;
      background: #fff;
      border: 1.5px solid #111;
      box-shadow: 4px 4px 0 #111;
    }
    .titlebar {
      background: #1a1a1a;
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      padding: 6px 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      letter-spacing: 0.3px;
      user-select: none;
    }
    /* tabs */
    .tabs {
      display: flex;
      border-bottom: 1.5px solid #111;
      background: #ebebea;
    }
    .tab-btn {
      font-family: 'ChosunGu', sans-serif;
      font-size: 11.5px;
      padding: 7px 18px;
      border: none;
      border-right: 1px solid #ccc;
      background: transparent;
      cursor: pointer;
      color: #555;
    }
    .tab-btn.active {
      background: #fff;
      color: #111;
      font-weight: 700;
      border-bottom: 2px solid #fff;
      margin-bottom: -1.5px;
    }
    .tab-pane { display: none; padding: 18px 16px 20px; }
    .tab-pane.active { display: block; }

    h3 {
      font-size: 11px;
      color: #888;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      margin: 0 0 12px;
      padding-bottom: 5px;
      border-bottom: 1px solid #e8e8e8;
    }
    .section { margin-bottom: 22px; }

    /* color rows */
    .color-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 9px;
    }
    .color-row .c-label {
      font-size: 11.5px;
      width: 72px;
      flex-shrink: 0;
      color: #333;
    }
    .color-row input[type=color] {
      width: 30px; height: 30px;
      border: 1.5px solid #111;
      padding: 1px;
      cursor: pointer;
      background: none;
      flex-shrink: 0;
    }
    .hex-input {
      font-family: 'ChosunGu', monospace;
      font-size: 11px;
      border: 1px solid #ccc;
      padding: 4px 7px;
      width: 86px;
      color: #111;
      outline: none;
    }
    .hex-input:focus { border-color: #9b8fc7; }

    /* preview */
    .preview-wrap {
      margin-top: 14px;
      padding: 12px;
      background: #f4f4f2;
      border: 1px solid #ddd;
    }
    .preview-label { font-size: 10px; color: #999; margin-bottom: 8px; }
    .preview-win {
      max-width: 190px;
      border: 1.5px solid var(--p-ink, #111);
      box-shadow: 3px 3px 0 var(--p-ink, #111);
    }
    .preview-tb {
      background: var(--p-win, #1a1a1a);
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      padding: 5px 8px;
      display: flex;
      justify-content: space-between;
    }
    .preview-body {
      background: var(--p-bg, #fff);
      color: var(--p-ink, #111);
      padding: 10px 10px 8px;
      font-size: 10.5px;
      line-height: 1.6;
    }
    .preview-btn {
      display: inline-block;
      background: var(--p-accent, #9b8fc7);
      color: #fff;
      font-size: 9.5px;
      padding: 3px 10px;
      margin-top: 5px;
      border: none;
    }

    /* suggest */
    .suggest-grid {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
    }
    .suggest-card {
      flex: 1;
      min-width: 130px;
      border: 1.5px solid #ddd;
      padding: 10px;
      cursor: pointer;
      background: #fafafa;
      transition: border-color 0.1s;
    }
    .suggest-card:hover { border-color: #9b8fc7; }
    .suggest-card.selected { border-color: #9b8fc7; background: #f5f0ff; }
    .swatch-row { display: flex; gap: 4px; margin-bottom: 6px; }
    .swatch {
      width: 20px; height: 20px;
      border: 1px solid rgba(0,0,0,0.12);
    }
    .suggest-name { font-size: 10.5px; color: #444; }

    /* sliders */
    .slider-row { margin-bottom: 14px; }
    .slider-row .s-label {
      font-size: 11.5px;
      display: flex;
      justify-content: space-between;
      margin-bottom: 5px;
      color: #333;
    }
    .slider-row .s-label span { color: #9b8fc7; font-weight: 700; }
    input[type=range] { width: 100%; accent-color: #9b8fc7; }

    /* folder editor */
    .folder-item-wrap { margin-bottom: 6px; }
    .folder-item {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 8px;
      border: 1px solid #ddd;
      background: #fafafa;
    }
    .folder-item input[type=color] {
      width: 26px; height: 26px;
      border: 1px solid #111;
      padding: 1px;
      cursor: pointer;
      flex-shrink: 0;
    }
    .fi-name {
      font-family: 'ChosunGu', sans-serif;
      font-size: 11.5px;
      border: 1px solid #ccc;
      padding: 4px 6px;
      flex: 1;
      min-width: 0;
      outline: none;
    }
    .fi-name:focus { border-color: #9b8fc7; }
    .fi-type {
      font-family: 'ChosunGu', sans-serif;
      font-size: 11px;
      border: 1px solid #ccc;
      padding: 4px 5px;
      background: #fff;
      cursor: pointer;
    }
    .icon-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 13px;
      color: #999;
      padding: 2px 3px;
      flex-shrink: 0;
      line-height: 1;
    }
    .icon-btn:hover { color: #333; }
    .folder-extra {
      padding: 6px 8px;
      border: 1px solid #ddd;
      border-top: none;
      background: #f4f4f4;
    }
    .folder-extra label { font-size: 10px; color: #888; display: block; margin-bottom: 3px; }
    .fi-url {
      font-family: 'ChosunGu', monospace;
      font-size: 10.5px;
      border: 1px solid #ccc;
      padding: 4px 7px;
      width: 100%;
      outline: none;
    }
    .fi-url:focus { border-color: #9b8fc7; }

    /* buttons */
    .btn-row { display: flex; gap: 8px; margin-top: 14px; }
    .btn {
      font-family: 'ChosunGu', sans-serif;
      font-size: 11.5px;
      border: 1.5px solid #9b8fc7;
      background: #9b8fc7;
      color: #fff;
      padding: 7px 16px;
      cursor: pointer;
      letter-spacing: 0.2px;
    }
    .btn:hover { filter: brightness(1.1); }
    .btn:active { filter: brightness(0.9); }
    .btn:disabled { opacity: 0.45; cursor: default; filter: none; }
    .btn.ghost {
      background: #fff;
      color: #9b8fc7;
    }

    /* toast */
    #toast {
      position: fixed;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      background: #1a1a1a;
      color: #fff;
      font-family: 'ChosunGu', sans-serif;
      font-size: 11px;
      padding: 8px 18px;
      border: 1px solid #444;
      opacity: 0;
      transition: opacity 0.18s;
      pointer-events: none;
      white-space: nowrap;
      z-index: 999;
    }
    #toast.show { opacity: 1; }
  </style>
</head>
<body>
  <div class="window">
    <div class="titlebar">
      <span>C:// SETTINGS</span>
      <span style="opacity:0.6">⚙</span>
    </div>

    <div class="tabs">
      <button class="tab-btn active" data-tab="theme">테마</button>
      <button class="tab-btn" data-tab="titlebar">타이틀바</button>
      <button class="tab-btn" data-tab="widgets">위젯</button>
    </div>

    <!-- 테마 탭 -->
    <div class="tab-pane active" id="tab-theme">
      <div class="section">
        <h3>색상 팔레트 (4색)</h3>
        <div class="color-row">
          <span class="c-label">타이틀바</span>
          <input type="color" id="c-win" />
          <input type="text" class="hex-input" id="c-win-hex" maxlength="7" />
        </div>
        <div class="color-row">
          <span class="c-label">강조색</span>
          <input type="color" id="c-accent" />
          <input type="text" class="hex-input" id="c-accent-hex" maxlength="7" />
        </div>
        <div class="color-row">
          <span class="c-label">배경</span>
          <input type="color" id="c-bg" />
          <input type="text" class="hex-input" id="c-bg-hex" maxlength="7" />
        </div>
        <div class="color-row">
          <span class="c-label">텍스트</span>
          <input type="color" id="c-ink" />
          <input type="text" class="hex-input" id="c-ink-hex" maxlength="7" />
        </div>
      </div>

      <div class="btn-row">
        <button class="btn ghost" id="btn-suggest">✨ Claude 팔레트 추천</button>
        <button class="btn" id="btn-apply-theme">저장</button>
      </div>

      <div id="suggest-area" style="display:none; margin-top:14px;">
        <h3>추천 팔레트 <span style="font-size:10px;text-transform:none;letter-spacing:0;color:#bbb">클릭해서 적용</span></h3>
        <div class="suggest-grid" id="suggest-grid"></div>
      </div>

      <div class="preview-wrap">
        <div class="preview-label">미리보기</div>
        <div class="preview-win">
          <div class="preview-tb"><span>C:// WIDGET</span><span>⚙</span></div>
          <div class="preview-body">
            위젯 내용 샘플<br />
            <div class="preview-btn">버튼</div>
          </div>
        </div>
      </div>
    </div>

    <!-- 타이틀바 탭 -->
    <div class="tab-pane" id="tab-titlebar">
      <div class="section">
        <h3>타이틀바</h3>
        <div class="slider-row">
          <div class="s-label">높이 <span id="tb-h-val">24px</span></div>
          <input type="range" id="tb-height" min="18" max="44" value="24" />
        </div>
        <div class="slider-row">
          <div class="s-label">폰트 크기 <span id="tb-fs-val">11px</span></div>
          <input type="range" id="tb-fontsize" min="9" max="16" value="11" />
        </div>
        <label style="font-size:11.5px;display:flex;align-items:center;gap:8px;cursor:pointer;color:#333">
          <input type="checkbox" id="tb-gear" checked />
          ⚙ 설정 아이콘 표시
        </label>
      </div>
      <div class="btn-row">
        <button class="btn" id="btn-apply-titlebar">저장</button>
      </div>
    </div>

    <!-- 위젯 탭 -->
    <div class="tab-pane" id="tab-widgets">
      <div class="section">
        <h3>📁 Folders 위젯</h3>
        <div id="folder-list"></div>
        <button class="btn ghost" id="btn-add-folder" style="margin-top:6px;padding:5px 12px;font-size:11px">+ 폴더 추가</button>
      </div>
      <div class="btn-row">
        <button class="btn" id="btn-apply-folders">저장</button>
      </div>
    </div>
  </div>

  <div id="toast"></div>

  <script>
    /* ===== 기본값 ===== */
    const DEFAULTS = {
      theme:    { winColor:'#1a1a1a', accent:'#9b8fc7', windowBg:'#ffffff', ink:'#111111' },
      titlebar: { height:24, fontSize:11, showGear:true },
      folders: [
        { name:'Diary', colorBody:'#d8ccf0', colorTab:'#b8a8d8', type:'diary-api', url:'' },
        { name:'Book',  colorBody:'#c8c8c8', colorTab:'#a0a0a0', type:'url',
          url:'https://www.notion.so/37851f4140c580c995d6f55451f2c1f7' },
      ]
    };

    function loadS() {
      try { return JSON.parse(localStorage.getItem('wg_settings') || 'null') || deep(DEFAULTS); }
      catch(e) { return deep(DEFAULTS); }
    }
    function saveS() { localStorage.setItem('wg_settings', JSON.stringify(S)); }
    function deep(o) { return JSON.parse(JSON.stringify(o)); }

    let S = loadS();

    /* ===== 탭 ===== */
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
      });
    });

    /* ===== 색상 동기화 ===== */
    function bindColor(pickerId, hexId, cssVar) {
      const picker = document.getElementById(pickerId);
      const hex    = document.getElementById(hexId);
      picker.addEventListener('input', () => {
        hex.value = picker.value;
        document.documentElement.style.setProperty(cssVar, picker.value);
      });
      hex.addEventListener('input', () => {
        if (/^#[0-9a-fA-F]{6}$/.test(hex.value)) {
          picker.value = hex.value;
          document.documentElement.style.setProperty(cssVar, hex.value);
        }
      });
    }
    bindColor('c-win',    'c-win-hex',    '--p-win');
    bindColor('c-accent', 'c-accent-hex', '--p-accent');
    bindColor('c-bg',     'c-bg-hex',     '--p-bg');
    bindColor('c-ink',    'c-ink-hex',    '--p-ink');

    function applyThemeInputs(t) {
      [['c-win', t.winColor], ['c-accent', t.accent], ['c-bg', t.windowBg], ['c-ink', t.ink]]
        .forEach(([id, val]) => {
          document.getElementById(id).value = val;
          document.getElementById(id + '-hex').value = val;
        });
      document.documentElement.style.setProperty('--p-win',    t.winColor);
      document.documentElement.style.setProperty('--p-accent', t.accent);
      document.documentElement.style.setProperty('--p-bg',     t.windowBg);
      document.documentElement.style.setProperty('--p-ink',    t.ink);
    }
    applyThemeInputs(S.theme);

    document.getElementById('btn-apply-theme').addEventListener('click', () => {
      S.theme = {
        winColor: document.getElementById('c-win').value,
        accent:   document.getElementById('c-accent').value,
        windowBg: document.getElementById('c-bg').value,
        ink:      document.getElementById('c-ink').value,
      };
      saveS();
      showToast('테마 저장 완료! 위젯 새로고침 시 반영됩니다.');
    });

    /* ===== Claude 팔레트 추천 ===== */
    document.getElementById('btn-suggest').addEventListener('click', async () => {
      const btn  = document.getElementById('btn-suggest');
      const area = document.getElementById('suggest-area');
      const grid = document.getElementById('suggest-grid');
      const mainColor = document.getElementById('c-win').value;

      btn.disabled = true;
      btn.textContent = '분석 중...';
      area.style.display = 'none';

      try {
        const res  = await fetch('/api/suggest-colors?color=' + encodeURIComponent(mainColor));
        const data = await res.json();
        if (!data.palettes) throw new Error(data.error || '응답 오류');

        grid.innerHTML = '';
        data.palettes.forEach(p => {
          const card = document.createElement('div');
          card.className = 'suggest-card';
          card.innerHTML = `
            <div class="swatch-row">
              <div class="swatch" style="background:${p.winColor}"></div>
              <div class="swatch" style="background:${p.accent}"></div>
              <div class="swatch" style="background:${p.windowBg}"></div>
              <div class="swatch" style="background:${p.ink}"></div>
            </div>
            <div class="suggest-name">${p.description}</div>`;
          card.addEventListener('click', () => {
            document.querySelectorAll('.suggest-card').forEach(c => c.classList.remove('selected'));
            card.classList.add('selected');
            applyThemeInputs(p);
          });
          grid.appendChild(card);
        });
        area.style.display = 'block';
      } catch(e) {
        showToast('추천 실패: ' + e.message, 4000);
      }

      btn.disabled = false;
      btn.textContent = '✨ Claude 팔레트 추천';
    });

    /* ===== 타이틀바 슬라이더 ===== */
    const slH  = document.getElementById('tb-height');
    const slFs = document.getElementById('tb-fontsize');
    const cbGear = document.getElementById('tb-gear');
    slH.value  = S.titlebar.height;
    slFs.value = S.titlebar.fontSize;
    cbGear.checked = S.titlebar.showGear !== false;
    document.getElementById('tb-h-val').textContent  = S.titlebar.height  + 'px';
    document.getElementById('tb-fs-val').textContent = S.titlebar.fontSize + 'px';
    slH.addEventListener('input',  () => document.getElementById('tb-h-val').textContent  = slH.value  + 'px');
    slFs.addEventListener('input', () => document.getElementById('tb-fs-val').textContent = slFs.value + 'px');

    document.getElementById('btn-apply-titlebar').addEventListener('click', () => {
      S.titlebar = { height:+slH.value, fontSize:+slFs.value, showGear:cbGear.checked };
      saveS();
      showToast('타이틀바 설정 저장 완료!');
    });

    /* ===== 폴더 에디터 ===== */
    function renderFolders() {
      const list = document.getElementById('folder-list');
      list.innerHTML = '';
      S.folders.forEach((f, i) => {
        const wrap = document.createElement('div');
        wrap.className = 'folder-item-wrap';

        const row = document.createElement('div');
        row.className = 'folder-item';
        row.innerHTML = `
          <input type="color" value="${f.colorTab}"  title="탭 색" />
          <input type="color" value="${f.colorBody}" title="본문 색" />
          <input type="text"  class="fi-name" value="${f.name}" placeholder="이름" />
          <select class="fi-type">
            <option value="diary-api" ${f.type==='diary-api'?'selected':''}>다이어리 API</option>
            <option value="url"       ${f.type==='url'?'selected':''}>직접 URL</option>
          </select>
          <button class="icon-btn" data-a="up">↑</button>
          <button class="icon-btn" data-a="dn">↓</button>
          <button class="icon-btn" data-a="del">✕</button>`;

        const extra = document.createElement('div');
        extra.className = 'folder-extra';
        extra.style.display = f.type === 'url' ? 'block' : 'none';
        extra.innerHTML = `<label>Notion URL</label>
          <input class="fi-url" type="text" value="${f.url || ''}" placeholder="https://www.notion.so/..." />`;

        row.querySelector('.fi-type').addEventListener('change', e => {
          extra.style.display = e.target.value === 'url' ? 'block' : 'none';
        });
        row.querySelector('[data-a=del]').addEventListener('click', () => {
          S.folders.splice(i, 1); renderFolders();
        });
        row.querySelector('[data-a=up]').addEventListener('click', () => {
          if (i === 0) return;
          [S.folders[i-1], S.folders[i]] = [S.folders[i], S.folders[i-1]]; renderFolders();
        });
        row.querySelector('[data-a=dn]').addEventListener('click', () => {
          if (i === S.folders.length-1) return;
          [S.folders[i], S.folders[i+1]] = [S.folders[i+1], S.folders[i]]; renderFolders();
        });

        wrap.appendChild(row);
        wrap.appendChild(extra);
        list.appendChild(wrap);
      });
    }
    renderFolders();

    document.getElementById('btn-add-folder').addEventListener('click', () => {
      S.folders.push({ name:'새 폴더', colorBody:'#e0e0e0', colorTab:'#c8c8c8', type:'url', url:'' });
      renderFolders();
      document.getElementById('folder-list').lastElementChild
        .querySelector('.fi-name').focus();
    });

    document.getElementById('btn-apply-folders').addEventListener('click', () => {
      const wraps = document.getElementById('folder-list').children;
      S.folders = Array.from(wraps).map(wrap => {
        const row   = wrap.querySelector('.folder-item');
        const extra = wrap.querySelector('.folder-extra');
        const colors = row.querySelectorAll('input[type=color]');
        return {
          name:      row.querySelector('.fi-name').value.trim() || '폴더',
          colorTab:  colors[0].value,
          colorBody: colors[1].value,
          type:      row.querySelector('.fi-type').value,
          url:       extra ? extra.querySelector('.fi-url').value.trim() : '',
        };
      });
      saveS();
      showToast('폴더 설정 저장 완료! 위젯 새로고침 시 반영됩니다.');
    });

    /* ===== toast ===== */
    function showToast(msg, ms) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), ms || 3500);
    }
  </script>
</body>
</html>
