<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>C:// SETTINGS</title>
  <style>
    @font-face { font-family:'ChosunGu'; src:url('../shared/fonts/ChosunGu.TTF') format('truetype'); font-display:swap; }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:#e8e8e6;font-family:'ChosunGu',sans-serif;display:flex;justify-content:center;padding:24px 16px 56px;min-height:100vh;}
    .window{width:100%;max-width:480px;background:#fff;border:1.5px solid #111;box-shadow:4px 4px 0 #111;}
    .titlebar{background:#1a1a1a;color:#fff;font-size:12px;font-weight:700;padding:6px 10px;display:flex;justify-content:space-between;align-items:center;letter-spacing:.3px;}
    .body{padding:16px;}

    /* Tab bar */
    .tab-bar{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid #eee;}
    .tab{font-family:'ChosunGu',sans-serif;font-size:10.5px;border:1.5px solid #ddd;background:#fff;color:#888;padding:4px 10px;cursor:pointer;transition:all .12s;}
    .tab:hover{border-color:#bbb;color:#555;}
    .tab.active{border-color:#9b8fc7;background:#9b8fc7;color:#fff;font-weight:700;}

    /* Field */
    .field{margin-bottom:11px;}
    .field label{display:block;font-size:10px;color:#999;margin-bottom:3px;letter-spacing:.3px;}
    .field input[type=text],.field input[type=number],.field select{
      width:100%;border:1px solid #ddd;padding:5px 7px;font-size:11.5px;
      font-family:'ChosunGu',sans-serif;color:#111;outline:none;background:#fff;
    }
    .field input:focus,.field select:focus{border-color:#9b8fc7;}
    .field-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
    .color-row{display:flex;gap:7px;align-items:center;}
    .color-row input[type=color]{width:32px;height:28px;padding:1px;border:1px solid #ddd;cursor:pointer;flex-shrink:0;}
    .color-row input[type=text]{flex:1;}

    /* Section divider */
    .sec{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#ccc;margin:16px 0 10px;display:flex;align-items:center;gap:6px;}
    .sec::after{content:'';flex:1;height:1px;background:#eee;}

    /* Toggle */
    .toggle-row{display:flex;align-items:center;justify-content:space-between;padding:5px 0;}
    .toggle-row span{font-size:11.5px;color:#333;}
    .toggle{position:relative;width:32px;height:18px;flex-shrink:0;}
    .toggle input{opacity:0;width:0;height:0;}
    .toggle-slider{position:absolute;inset:0;background:#ddd;border-radius:9px;cursor:pointer;transition:background .18s;}
    .toggle input:checked+.toggle-slider{background:#9b8fc7;}
    .toggle-slider:before{content:'';position:absolute;width:14px;height:14px;left:2px;top:2px;background:#fff;border-radius:50%;transition:transform .18s;}
    .toggle input:checked+.toggle-slider:before{transform:translateX(14px);}

    /* Folder cards */
    .folder-list{display:flex;flex-direction:column;gap:8px;}
    .folder-card{border:1px solid #ddd;padding:9px 10px 7px;}
    .folder-card-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
    .folder-card-label{font-size:10px;font-weight:700;color:#888;letter-spacing:.5px;text-transform:uppercase;}
    .del-btn{background:none;border:none;font-size:13px;color:#ccc;cursor:pointer;padding:0;line-height:1;}
    .del-btn:hover{color:#e05c5c;}
    .add-folder-btn{border:1.5px dashed #ccc;background:none;width:100%;padding:7px;font-family:'ChosunGu',sans-serif;font-size:11px;color:#aaa;cursor:pointer;margin-top:5px;}
    .add-folder-btn:hover{border-color:#9b8fc7;color:#9b8fc7;}

    /* Route tags */
    .tag-list{display:flex;flex-wrap:wrap;gap:5px;min-height:22px;margin-top:3px;}
    .tag{display:flex;align-items:center;gap:3px;background:#f0edf8;border:1px solid #d0c8e8;padding:2px 6px 2px 7px;font-size:10.5px;color:#7b6fb7;}
    .tag-del{background:none;border:none;font-size:11px;color:#b0a0d0;cursor:pointer;padding:0;line-height:1;}
    .tag-del:hover{color:#e05c5c;}
    .tag-input-row{display:flex;gap:5px;margin-top:5px;}
    .tag-input-row input{flex:1;border:1px solid #ddd;padding:4px 6px;font-size:11px;font-family:'ChosunGu',sans-serif;outline:none;}
    .tag-input-row input:focus{border-color:#9b8fc7;}
    .tag-add-btn{border:1px solid #ddd;background:#fff;padding:4px 9px;font-size:10px;font-family:'ChosunGu',sans-serif;cursor:pointer;color:#888;white-space:nowrap;}
    .tag-add-btn:hover{border-color:#9b8fc7;color:#9b8fc7;}

    /* Action row */
    .action-row{margin-top:18px;display:flex;gap:7px;align-items:center;flex-wrap:wrap;}
    .btn{font-family:'ChosunGu',sans-serif;font-size:11.5px;border:1.5px solid #9b8fc7;background:#9b8fc7;color:#fff;padding:7px 16px;cursor:pointer;letter-spacing:.2px;}
    .btn:hover{filter:brightness(1.1);} .btn:active{filter:brightness(.9);} .btn:disabled{opacity:.45;cursor:default;filter:none;}
    .btn.ghost{background:#fff;color:#9b8fc7;}
    #save-status{font-size:10.5px;color:#aaa;margin-left:2px;}
    #save-status.ok{color:#4caf7d;} #save-status.err{color:#e05c5c;}

    /* Embed links (bottom) */
    .embed-toggle{font-size:10px;color:#aaa;cursor:pointer;margin-top:20px;display:flex;align-items:center;gap:4px;user-select:none;border:none;background:none;font-family:'ChosunGu',sans-serif;padding:0;}
    .embed-toggle:hover{color:#777;}
    #embed-section{display:none;margin-top:10px;border:1px solid #eee;padding:10px;}
    #embed-section.open{display:block;}
    .embed-row{display:flex;align-items:center;gap:8px;padding:4px 0;border-bottom:1px solid #f5f5f5;}
    .embed-row:last-child{border-bottom:none;}
    .embed-label{font-size:10.5px;color:#555;width:90px;flex-shrink:0;}
    .embed-url{flex:1;font-size:9.5px;color:#aaa;font-family:monospace;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .copy-btn{border:1px solid #ddd;background:#fff;padding:2px 7px;font-size:9.5px;font-family:'ChosunGu',sans-serif;cursor:pointer;flex-shrink:0;color:#888;}
    .copy-btn:hover{border-color:#9b8fc7;color:#9b8fc7;}
    #sync-status{font-size:10px;color:#aaa;margin-top:6px;}
    #sync-status.ok{color:#4caf7d;} #sync-status.err{color:#e05c5c;}
  </style>
</head>
<body>
<div class="window">
  <div class="titlebar">
    <span>C:// SETTINGS</span>
    <span style="opacity:.75;cursor:default">&#9881;</span>
  </div>
  <div class="body">

    <div class="tab-bar" id="tab-bar">
      <button class="tab active" data-w="all">전체</button>
      <button class="tab" data-w="clock">Clock</button>
      <button class="tab" data-w="folders">Folders</button>
      <button class="tab" data-w="habittracker">Habit</button>
      <button class="tab" data-w="log">Log</button>
      <button class="tab" data-w="memo">Memo</button>
      <button class="tab" data-w="to-do">To-Do</button>
      <button class="tab" data-w="braindump">Braindump</button>
    </div>

    <div id="panel"></div>

    <div class="action-row">
      <button class="btn ghost" id="btn-widget" style="display:none">이 위젯에만 저장</button>
      <button class="btn" id="btn-global">전체에 적용</button>
      <span id="save-status"></span>
    </div>
    <div id="sync-status"></div>

    <!-- Embed links (접기/펼치기) -->
    <button class="embed-toggle" id="embed-toggle">▶ 임베드 링크</button>
    <div id="embed-section"></div>

  </div>
</div>

<script>
const BASE = 'https://widget-generator-theta.vercel.app';

const WIDGET_META = {
  clock:        { label:'Clock',       path:'/widgets/clock/' },
  flipclock:    { label:'FlipClock',   path:'/widgets/flipclock/' },
  folders:      { label:'Folders',     path:'/widgets/folders/' },
  habittracker: { label:'Habit',       path:'/widgets/habittracker/' },
  log:          { label:'Log',         path:'/widgets/log/' },
  memo:         { label:'Memo',        path:'/widgets/memo/' },
  'to-do':      { label:'To-Do',       path:'/widgets/to-do/' },
  braindump:    { label:'Braindump',   path:'/widgets/braindump/' },
  settings:     { label:'Settings',    path:'/settings/' },
};

const FONT_LIST = [
  'ChosunGu','Helvetica Neue','Noto Sans KR','Noto Serif KR','Nanum Gothic',
  'Nanum Myeongjo','Gothic A1','IBM Plex Mono','Space Mono','Montserrat',
  'Roboto','Inter','Poppins','Outfit','Bebas Neue',
];

const DEFAULTS = {
  theme:   { winColor:'#1a1a1a', accent:'#9b8fc7', windowBg:'#ffffff', ink:'#111111' },
  titlebar:{ height:24, fontSize:11, showTime:false, showDate:false, customText:'' },
  folders: [
    { name:'Diary', colorBody:'#d8ccf0', colorTab:'#b8a8d8', type:'diary-api', url:'' },
    { name:'Book',  colorBody:'#c8c8c8', colorTab:'#a0a0a0', type:'url', url:'https://www.notion.so/37851f4140c580c995d6f55451f2c1f7' },
  ],
  clock:   { format:'12h', showDate:true, showDay:true },
  memo:    { srcDbId:'37751f4140c580e4b680c979ee1d0f2a', maxItems:60, routes:['diary','todo','cart','idea','bookmark'] },
  todo:    { dbId:'37651f4140c5805e875cdc92a5715d21' },
};

function deep(o){ return JSON.parse(JSON.stringify(o)); }
let globalS = deep(DEFAULTS);   // /api/settings 전체
let widgetS = {};                // /api/get-settings 위젯별
let curWidget = 'all';
let folders = deep(DEFAULTS.folders);
let memoRoutes = [...DEFAULTS.memo.routes];

// ── 데이터 로드 ──
async function loadGlobal() {
  try {
    const r = await fetch('/api/settings');
    if (!r.ok) throw new Error();
    globalS = Object.assign(deep(DEFAULTS), await r.json());
    setSyncStatus('✓ Notion 연동', 'ok');
    localStorage.setItem('wg_settings', JSON.stringify(globalS));
  } catch {
    try { const l = JSON.parse(localStorage.getItem('wg_settings')||'null'); if(l) globalS = Object.assign(deep(DEFAULTS),l); } catch {}
    setSyncStatus('⚠️ 로컬 캐시 사용중', 'err');
  }
}

async function loadWidget(id) {
  if (id === 'all') { widgetS = {}; return; }
  try {
    const r = await fetch(`/api/get-settings?widgetId=${id}`);
    widgetS = r.ok ? await r.json() : {};
  } catch { widgetS = {}; }
}

// ── 탭 선택 ──
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', async () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    curWidget = tab.dataset.w;
    setStatus('');
    await loadWidget(curWidget);
    renderPanel();
    document.getElementById('btn-widget').style.display = curWidget === 'all' ? 'none' : '';
    document.getElementById('btn-global').textContent = curWidget === 'all' ? '저장' : '전체에 적용';
  });
});

// ── 패널 렌더 ──
function renderPanel() {
  const p = document.getElementById('panel');
  p.innerHTML = '';
  if (curWidget === 'all') {
    p.appendChild(buildGlobalPanel());
  } else {
    p.appendChild(buildWidgetPanel(curWidget));
  }
  bindColorPairs(p);
}

function buildGlobalPanel() {
  const div = document.createElement('div');
  const t = globalS.theme || {};
  const tb = globalS.titlebar || {};
  div.innerHTML = `
    <div class="sec">테마 색상</div>
    <div class="field-row">
      <div class="field"><label>타이틀바 색상</label><div class="color-row"><input type="color" id="g-winColor" value="${t.winColor||'#1a1a1a'}"><input type="text" id="g-winColor-hex" value="${t.winColor||'#1a1a1a'}"></div></div>
      <div class="field"><label>강조색 (accent)</label><div class="color-row"><input type="color" id="g-accent" value="${t.accent||'#9b8fc7'}"><input type="text" id="g-accent-hex" value="${t.accent||'#9b8fc7'}"></div></div>
    </div>
    <div class="field-row">
      <div class="field"><label>배경색</label><div class="color-row"><input type="color" id="g-windowBg" value="${t.windowBg||'#ffffff'}"><input type="text" id="g-windowBg-hex" value="${t.windowBg||'#ffffff'}"></div></div>
      <div class="field"><label>텍스트색</label><div class="color-row"><input type="color" id="g-ink" value="${t.ink||'#111111'}"><input type="text" id="g-ink-hex" value="${t.ink||'#111111'}"></div></div>
    </div>
    <div class="sec">타이틀바</div>
    <div class="field-row">
      <div class="field"><label>높이 (px)</label><input type="number" id="g-tb-height" value="${tb.height||24}" min="20" max="60"></div>
      <div class="field"><label>폰트 크기 (px)</label><input type="number" id="g-tb-fontSize" value="${tb.fontSize||11}" min="8" max="20"></div>
    </div>
    <div class="toggle-row"><span>시계 표시</span><label class="toggle"><input type="checkbox" id="g-tb-showTime" ${tb.showTime?'checked':''}><span class="toggle-slider"></span></label></div>
    <div class="toggle-row"><span>날짜 표시</span><label class="toggle"><input type="checkbox" id="g-tb-showDate" ${tb.showDate?'checked':''}><span class="toggle-slider"></span></label></div>
    <div class="field" style="margin-top:8px"><label>커스텀 텍스트</label><input type="text" id="g-tb-custom" value="${esc(tb.customText||'')}"></div>
  `;
  return div;
}

function buildWidgetPanel(id) {
  const div = document.createElement('div');
  const w = widgetS || {};
  const t = globalS.theme || {};
  const color  = w.color  || t.winColor || '#1a1a1a';
  const accent = w.accent || t.accent   || '#9b8fc7';
  const font   = (w.font  || DEFAULTS.theme?.font || 'ChosunGu').replace(/['"]/g,'').split(',')[0].trim();
  const fontOpts = FONT_LIST.map(f => `<option${font===f?' selected':''}>${f}</option>`).join('');

  let extra = '';
  if (id === 'clock') {
    const cl = globalS.clock || {};
    extra = `
      <div class="sec">Clock 설정</div>
      <div class="field"><label>시간 형식</label><select id="cl-format"><option value="12h"${cl.format==='12h'?' selected':''}>12시간 (AM/PM)</option><option value="24h"${cl.format==='24h'?' selected':''}>24시간</option></select></div>
      <div class="toggle-row"><span>날짜 표시</span><label class="toggle"><input type="checkbox" id="cl-showDate" ${cl.showDate!==false?'checked':''}><span class="toggle-slider"></span></label></div>
      <div class="toggle-row"><span>요일 표시</span><label class="toggle"><input type="checkbox" id="cl-showDay" ${cl.showDay!==false?'checked':''}><span class="toggle-slider"></span></label></div>`;
  } else if (id === 'folders') {
    extra = `<div class="sec">폴더 목록</div><div class="folder-list" id="folder-list-panel"></div><button class="add-folder-btn" id="add-folder-btn">+ 폴더 추가</button>`;
  } else if (id === 'memo') {
    const memo = globalS.memo || {};
    extra = `
      <div class="sec">Memo 설정</div>
      <div class="field"><label>Notion DB ID</label><input type="text" id="memo-dbId" value="${esc(memo.srcDbId||'')}"></div>
      <div class="field"><label>최대 항목 수</label><input type="number" id="memo-maxItems" value="${memo.maxItems||60}" min="1" max="200"></div>
      <div class="field"><label>라우트 목록</label><div class="tag-list" id="memo-routes-tags"></div><div class="tag-input-row"><input type="text" id="memo-route-input" placeholder="새 라우트"><button class="tag-add-btn" id="memo-route-add">+ 추가</button></div></div>`;
  } else if (id === 'to-do') {
    const todo = globalS.todo || {};
    extra = `
      <div class="sec">Todo 설정</div>
      <div class="field"><label>Notion DB ID</label><input type="text" id="todo-dbId" value="${esc(todo.dbId||'')}"></div>`;
  } else if (['habittracker','log','braindump'].includes(id)) {
    extra = `
      <div class="sec">DB 연동</div>
      <div class="field"><label>Source DB ID</label><input type="text" id="w-srcDbId" value="${esc(w.source_db_id||'')}"></div>
      <div class="field"><label>날짜 속성명</label><input type="text" id="w-srcProp" value="${esc(w.source_property||'날짜')}"></div>`;
  }

  div.innerHTML = `
    <div class="sec">위젯 공통</div>
    <div class="field"><label>타이틀 텍스트</label><input type="text" id="w-title" value="${esc(w.title||'')}"></div>
    <div class="field-row">
      <div class="field"><label>타이틀바 색상</label><div class="color-row"><input type="color" id="w-color" value="${color}"><input type="text" id="w-color-hex" value="${color}"></div></div>
      <div class="field"><label>강조색 (accent)</label><div class="color-row"><input type="color" id="w-accent" value="${accent}"><input type="text" id="w-accent-hex" value="${accent}"></div></div>
    </div>
    <div class="field"><label>폰트</label><select id="w-font">${fontOpts}</select></div>
    ${extra}
  `;

  return div;
}

// ── 색상 피커 ↔ hex 자동 동기화 ──
function bindColorPairs(root) {
  root.querySelectorAll('input[type=color]').forEach(picker => {
    const hexId = picker.id + '-hex';
    const hex = root.querySelector('#' + hexId);
    if (!hex) return;
    picker.addEventListener('input', () => hex.value = picker.value);
    hex.addEventListener('input', () => {
      if (/^#[0-9a-f]{6}$/i.test(hex.value)) picker.value = hex.value;
    });
  });
}

// ── 폴더 관리 ──
function renderFolderPanel() {
  folders = deep(globalS.folders || DEFAULTS.folders);
  const container = document.getElementById('folder-list-panel');
  if (!container) return;
  container.innerHTML = '';
  folders.forEach((f, i) => {
    const isUrl = f.type === 'url';
    const card = document.createElement('div');
    card.className = 'folder-card';
    card.innerHTML = `
      <div class="folder-card-head"><span class="folder-card-label">폴더 ${i+1}</span><button class="del-btn" data-i="${i}">✕</button></div>
      <div class="field-row" style="margin-bottom:7px">
        <div class="field" style="margin-bottom:0"><label>이름</label><input type="text" class="f-name" data-i="${i}" value="${esc(f.name||'')}"></div>
        <div class="field" style="margin-bottom:0"><label>유형</label><select class="f-type" data-i="${i}"><option value="diary-api"${f.type==='diary-api'?' selected':''}>Diary API</option><option value="url"${isUrl?' selected':''}>외부 URL</option></select></div>
      </div>
      <div class="field-row" style="margin-bottom:7px">
        <div class="field" style="margin-bottom:0"><label>바디 색상</label><div class="color-row"><input type="color" class="f-colorBody" data-i="${i}" value="${f.colorBody||'#cccccc'}"><input type="text" class="f-colorBody-hex" data-i="${i}" value="${f.colorBody||'#cccccc'}"></div></div>
        <div class="field" style="margin-bottom:0"><label>탭 색상</label><div class="color-row"><input type="color" class="f-colorTab" data-i="${i}" value="${f.colorTab||'#aaaaaa'}"><input type="text" class="f-colorTab-hex" data-i="${i}" value="${f.colorTab||'#aaaaaa'}"></div></div>
      </div>
      <div class="field f-url-row" style="margin-bottom:0${isUrl?'':';display:none'}"><label>URL</label><input type="text" class="f-url" data-i="${i}" value="${esc(f.url||'')}"></div>`;
    container.appendChild(card);
  });

  bindColorPairs(container);
  container.querySelectorAll('.del-btn').forEach(b => b.addEventListener('click', () => { folders.splice(+b.dataset.i,1); renderFolderPanel(); }));
  container.querySelectorAll('.f-colorBody').forEach(el => el.addEventListener('input', e => { folders[+e.target.dataset.i].colorBody = e.target.value; container.querySelector(`.f-colorBody-hex[data-i="${e.target.dataset.i}"]`).value = e.target.value; }));
  container.querySelectorAll('.f-colorTab').forEach(el => el.addEventListener('input', e => { folders[+e.target.dataset.i].colorTab = e.target.value; container.querySelector(`.f-colorTab-hex[data-i="${e.target.dataset.i}"]`).value = e.target.value; }));
  container.querySelectorAll('.f-type').forEach(el => el.addEventListener('change', e => {
    const i = +e.target.dataset.i; folders[i].type = e.target.value;
    container.querySelectorAll('.folder-card')[i].querySelector('.f-url-row').style.display = e.target.value==='url'?'':'none';
  }));

  const addBtn = document.getElementById('add-folder-btn');
  if (addBtn) addBtn.addEventListener('click', () => { folders.push({name:'새 폴더',colorBody:'#cccccc',colorTab:'#aaaaaa',type:'url',url:''}); renderFolderPanel(); });
}

// ── 라우트 태그 ──
function renderRoutes() {
  const c = document.getElementById('memo-routes-tags'); if (!c) return;
  memoRoutes = [...(globalS.memo?.routes || DEFAULTS.memo.routes)];
  c.innerHTML = '';
  memoRoutes.forEach((r,i) => {
    const t = document.createElement('div'); t.className='tag';
    t.innerHTML = `${esc(r)} <button class="tag-del" data-i="${i}">✕</button>`;
    c.appendChild(t);
  });
  c.querySelectorAll('.tag-del').forEach(b => b.addEventListener('click', () => { memoRoutes.splice(+b.dataset.i,1); renderRoutesDirect(); }));
}
function renderRoutesDirect() {
  const c = document.getElementById('memo-routes-tags'); if (!c) return;
  c.innerHTML = '';
  memoRoutes.forEach((r,i) => {
    const t = document.createElement('div'); t.className='tag';
    t.innerHTML = `${esc(r)} <button class="tag-del" data-i="${i}">✕</button>`;
    c.appendChild(t);
  });
  c.querySelectorAll('.tag-del').forEach(b => b.addEventListener('click', () => { memoRoutes.splice(+b.dataset.i,1); renderRoutesDirect(); }));
}
document.getElementById('panel').addEventListener('click', e => {
  if (e.target.id === 'memo-route-add') {
    const inp = document.getElementById('memo-route-input');
    const v = inp.value.trim();
    if (v && !memoRoutes.includes(v)) { memoRoutes.push(v); renderRoutesDirect(); }
    inp.value = ''; inp.focus();
  }
});
document.getElementById('panel').addEventListener('keydown', e => {
  if (e.key === 'Enter' && e.target.id === 'memo-route-input') document.getElementById('memo-route-add')?.click();
});
document.getElementById('panel').addEventListener('change', () => {
  if (curWidget === 'folders') syncFoldersFromInputs();
});
document.getElementById('panel').addEventListener('input', e => {
  if (curWidget === 'folders' && (e.target.matches('.f-name,.f-url'))) syncFoldersFromInputs();
});

function syncFoldersFromInputs() {
  document.querySelectorAll('#folder-list-panel .folder-card').forEach((card, i) => {
    if (!folders[i]) return;
    const nm = card.querySelector('.f-name'); if (nm) folders[i].name = nm.value.trim();
    const url = card.querySelector('.f-url'); if (url) folders[i].url = url.value.trim();
  });
}

// ── renderPanel 후처리 ──
const origRenderPanel = renderPanel;
renderPanel = () => { origRenderPanel(); if (curWidget === 'folders') { renderFolderPanel(); } else if (curWidget === 'memo') renderRoutes(); };

// ── 저장 ──
function getHex(baseId) {
  const hex = document.getElementById(baseId+'-hex');
  const pick = document.getElementById(baseId);
  if (!hex && !pick) return null;
  const v = hex?.value.trim();
  return (/^#[0-9a-f]{6}$/i.test(v)) ? v : pick?.value || null;
}
function val(id) { const el=document.getElementById(id); return el?el.value.trim():null; }
function chk(id) { const el=document.getElementById(id); return el?el.checked:null; }

async function saveGlobal(patch) {
  const current = deep(globalS);
  Object.assign(current, patch);
  const r = await fetch('/api/settings', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(current) });
  if (!r.ok) throw new Error('전체 저장 실패');
  globalS = current;
  localStorage.setItem('wg_settings', JSON.stringify(current));
}

async function saveWidgetOnly() {
  const pageId = widgetS?.pageId;
  if (!pageId) throw new Error('위젯 DB 항목 없음 — Notion DB 설정 필요');
  const body = {
    pageId,
    title:  val('w-title') || undefined,
    color:  getHex('w-color') || undefined,
    accent: getHex('w-accent') || undefined,
    font:   `'${val('w-font')}'` || undefined,
  };
  if (curWidget==='habittracker'||curWidget==='log'||curWidget==='braindump') {
    body.source_db_id = val('w-srcDbId') || undefined;
    body.source_property = val('w-srcProp') || undefined;
  }
  const r = await fetch('/api/save-settings', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
  if (!r.ok) throw new Error('저장 실패');
}

function buildGlobalPatch() {
  if (curWidget === 'all') {
    return {
      theme: {
        winColor:  getHex('g-winColor')  || globalS.theme?.winColor,
        accent:    getHex('g-accent')    || globalS.theme?.accent,
        windowBg:  getHex('g-windowBg')  || globalS.theme?.windowBg,
        ink:       getHex('g-ink')       || globalS.theme?.ink,
      },
      titlebar: {
        height:     +val('g-tb-height')  || 24,
        fontSize:   +val('g-tb-fontSize')|| 11,
        showGear:   true,
        showTime:   chk('g-tb-showTime'),
        showDate:   chk('g-tb-showDate'),
        customText: val('g-tb-custom') || '',
      },
    };
  }
  const patch = {};
  if (curWidget === 'clock') {
    patch.clock = {
      format:   val('cl-format') || '12h',
      showDate: chk('cl-showDate') !== false,
      showDay:  chk('cl-showDay')  !== false,
    };
    patch.theme = { ...globalS.theme, winColor: getHex('w-color')||globalS.theme?.winColor, accent: getHex('w-accent')||globalS.theme?.accent };
  } else if (curWidget === 'folders') {
    syncFoldersFromInputs();
    patch.folders = deep(folders);
  } else if (curWidget === 'memo') {
    patch.memo = { srcDbId: val('memo-dbId')||'', maxItems: +val('memo-maxItems')||60, routes:[...memoRoutes] };
    patch.theme = { ...globalS.theme, winColor: getHex('w-color')||globalS.theme?.winColor, accent: getHex('w-accent')||globalS.theme?.accent };
  } else if (curWidget === 'to-do') {
    patch.todo = { dbId: val('todo-dbId')||'' };
    patch.theme = { ...globalS.theme, winColor: getHex('w-color')||globalS.theme?.winColor, accent: getHex('w-accent')||globalS.theme?.accent };
  } else {
    patch.theme = { ...globalS.theme, winColor: getHex('w-color')||globalS.theme?.winColor, accent: getHex('w-accent')||globalS.theme?.accent };
  }
  return patch;
}

document.getElementById('btn-widget').addEventListener('click', async () => {
  const btn = document.getElementById('btn-widget');
  btn.disabled = true; setStatus('저장 중...');
  try {
    await saveWidgetOnly();
    setStatus('이 위젯만 저장됨 ✓', 'ok');
  } catch(e) { setStatus(e.message, 'err'); }
  finally { btn.disabled = false; }
});

document.getElementById('btn-global').addEventListener('click', async () => {
  const btn = document.getElementById('btn-global');
  btn.disabled = true; setStatus('저장 중...');
  try {
    await saveGlobal(buildGlobalPatch());
    setStatus('전체 저장됨 — 위젯에 즉시 반영 ✓', 'ok');
  } catch(e) { setStatus(e.message, 'err'); }
  finally { btn.disabled = false; }
});

function setStatus(msg, cls) {
  const el = document.getElementById('save-status');
  el.textContent = msg; el.className = cls || '';
}
function setSyncStatus(msg, cls) {
  const el = document.getElementById('sync-status');
  el.textContent = msg; el.className = cls || '';
}

// ── 임베드 링크 ──
document.getElementById('embed-toggle').addEventListener('click', () => {
  const sec = document.getElementById('embed-section');
  const btn = document.getElementById('embed-toggle');
  const open = sec.classList.toggle('open');
  btn.textContent = (open ? '▼' : '▶') + ' 임베드 링크';
  if (open && !sec.innerHTML) buildEmbedLinks();
});

function buildEmbedLinks() {
  const sec = document.getElementById('embed-section');
  sec.innerHTML = Object.entries(WIDGET_META).map(([id, m]) => {
    const url = BASE + m.path;
    return `<div class="embed-row"><span class="embed-label">${m.label}</span><span class="embed-url" title="${url}">${url}</span><button class="copy-btn" data-url="${url}">복사</button></div>`;
  }).join('');
  sec.querySelectorAll('.copy-btn').forEach(btn => {
    btn.addEventListener('click', async () => {
      try { await navigator.clipboard.writeText(btn.dataset.url); }
      catch { const ta=document.createElement('textarea');ta.value=btn.dataset.url;ta.style.cssText='position:fixed;opacity:0';document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta); }
      btn.textContent='✓'; setTimeout(()=>btn.textContent='복사',1500);
    });
  });
}

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── 초기화 ──
(async () => {
  await loadGlobal();
  renderPanel();
})();
</script>
</body>
</html>
