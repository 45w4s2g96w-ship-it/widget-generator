<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>C:// SETTINGS</title>
  <style>
    @font-face {
      font-family: 'ChosunGu';
      src: url('../shared/fonts/ChosunGu.TTF') format('truetype');
      font-display: swap;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #e8e8e6;
      font-family: 'ChosunGu', sans-serif;
      display: flex;
      justify-content: center;
      padding: 24px 16px 56px;
      min-height: 100vh;
    }
    .window {
      width: 100%; max-width: 520px;
      background: #fff;
      border: 1.5px solid #111;
      box-shadow: 4px 4px 0 #111;
    }
    .titlebar {
      background: #1a1a1a; color: #fff;
      font-size: 12px; font-weight: 700;
      padding: 6px 10px;
      display: flex; justify-content: space-between; align-items: center;
      letter-spacing: 0.3px; user-select: none;
    }
    .tabs { display: flex; border-bottom: 1.5px solid #111; background: #ebebea; overflow-x: auto; }
    .tab-btn {
      font-family: 'ChosunGu', sans-serif; font-size: 11.5px;
      padding: 7px 16px; border: none; border-right: 1px solid #ccc;
      background: transparent; cursor: pointer; color: #666; white-space: nowrap; flex-shrink: 0;
    }
    .tab-btn.active { background: #fff; color: #111; font-weight: 700; border-bottom: 2px solid #fff; margin-bottom: -1.5px; }
    .tab-pane { display: none; padding: 18px 16px 22px; }
    .tab-pane.active { display: block; }
    h3 { font-size: 10.5px; color: #999; letter-spacing: 0.8px; text-transform: uppercase; margin: 0 0 11px; padding-bottom: 5px; border-bottom: 1px solid #eee; }
    .section { margin-bottom: 22px; }
    .color-row { display: flex; align-items: center; gap: 8px; margin-bottom: 9px; }
    .c-label { font-size: 11.5px; width: 76px; flex-shrink: 0; color: #333; }
    .color-row input[type=color] { width: 30px; height: 30px; border: 1.5px solid #111; padding: 1px; cursor: pointer; background: none; flex-shrink: 0; }
    .hex-input { font-family: 'ChosunGu', monospace; font-size: 11px; border: 1px solid #ccc; padding: 4px 7px; width: 86px; color: #111; outline: none; }
    .hex-input:focus { border-color: #9b8fc7; }
    .preview-wrap { margin-top: 14px; padding: 12px; background: #f4f4f2; border: 1px solid #ddd; }
    .preview-label { font-size: 10px; color: #999; margin-bottom: 8px; }
    .preview-win { max-width: 180px; border: 1.5px solid var(--p-ink,#111); box-shadow: 3px 3px 0 var(--p-ink,#111); }
    .preview-tb { background: var(--p-win,#1a1a1a); color: #fff; font-size: 10px; font-weight: 700; padding: 5px 8px; display: flex; justify-content: space-between; align-items: center; }
    .preview-body { background: var(--p-bg,#fff); color: var(--p-ink,#111); padding: 10px 10px 8px; font-size: 10.5px; line-height: 1.6; }
    .preview-btn { display: inline-block; background: var(--p-accent,#9b8fc7); color: #fff; font-size: 9.5px; padding: 3px 10px; margin-top: 5px; }
    .tb-preview-wrap { margin-top: 16px; padding: 14px; background: #f4f4f2; border: 1px solid #ddd; }
    .tb-preview-label { font-size: 10px; color: #999; margin-bottom: 10px; }
    .tb-preview-win { border: 1.5px solid #111; box-shadow: 3px 3px 0 #111; overflow: hidden; }
    #tb-preview-bar { background: var(--p-win,#1a1a1a); color: #fff; font-family: 'ChosunGu', sans-serif; font-weight: 700; display: flex; justify-content: space-between; align-items: center; padding: 0 8px; transition: min-height 0.1s, font-size 0.1s; }
    .tb-preview-body { background: #fff; padding: 10px; }
    .tb-preview-body div { height: 8px; background: #eee; margin-bottom: 6px; border-radius: 2px; }
    .tb-preview-body div:nth-child(2) { width: 70%; }
    .tb-preview-body div:nth-child(3) { width: 85%; }
    .suggest-grid { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
    .suggest-card { flex: 1; min-width: 130px; border: 1.5px solid #ddd; padding: 10px; cursor: pointer; background: #fafafa; transition: border-color 0.1s; }
    .suggest-card:hover { border-color: #9b8fc7; }
    .suggest-card.selected { border-color: #9b8fc7; background: #f5f0ff; }
    .swatch-row { display: flex; gap: 4px; margin-bottom: 6px; }
    .swatch { width: 20px; height: 20px; border: 1px solid rgba(0,0,0,0.12); }
    .suggest-name { font-size: 10.5px; color: #444; }
    .slider-row { margin-bottom: 14px; }
    .s-label { font-size: 11.5px; display: flex; justify-content: space-between; margin-bottom: 5px; color: #333; }
    .s-label span { color: #9b8fc7; font-weight: 700; }
    input[type=range] { width: 100%; accent-color: #9b8fc7; }
    .option-row { display: flex; gap: 18px; flex-wrap: wrap; margin-bottom: 10px; }
    .option-row label { font-size: 11.5px; color: #333; display: flex; align-items: center; gap: 5px; cursor: pointer; }
    .cb-row { margin-bottom: 8px; }
    .cb-row label { font-size: 11.5px; color: #333; display: flex; align-items: center; gap: 6px; cursor: pointer; }
    input[type=checkbox], input[type=radio] { accent-color: #9b8fc7; cursor: pointer; }
    .text-input { font-family: 'ChosunGu', monospace; font-size: 11px; border: 1px solid #ccc; padding: 6px 8px; width: 100%; outline: none; color: #111; }
    .text-input:focus { border-color: #9b8fc7; }
    .field-label { font-size: 10.5px; color: #888; display: block; margin-bottom: 4px; margin-top: 10px; }
    .folder-item-wrap { margin-bottom: 6px; }
    .folder-item { display: flex; align-items: center; gap: 6px; padding: 7px 8px; border: 1px solid #ddd; background: #fafafa; }
    .folder-item input[type=color] { width: 26px; height: 26px; border: 1px solid #111; padding: 1px; cursor: pointer; flex-shrink: 0; }
    .fi-name { font-family: 'ChosunGu', sans-serif; font-size: 11.5px; border: 1px solid #ccc; padding: 4px 6px; flex: 1; min-width: 0; outline: none; }
    .fi-name:focus { border-color: #9b8fc7; }
    .fi-type { font-family: 'ChosunGu', sans-serif; font-size: 11px; border: 1px solid #ccc; padding: 4px 5px; background: #fff; cursor: pointer; }
    .icon-btn { background: none; border: none; cursor: pointer; font-size: 13px; color: #aaa; padding: 2px 3px; flex-shrink: 0; line-height: 1; }
    .icon-btn:hover { color: #333; }
    .folder-extra { padding: 6px 8px; border: 1px solid #ddd; border-top: none; background: #f4f4f4; }
    .folder-extra label { font-size: 10px; color: #888; display: block; margin-bottom: 3px; }
    .fi-url { font-family: 'ChosunGu', monospace; font-size: 10.5px; border: 1px solid #ccc; padding: 4px 7px; width: 100%; outline: none; }
    .fi-url:focus { border-color: #9b8fc7; }
    /* Ask Claude - step flow */
    .ask-step-header { display: flex; align-items: center; gap: 10px; padding: 0 0 16px; margin-bottom: 16px; border-bottom: 1px solid #eee; }
    .ask-step-dots { display: flex; align-items: center; gap: 0; }
    .ask-dot { width: 22px; height: 22px; border-radius: 50%; border: 1.5px solid #ddd; background: #fff; color: #bbb; font-size: 10px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.15s; }
    .ask-dot.active { border-color: #9b8fc7; background: #9b8fc7; color: #fff; }
    .ask-dot.done { border-color: #4caf7d; background: #4caf7d; color: #fff; }
    .ask-dot-line { width: 18px; height: 1.5px; background: #eee; }
    .ask-step-title { font-size: 10px; color: #999; letter-spacing: 0.5px; }
    .ask-widget-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 8px; margin-bottom: 6px; }
    .ask-wcard { border: 1.5px solid #ddd; padding: 10px 6px 8px; text-align: center; cursor: pointer; font-size: 11px; color: #555; transition: all 0.12s; line-height: 1.5; user-select: none; }
    .ask-wcard .wc-icon { font-size: 22px; display: block; margin-bottom: 5px; }
    .ask-wcard.sel { border-color: #9b8fc7; background: #f5f0ff; color: #7b6fb7; font-weight: 700; }
    .ask-part-list { margin-bottom: 14px; }
    .ask-part-item { margin-bottom: 8px; }
    .ask-part-item label { font-size: 12px; color: #333; display: flex; align-items: flex-start; gap: 8px; cursor: pointer; line-height: 1.6; }
    .ask-summary { background: #f4f4f2; border: 1px solid #ddd; padding: 8px 12px; margin-bottom: 12px; font-size: 10.5px; color: #555; line-height: 1.9; }
    .ask-summary strong { color: #9b8fc7; }
    .ask-textarea { font-family: 'ChosunGu', sans-serif; font-size: 12px; line-height: 1.7; border: 1.5px solid #ddd; padding: 10px 12px; width: 100%; min-height: 120px; resize: vertical; outline: none; color: #111; }
    .ask-textarea:focus { border-color: #9b8fc7; }
    .btn-row { display: flex; gap: 8px; margin-top: 14px; }
    .btn { font-family: 'ChosunGu', sans-serif; font-size: 11.5px; border: 1.5px solid #9b8fc7; background: #9b8fc7; color: #fff; padding: 7px 16px; cursor: pointer; letter-spacing: 0.2px; }
    .btn:hover { filter: brightness(1.1); }
    .btn:active { filter: brightness(0.9); }
    .btn:disabled { opacity: 0.45; cursor: default; filter: none; }
    .btn.ghost { background: #fff; color: #9b8fc7; }
    .btn.full { width: 100%; text-align: center; }
    .btn.dark { background: #1a1a1a; border-color: #1a1a1a; }
    #sync-status { font-size: 10px; color: #aaa; margin-top: 6px; min-height: 14px; padding: 0 16px 8px; }
    #sync-status.ok  { color: #4caf7d; }
    #sync-status.err { color: #e05c5c; }
    #toast { position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%); background: #1a1a1a; color: #fff; font-family: 'ChosunGu', sans-serif; font-size: 11px; padding: 8px 18px; border: 1px solid #444; opacity: 0; transition: opacity 0.18s; pointer-events: none; white-space: nowrap; z-index: 999; }
    #toast.show { opacity: 1; }
    .info { font-size: 10.5px; color: #999; margin-top: 8px; line-height: 1.6; }
  </style>
</head>
<body>
  <div class="window">
    <div class="titlebar">
      <span>C:// SETTINGS</span>
      <span style="opacity:0.75;cursor:default">⚙</span>
    </div>
    <div class="tabs">
      <button class="tab-btn active" data-tab="theme">테마</button>
      <button class="tab-btn" data-tab="titlebar">타이틀바</button>
      <button class="tab-btn" data-tab="widgets">위젯</button>
      <button class="tab-btn" data-tab="ask">✦ Claude</button>
    </div>

    <!-- 테마 -->
    <div class="tab-pane active" id="tab-theme">
      <div class="section">
        <h3>색상 팔레트 (4색)</h3>
        <div class="color-row"><span class="c-label">타이틀바</span><input type="color" id="c-win" /><input type="text" class="hex-input" id="c-win-hex" maxlength="7" /></div>
        <div class="color-row"><span class="c-label">강조색</span><input type="color" id="c-accent" /><input type="text" class="hex-input" id="c-accent-hex" maxlength="7" /></div>
        <div class="color-row"><span class="c-label">배경</span><input type="color" id="c-bg" /><input type="text" class="hex-input" id="c-bg-hex" maxlength="7" /></div>
        <div class="color-row"><span class="c-label">텍스트</span><input type="color" id="c-ink" /><input type="text" class="hex-input" id="c-ink-hex" maxlength="7" /></div>
      </div>
      <div class="btn-row">
        <button class="btn ghost" id="btn-suggest">✨ Claude 팔레트 추천</button>
        <button class="btn" id="btn-apply-theme">저장</button>
      </div>
      <div id="suggest-area" style="display:none;margin-top:14px;">
        <h3>추천 팔레트 <span style="font-size:10px;text-transform:none;letter-spacing:0;color:#bbb">클릭해서 적용</span></h3>
        <div class="suggest-grid" id="suggest-grid"></div>
      </div>
      <div class="preview-wrap">
        <div class="preview-label">미리보기</div>
        <div class="preview-win">
          <div class="preview-tb"><span>C:// WIDGET</span><span>⚙</span></div>
          <div class="preview-body">위젯 내용 샘플<br /><div class="preview-btn">버튼</div></div>
        </div>
      </div>
    </div>

    <!-- 타이틀바 -->
    <div class="tab-pane" id="tab-titlebar">
      <div class="section">
        <h3>크기</h3>
        <div class="slider-row">
          <div class="s-label">최소 높이 <span id="tb-h-val">24px</span></div>
          <input type="range" id="tb-height" min="18" max="48" value="24" />
        </div>
        <div class="slider-row">
          <div class="s-label">폰트 크기 <span id="tb-fs-val">11px</span></div>
          <input type="range" id="tb-fontsize" min="9" max="16" value="11" />
        </div>
      </div>
      <div class="section">
        <h3>구성 요소</h3>
        <div class="cb-row"><label><input type="checkbox" id="tb-gear" checked /> ⚙ 설정 아이콘</label></div>
        <div class="cb-row"><label><input type="checkbox" id="tb-time" /> 🕐 현재 시각</label></div>
        <div class="cb-row"><label><input type="checkbox" id="tb-date" /> 📅 오늘 날짜</label></div>
        <label class="field-label">우측 커스텀 텍스트</label>
        <input type="text" class="text-input" id="tb-custom" placeholder="비워두면 표시 안 함" />
      </div>
      <div class="tb-preview-wrap">
        <div class="tb-preview-label">미리보기</div>
        <div class="tb-preview-win">
          <div id="tb-preview-bar"><span>C:// WIDGET</span><span id="tb-preview-right">⚙</span></div>
          <div class="tb-preview-body"><div></div><div></div><div></div></div>
        </div>
      </div>
      <div class="btn-row" style="margin-top:16px;">
        <button class="btn" id="btn-apply-titlebar">저장</button>
      </div>
    </div>

    <!-- 위젯 -->
    <div class="tab-pane" id="tab-widgets">
      <div class="section">
        <h3>📁 Folders 위젯</h3>
        <div id="folder-list"></div>
        <button class="btn ghost" id="btn-add-folder" style="margin-top:6px;padding:5px 12px;font-size:11px">+ 폴더 추가</button>
        <div class="btn-row"><button class="btn" id="btn-apply-folders">저장</button></div>
      </div>
      <div class="section">
        <h3>🕐 Clock 위젯</h3>
        <div class="option-row">
          <label><input type="radio" name="clock-fmt" value="12h" id="fmt-12" checked /> 12시간 (AM/PM)</label>
          <label><input type="radio" name="clock-fmt" value="24h" id="fmt-24" /> 24시간</label>
        </div>
        <div class="cb-row"><label><input type="checkbox" id="clock-date" checked /> 날짜 표시</label></div>
        <div class="cb-row"><label><input type="checkbox" id="clock-day" checked /> 요일 표시</label></div>
        <div class="btn-row"><button class="btn" id="btn-apply-clock">저장</button></div>
      </div>
      <div class="section">
        <h3>📝 Memo 위젯</h3>
        <label class="field-label">소스 DB ID</label>
        <input type="text" class="text-input" id="memo-src-db" />
        <label class="field-label">최대 표시 메모 수</label>
        <input type="number" class="text-input" id="memo-max" min="10" max="200" style="width:80px" />
        <div class="section" style="margin-top:14px;margin-bottom:0">
          <h3>라우팅 대상</h3>
          <div class="cb-row"><label><input type="checkbox" class="memo-route" value="diary" checked /> 📔 다이어리</label></div>
          <div class="cb-row"><label><input type="checkbox" class="memo-route" value="todo" checked /> ✅ TO-DO</label></div>
          <div class="cb-row"><label><input type="checkbox" class="memo-route" value="cart" checked /> 🛒 장바구니</label></div>
          <div class="cb-row"><label><input type="checkbox" class="memo-route" value="idea" checked /> 💡 아이디어</label></div>
          <div class="cb-row"><label><input type="checkbox" class="memo-route" value="bookmark" checked /> 🔖 북마크</label></div>
        </div>
        <div class="btn-row"><button class="btn" id="btn-apply-memo">저장</button></div>
      </div>
    </div>

    <!-- Ask Claude - 3-step flow -->
    <div class="tab-pane" id="tab-ask">
      <!-- Step indicator -->
      <div class="ask-step-header">
        <div class="ask-step-dots">
          <div class="ask-dot active" id="dot1">1</div>
          <div class="ask-dot-line"></div>
          <div class="ask-dot" id="dot2">2</div>
          <div class="ask-dot-line"></div>
          <div class="ask-dot" id="dot3">3</div>
        </div>
        <div class="ask-step-title" id="ask-step-title">위젯 선택</div>
      </div>

      <!-- Step 1: 위젯 선택 -->
      <div id="ask-s1">
        <h3>어떤 위젯을 수정할까요?</h3>
        <div class="ask-widget-grid" id="ask-widget-grid"></div>
        <p class="info">여러 개 선택 가능</p>
        <div class="btn-row" style="margin-top:14px">
          <button class="btn" id="ask-next1">다음 →</button>
        </div>
      </div>

      <!-- Step 2: 변경 부분 선택 -->
      <div id="ask-s2" style="display:none">
        <h3>어떤 부분을 바꾸고 싶나요?</h3>
        <div class="ask-part-list" id="ask-parts-list"></div>
        <div class="btn-row">
          <button class="btn ghost" id="ask-back2">← 이전</button>
          <button class="btn" id="ask-next2">다음 →</button>
        </div>
      </div>

      <!-- Step 3: 변경 내용 입력 + 전송 -->
      <div id="ask-s3" style="display:none">
        <h3>어떻게 바꾸고 싶나요?</h3>
        <div class="ask-summary" id="ask-summary"></div>
        <textarea class="ask-textarea" id="ask-text" placeholder="구체적으로 설명해주세요..."></textarea>
        <div class="btn-row" style="margin-top:12px">
          <button class="btn ghost" id="ask-back3">← 이전</button>
          <button class="btn dark" id="btn-send-claude">✦ Claude에게 전달</button>
        </div>
        <p class="info">클릭 → 프롬프트 복사 + claude.ai 새 탭 오픈</p>
      </div>
    </div>
  </div>

  <div id="sync-status"></div>
  <div id="toast"></div>

  <script>
    const DEFAULTS = {
      theme:    { winColor:'#1a1a1a', accent:'#9b8fc7', windowBg:'#ffffff', ink:'#111111' },
      titlebar: { height:24, fontSize:11, showGear:true, showTime:false, showDate:false, customText:'' },
      folders: [
        { name:'Diary', colorBody:'#d8ccf0', colorTab:'#b8a8d8', type:'diary-api', url:'' },
        { name:'Book',  colorBody:'#c8c8c8', colorTab:'#a0a0a0', type:'url', url:'https://www.notion.so/37851f4140c580c995d6f55451f2c1f7' },
      ],
      clock: { format:'12h', showDate:true, showDay:true },
      memo:  { srcDbId:'37751f4140c580e4b680c979ee1d0f2a', maxItems:60, routes:['diary','todo','cart','idea','bookmark'] },
    };

    function deep(o) { return JSON.parse(JSON.stringify(o)); }
    let S = deep(DEFAULTS);

    /* 탭 */
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('tab-'+btn.dataset.tab).classList.add('active');
      });
    });

    /* Notion에서 설정 로드 */
    async function loadFromNotion() {
      setSyncStatus('loading', 'Notion에서 설정 읽는 중...');
      try {
        const res = await fetch('/api/settings');
        if (!res.ok) throw new Error('HTTP '+res.status);
        const remote = await res.json();
        S = Object.assign(deep(DEFAULTS), remote);
        populateUI();
        setSyncStatus('ok', '✓ Notion 연동됨');
      } catch(e) {
        try {
          const local = JSON.parse(localStorage.getItem('wg_settings')||'null');
          if (local) { S = Object.assign(deep(DEFAULTS), local); populateUI(); }
        } catch(_){}
        setSyncStatus('err', '⚠️ Notion 연동 실패 (로컬 설정 사용중)');
      }
      buildWidgetCards();
    }

    /* Notion에 저장 */
    async function saveToNotion() {
      setSyncStatus('loading', 'Notion에 저장 중...');
      localStorage.setItem('wg_settings', JSON.stringify(S));
      try {
        const res = await fetch('/api/settings', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(S),
        });
        if (!res.ok) throw new Error('HTTP '+res.status);
        setSyncStatus('ok', '✓ Notion 저장 완료 — 모든 디바이스에 적용됩니다');
        showToast('저장 완료');
      } catch(e) {
        setSyncStatus('err', '⚠️ Notion 저장 실패 (로컬에만 저장됨): '+e.message);
        showToast('로컬에만 저장됨', 4000);
      }
    }

    function setSyncStatus(type, msg) {
      const el = document.getElementById('sync-status');
      if (!el) return;
      el.textContent = msg;
      el.className = type === 'ok' ? 'ok' : type === 'err' ? 'err' : '';
    }

    /* UI 입력값 반영 */
    function populateUI() {
      applyThemeInputs(S.theme);
      document.getElementById('tb-height').value   = S.titlebar.height;
      document.getElementById('tb-fontsize').value  = S.titlebar.fontSize;
      document.getElementById('tb-h-val').textContent  = S.titlebar.height+'px';
      document.getElementById('tb-fs-val').textContent = S.titlebar.fontSize+'px';
      document.getElementById('tb-gear').checked   = S.titlebar.showGear!==false;
      document.getElementById('tb-time').checked   = !!S.titlebar.showTime;
      document.getElementById('tb-date').checked   = !!S.titlebar.showDate;
      document.getElementById('tb-custom').value   = S.titlebar.customText||'';
      updateTbPreview();
      if(S.clock.format==='24h') document.getElementById('fmt-24').checked=true;
      else document.getElementById('fmt-12').checked=true;
      document.getElementById('clock-date').checked = S.clock.showDate!==false;
      document.getElementById('clock-day').checked  = S.clock.showDay!==false;
      document.getElementById('memo-src-db').value  = S.memo.srcDbId||'';
      document.getElementById('memo-max').value     = S.memo.maxItems||60;
      document.querySelectorAll('.memo-route').forEach(cb => cb.checked=(S.memo.routes||[]).includes(cb.value));
      renderFolders();
      buildWidgetCards();
    }

    /* 색상 */
    function bindColor(pid,hid,cssVar){
      const p=document.getElementById(pid),h=document.getElementById(hid);
      p.addEventListener('input',()=>{h.value=p.value;document.documentElement.style.setProperty(cssVar,p.value);});
      h.addEventListener('input',()=>{if(/^#[0-9a-fA-F]{6}$/.test(h.value)){p.value=h.value;document.documentElement.style.setProperty(cssVar,h.value);}});
    }
    bindColor('c-win','c-win-hex','--p-win');
    bindColor('c-accent','c-accent-hex','--p-accent');
    bindColor('c-bg','c-bg-hex','--p-bg');
    bindColor('c-ink','c-ink-hex','--p-ink');

    function applyThemeInputs(t){
      [['c-win',t.winColor],['c-accent',t.accent],['c-bg',t.windowBg],['c-ink',t.ink]].forEach(([id,val])=>{
        document.getElementById(id).value=val;
        document.getElementById(id+'-hex').value=val;
      });
      document.documentElement.style.setProperty('--p-win',t.winColor);
      document.documentElement.style.setProperty('--p-accent',t.accent);
      document.documentElement.style.setProperty('--p-bg',t.windowBg);
      document.documentElement.style.setProperty('--p-ink',t.ink);
    }
    applyThemeInputs(S.theme);

    document.getElementById('btn-apply-theme').addEventListener('click', async () => {
      S.theme={winColor:document.getElementById('c-win').value,accent:document.getElementById('c-accent').value,windowBg:document.getElementById('c-bg').value,ink:document.getElementById('c-ink').value};
      await saveToNotion();
    });

    /* Claude 팔레트 */
    document.getElementById('btn-suggest').addEventListener('click', async () => {
      const btn=document.getElementById('btn-suggest'),grid=document.getElementById('suggest-grid');
      btn.disabled=true; btn.textContent='분석 중...';
      document.getElementById('suggest-area').style.display='none';
      try {
        const res=await fetch('/api/suggest-colors?color='+encodeURIComponent(document.getElementById('c-win').value));
        const data=await res.json();
        if(!data.palettes) throw new Error(data.error||'응답 오류');
        grid.innerHTML='';
        data.palettes.forEach(p=>{
          const card=document.createElement('div'); card.className='suggest-card';
          card.innerHTML=`<div class="swatch-row"><div class="swatch" style="background:${p.winColor}"></div><div class="swatch" style="background:${p.accent}"></div><div class="swatch" style="background:${p.windowBg}"></div><div class="swatch" style="background:${p.ink}"></div></div><div class="suggest-name">${p.description}</div>`;
          card.addEventListener('click',()=>{document.querySelectorAll('.suggest-card').forEach(c=>c.classList.remove('selected'));card.classList.add('selected');applyThemeInputs(p);});
          grid.appendChild(card);
        });
        document.getElementById('suggest-area').style.display='block';
      } catch(e){showToast('추천 실패: '+e.message,4000);}
      btn.disabled=false; btn.textContent='✨ Claude 팔레트 추천';
    });

    /* 타이틀바 */
    const slH=document.getElementById('tb-height'),slFs=document.getElementById('tb-fontsize');
    const prevBar=document.getElementById('tb-preview-bar'),prevRight=document.getElementById('tb-preview-right');
    function updateTbPreview(){
      prevBar.style.minHeight=slH.value+'px';
      prevBar.style.fontSize=slFs.value+'px';
      const right=[];
      if(document.getElementById('tb-time').checked) right.push(new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'}));
      if(document.getElementById('tb-date').checked) right.push(new Date().toLocaleDateString('ko-KR',{month:'numeric',day:'numeric'}));
      const custom=document.getElementById('tb-custom').value.trim();
      if(custom) right.push(custom);
      if(document.getElementById('tb-gear').checked) right.push('⚙');
      prevRight.textContent=right.join('  ')||'';
    }
    slH.addEventListener('input',()=>{document.getElementById('tb-h-val').textContent=slH.value+'px';updateTbPreview();});
    slFs.addEventListener('input',()=>{document.getElementById('tb-fs-val').textContent=slFs.value+'px';updateTbPreview();});
    ['tb-gear','tb-time','tb-date'].forEach(id=>document.getElementById(id).addEventListener('change',updateTbPreview));
    document.getElementById('tb-custom').addEventListener('input',updateTbPreview);
    document.getElementById('btn-apply-titlebar').addEventListener('click', async () => {
      S.titlebar={height:+slH.value,fontSize:+slFs.value,showGear:document.getElementById('tb-gear').checked,showTime:document.getElementById('tb-time').checked,showDate:document.getElementById('tb-date').checked,customText:document.getElementById('tb-custom').value.trim()};
      await saveToNotion();
    });

    /* 폴더 */
    function renderFolders(){
      const list=document.getElementById('folder-list'); list.innerHTML='';
      S.folders.forEach((f,i)=>{
        const wrap=document.createElement('div'); wrap.className='folder-item-wrap';
        const row=document.createElement('div'); row.className='folder-item';
        row.innerHTML=`<input type="color" value="${f.colorTab}" title="탭색" /><input type="color" value="${f.colorBody}" title="본문색" /><input type="text" class="fi-name" value="${f.name}" /><select class="fi-type"><option value="diary-api" ${f.type==='diary-api'?'selected':''}>다이어리 API</option><option value="url" ${f.type==='url'?'selected':''}>직접 URL</option></select><button class="icon-btn" data-a="up">↑</button><button class="icon-btn" data-a="dn">↓</button><button class="icon-btn" data-a="del">✕</button>`;
        const extra=document.createElement('div'); extra.className='folder-extra';
        extra.style.display=f.type==='url'?'block':'none';
        extra.innerHTML=`<label>URL</label><input class="fi-url" type="text" value="${f.url||''}" placeholder="https://www.notion.so/..." />`;
        row.querySelector('.fi-type').addEventListener('change',e=>extra.style.display=e.target.value==='url'?'block':'none');
        row.querySelector('[data-a=del]').addEventListener('click',()=>{S.folders.splice(i,1);renderFolders();});
        row.querySelector('[data-a=up]').addEventListener('click',()=>{if(i>0){[S.folders[i-1],S.folders[i]]=[S.folders[i],S.folders[i-1]];renderFolders();}});
        row.querySelector('[data-a=dn]').addEventListener('click',()=>{if(i<S.folders.length-1){[S.folders[i],S.folders[i+1]]=[S.folders[i+1],S.folders[i]];renderFolders();}});
        wrap.appendChild(row); wrap.appendChild(extra); list.appendChild(wrap);
      });
    }
    document.getElementById('btn-add-folder').addEventListener('click',()=>{
      S.folders.push({name:'새 폴더',colorBody:'#e0e0e0',colorTab:'#c8c8c8',type:'url',url:''});
      renderFolders();
      document.getElementById('folder-list').lastElementChild.querySelector('.fi-name').focus();
    });
    document.getElementById('btn-apply-folders').addEventListener('click', async () => {
      S.folders=Array.from(document.getElementById('folder-list').children).map(wrap=>{
        const row=wrap.querySelector('.folder-item'),extra=wrap.querySelector('.folder-extra');
        const colors=row.querySelectorAll('input[type=color]');
        return{name:row.querySelector('.fi-name').value.trim()||'폴더',colorTab:colors[0].value,colorBody:colors[1].value,type:row.querySelector('.fi-type').value,url:extra?extra.querySelector('.fi-url').value.trim():''};
      });
      await saveToNotion();
      buildWidgetCards();
    });

    /* Clock */
    document.getElementById('btn-apply-clock').addEventListener('click', async () => {
      S.clock={format:document.querySelector('input[name=clock-fmt]:checked').value,showDate:document.getElementById('clock-date').checked,showDay:document.getElementById('clock-day').checked};
      await saveToNotion();
    });

    /* Memo */
    document.getElementById('btn-apply-memo').addEventListener('click', async () => {
      S.memo={srcDbId:document.getElementById('memo-src-db').value.trim(),maxItems:+document.getElementById('memo-max').value,routes:Array.from(document.querySelectorAll('.memo-route:checked')).map(c=>c.value)};
      await saveToNotion();
    });

    /* ============================================================
       Ask Claude — 3-step flow
       ============================================================ */

    /* 위젯 카탈로그 (고정 + 폴더에서 동적 생성) */
    const FIXED_WIDGETS = [
      { id:'clock',    icon:'🕐', label:'Clock',    file:'widgets/clock/index.html',      parts:['디자인 변경','숫자/폰트 스타일','12h/24h 형식','날짜·요일 표시','애니메이션','기타'] },
      { id:'memo',     icon:'📝', label:'Memo',     file:'widgets/log/index.html',         parts:['라우팅 로직','DB 구성','UI/디자인','새 기능 추가','기타'] },
      { id:'folders',  icon:'📁', label:'Folders',  file:'widgets/folders/index.html',     parts:['폴더 디자인','연결 대상 변경','폴더 추가/삭제','애니메이션','기타'] },
      { id:'habit',    icon:'📋', label:'Habit',    file:'widgets/habittracker/index.html',parts:['트래커 항목','디자인 변경','DB 연동','기타'] },
      { id:'settings', icon:'⚙',  label:'Settings', file:'settings/index.html',            parts:['UI 개선','새 설정 항목 추가','Claude 탭 개선','기타'] },
      { id:'new',      icon:'✦',  label:'새 위젯',  file:'',                               parts:['어떤 위젯인지 설명해주세요'] },
    ];

    let askSelectedWidgets = [];
    let askSelectedParts   = [];
    let askCurrentStep     = 1;

    function getWidgetCatalog() {
      const catalog = [...FIXED_WIDGETS];
      /* 폴더 설정에서 각 폴더도 추가 (diary-api 같은 경우) */
      S.folders.forEach(f => {
        catalog.splice(2, 0, {
          id: 'folder-'+f.name,
          icon: '📂',
          label: f.name+' 폴더',
          file: 'widgets/folders/index.html',
          parts: ['연결 대상 변경','색상 변경','아이콘 변경','기타'],
        });
      });
      return catalog;
    }

    function buildWidgetCards() {
      const grid = document.getElementById('ask-widget-grid');
      grid.innerHTML = '';
      getWidgetCatalog().forEach(w => {
        const el = document.createElement('div');
        el.className = 'ask-wcard';
        el.dataset.id = w.id;
        el.innerHTML = `<span class="wc-icon">${w.icon}</span>${w.label}`;
        el.addEventListener('click', () => el.classList.toggle('sel'));
        grid.appendChild(el);
      });
    }

    function setAskStep(n) {
      askCurrentStep = n;
      ['ask-s1','ask-s2','ask-s3'].forEach((id,i) => {
        document.getElementById(id).style.display = (i+1===n) ? '' : 'none';
      });
      const titles = ['위젯 선택','변경 부분 선택','변경 내용 입력'];
      document.getElementById('ask-step-title').textContent = titles[n-1];
      [1,2,3].forEach(i => {
        const dot = document.getElementById('dot'+i);
        dot.className = 'ask-dot' + (i < n ? ' done' : i === n ? ' active' : '');
      });
    }

    /* Step 1 → 2 */
    document.getElementById('ask-next1').addEventListener('click', () => {
      askSelectedWidgets = Array.from(document.querySelectorAll('.ask-wcard.sel')).map(el => {
        return getWidgetCatalog().find(w => w.id === el.dataset.id);
      }).filter(Boolean);
      if (!askSelectedWidgets.length) { showToast('위젯을 하나 이상 선택해주세요', 2500); return; }

      /* 선택된 위젯들의 parts 합집합 */
      const allParts = [...new Set(askSelectedWidgets.flatMap(w => w.parts))];
      const list = document.getElementById('ask-parts-list');
      list.innerHTML = '';
      allParts.forEach((p, i) => {
        const item = document.createElement('div'); item.className = 'ask-part-item';
        const uid = 'part-'+i;
        item.innerHTML = `<label><input type="checkbox" id="${uid}" value="${p}" style="accent-color:#9b8fc7" /> ${p}</label>`;
        list.appendChild(item);
      });
      setAskStep(2);
    });

    /* Step 2 → 1 */
    document.getElementById('ask-back2').addEventListener('click', () => setAskStep(1));

    /* Step 2 → 3 */
    document.getElementById('ask-next2').addEventListener('click', () => {
      askSelectedParts = Array.from(document.querySelectorAll('#ask-parts-list input:checked')).map(cb => cb.value);

      const widgetNames = askSelectedWidgets.map(w => w.label).join(', ');
      const partNames   = askSelectedParts.length ? askSelectedParts.join(', ') : '(미선택)';
      const summary = document.getElementById('ask-summary');
      summary.innerHTML = `<strong>위젯:</strong> ${widgetNames}<br><strong>변경 부분:</strong> ${partNames}`;

      const ta = document.getElementById('ask-text');
      ta.value = '';
      ta.placeholder = askSelectedWidgets[0]?.id === 'new'
        ? '만들고 싶은 위젯을 설명해주세요...'
        : `${widgetNames}에서 ${partNames}를 어떻게 바꾸고 싶은지 적어주세요...`;
      setAskStep(3);
    });

    /* Step 3 → 2 */
    document.getElementById('ask-back3').addEventListener('click', () => setAskStep(2));

    /* 전송 */
    document.getElementById('btn-send-claude').addEventListener('click', async () => {
      const userText = document.getElementById('ask-text').value.trim();
      if (!userText) { showToast('변경 내용을 입력해주세요', 2500); return; }

      const widgetLines = askSelectedWidgets.map(w => {
        const filePart = w.file ? `  파일: ${w.file}` : '';
        return `- ${w.label}${filePart ? '\n'+filePart : ''}`;
      }).join('\n');
      const partLine = askSelectedParts.length ? askSelectedParts.join(', ') : '미지정';

      const prompt =
`[프로젝트]
GitHub: 45w4s2g96w-ship-it/widget-generator
Vercel: https://widget-generator-theta.vercel.app
브랜치: main (push → Vercel 자동 배포)

[수정 대상]
${widgetLines}

[변경 부분]
${partLine}

[요청]
${userText}

[지시]
레포를 직접 읽고 관련 파일을 파악한 뒤 변경을 구현해주세요.
구현 완료 후 main 브랜치에 push해주세요.`;

      try { await navigator.clipboard.writeText(prompt); }
      catch(e) {
        const ta=document.createElement('textarea'); ta.value=prompt; ta.style.cssText='position:fixed;opacity:0';
        document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
      }
      window.open('https://claude.ai/new','_blank');
      showToast('✓ 프롬프트 복사됨! 새 탭에서 붙여넣기', 5000);
    });

    function showToast(msg,ms){
      const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
      clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),ms||3500);
    }

    /* 초기화 */
    buildWidgetCards();
    loadFromNotion();
  </script>
</body>
</html>
