<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>C:// SETTINGS</title>
  <style>
    @font-face { font-family:'ChosunGu'; src:url('../shared/fonts/ChosunGu.TTF') format('truetype'); font-display:swap; }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:#e8e8e6;font-family:'ChosunGu',sans-serif;display:flex;justify-content:center;padding:24px 16px 56px;min-height:100vh;}
    .window{width:100%;max-width:520px;background:#fff;border:1.5px solid #111;box-shadow:4px 4px 0 #111;}
    .titlebar{background:#1a1a1a;color:#fff;font-size:12px;font-weight:700;padding:6px 10px;display:flex;justify-content:space-between;align-items:center;letter-spacing:.3px;user-select:none;}
    .body{padding:20px 16px 28px;}
    .step-header{display:flex;align-items:center;gap:10px;margin-bottom:20px;}
    .step-dots{display:flex;align-items:center;}
    .sdot{width:24px;height:24px;border-radius:50%;border:1.5px solid #ddd;background:#fff;color:#bbb;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;}
    .sdot.active{border-color:#9b8fc7;background:#9b8fc7;color:#fff;}
    .sdot.done{border-color:#4caf7d;background:#4caf7d;color:#fff;}
    .sdot-line{width:16px;height:1.5px;background:#eee;}
    .step-label{font-size:10px;color:#aaa;letter-spacing:.5px;flex:1;}
    h3{font-size:10.5px;color:#999;letter-spacing:.8px;text-transform:uppercase;margin:0 0 12px;padding-bottom:5px;border-bottom:1px solid #eee;}
    .card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(96px,1fr));gap:8px;margin-bottom:8px;}
    .wcard{border:1.5px solid #ddd;padding:10px 6px 8px;text-align:center;cursor:pointer;font-size:11px;color:#555;transition:all .12s;line-height:1.5;user-select:none;}
    .wcard .wc-icon{font-size:20px;display:block;margin-bottom:4px;}
    .wcard.sel{border-color:#9b8fc7;background:#f5f0ff;color:#7b6fb7;font-weight:700;}
    .wcard.cat{border-style:dashed;}
    .wcard.cat.sel{border-style:solid;}
    .mode-cards{display:flex;gap:10px;margin-bottom:16px;}
    .mcard{flex:1;border:1.5px solid #ddd;padding:12px 10px;cursor:pointer;text-align:center;transition:all .12s;}
    .mcard:hover{border-color:#9b8fc7;}
    .mcard.sel{border-color:#9b8fc7;background:#f5f0ff;}
    .mcard .mc-icon{font-size:18px;display:block;margin-bottom:4px;}
    .mcard .mc-title{font-size:11.5px;font-weight:700;color:#333;margin-bottom:2px;}
    .mcard .mc-desc{font-size:10px;color:#aaa;line-height:1.4;}
    .part-list{margin-bottom:14px;}
    .part-item{margin-bottom:8px;}
    .part-item label{font-size:12px;color:#333;display:flex;align-items:flex-start;gap:8px;cursor:pointer;line-height:1.6;}
    input[type=checkbox],input[type=radio]{accent-color:#9b8fc7;cursor:pointer;}
    .wsec{border:1px solid #ddd;margin-bottom:10px;}
    .wsec-head{background:#f4f4f2;padding:7px 12px;font-size:11px;font-weight:700;color:#555;display:flex;align-items:center;gap:6px;}
    .wsec-body{padding:10px 12px 12px;}
    .summary{background:#f4f4f2;border:1px solid #ddd;padding:8px 12px;margin-bottom:12px;font-size:10.5px;color:#555;line-height:1.9;}
    .summary strong{color:#9b8fc7;}
    .ask-ta{font-family:'ChosunGu',sans-serif;font-size:12px;line-height:1.7;border:1.5px solid #ddd;padding:10px 12px;width:100%;min-height:100px;resize:vertical;outline:none;color:#111;}
    .ask-ta:focus{border-color:#9b8fc7;}
    .ask-ta.sm{min-height:70px;}
    .btn-row{display:flex;gap:8px;margin-top:14px;}
    .btn{font-family:'ChosunGu',sans-serif;font-size:11.5px;border:1.5px solid #9b8fc7;background:#9b8fc7;color:#fff;padding:7px 16px;cursor:pointer;letter-spacing:.2px;}
    .btn:hover{filter:brightness(1.1);} .btn:active{filter:brightness(.9);} .btn:disabled{opacity:.45;cursor:default;filter:none;}
    .btn.ghost{background:#fff;color:#9b8fc7;}
    .btn.dark{background:#1a1a1a;border-color:#1a1a1a;}
    .btn.full{width:100%;text-align:center;padding:9px 16px;font-size:12px;}
    .info{font-size:10.5px;color:#aaa;margin-top:8px;line-height:1.6;text-align:center;}
    #sync-status{font-size:10px;color:#aaa;margin-top:4px;text-align:center;}
    #sync-status.ok{color:#4caf7d;} #sync-status.err{color:#e05c5c;}
    #toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;font-family:'ChosunGu',sans-serif;font-size:11px;padding:8px 18px;border:1px solid #444;opacity:0;transition:opacity .18s;pointer-events:none;white-space:nowrap;z-index:999;}
    #toast.show{opacity:1;}
  </style>
</head>
<body>
<div class="window">
  <div class="titlebar">
    <span>C:// SETTINGS &rarr; Claude Code</span>
    <span style="opacity:.75;cursor:default">&#9881;</span>
  </div>
  <div class="body">
    <div class="step-header">
      <div class="step-dots">
        <div class="sdot active" id="dot1">1</div>
        <div class="sdot-line"></div>
        <div class="sdot" id="dot2">2</div>
        <div class="sdot-line"></div>
        <div class="sdot" id="dot3">3</div>
      </div>
      <div class="step-label" id="step-label">무엇을 바꾸고 싶으세요?</div>
    </div>

    <!-- Step 1 -->
    <div id="s1">
      <h3>커테고리</h3>
      <div class="card-grid" id="cat-grid">
        <div class="wcard cat" data-id="theme"><span class="wc-icon">🎨</span>테마</div>
        <div class="wcard cat" data-id="titlebar"><span class="wc-icon">🛠</span>타이틀바</div>
        <div class="wcard cat" data-id="new"><span class="wc-icon">✦</span>새 위젯</div>
      </div>
      <h3 style="margin-top:16px">위젯</h3>
      <div class="card-grid" id="widget-grid"></div>
      <p class="info" style="text-align:left;margin-top:4px">여러 개 선택 가능</p>
      <div class="btn-row" style="margin-top:16px">
        <button class="btn" id="next1">다음 →</button>
      </div>
    </div>

    <!-- Step 2 -->
    <div id="s2" style="display:none">
      <div id="s2-mode" style="display:none;margin-bottom:16px">
        <h3>적용 방식</h3>
        <div class="mode-cards">
          <div class="mcard sel" id="mc-bulk"><span class="mc-icon">⚡</span><div class="mc-title">일괄 적용</div><div class="mc-desc">선택한 모든 항목에<br>같은 변경</div></div>
          <div class="mcard" id="mc-each"><span class="mc-icon">🎯</span><div class="mc-title">각각 커스텀</div><div class="mc-desc">항목마다 다른<br>변경 내용</div></div>
        </div>
      </div>
      <h3>어떤 부분을 바꾸고 싶나요?</h3>
      <div class="part-list" id="parts-bulk"></div>
      <div class="btn-row">
        <button class="btn ghost" id="back2">← 이전</button>
        <button class="btn" id="next2">다음 →</button>
      </div>
    </div>

    <!-- Step 3 -->
    <div id="s3" style="display:none">
      <div class="summary" id="summary"></div>
      <div id="s3-bulk"><textarea class="ask-ta" id="ta-bulk" placeholder="구체적으로 설명해주세요..."></textarea></div>
      <div id="s3-each" style="display:none"><div id="each-secs"></div></div>
      <div class="btn-row" style="margin-top:14px">
        <button class="btn ghost" id="back3">← 이전</button>
        <button class="btn dark full" id="btn-send">✦ Claude Code에 보내기</button>
      </div>
      <p class="info">프롬프트 복사 + claude.ai/code 오픈 &rarr; Ctrl+V</p>
    </div>
  </div>
</div>
<div id="sync-status"></div>
<div id="toast"></div>

<script>
const DEFAULTS={
  theme:{winColor:'#1a1a1a',accent:'#9b8fc7',windowBg:'#ffffff',ink:'#111111'},
  titlebar:{height:24,fontSize:11,showGear:true,showTime:false,showDate:false,customText:''},
  folders:[
    {name:'Diary',colorBody:'#d8ccf0',colorTab:'#b8a8d8',type:'diary-api',url:''},
    {name:'Book', colorBody:'#c8c8c8',colorTab:'#a0a0a0',type:'url',url:'https://www.notion.so/37851f4140c580c995d6f55451f2c1f7'},
  ],
  clock:{format:'12h',showDate:true,showDay:true},
  memo:{srcDbId:'37751f4140c580e4b680c979ee1d0f2a',maxItems:60,routes:['diary','todo','cart','idea','bookmark']},
  todo:{dbId:'37651f4140c5805e875cdc92a5715d21'},
};
function deep(o){return JSON.parse(JSON.stringify(o));}
let S=deep(DEFAULTS);

const SYSTEM_CATS=[
  {id:'theme',   icon:'🎨',label:'테마',    cat:true, parts:['위도우 색상','강조색','배경색','텍스트 색상','전체 팔레트']},
  {id:'titlebar',icon:'🛠',label:'타이틀바', cat:true, file:'shared/tokens.css', parts:['높이/폰트 크기','우측 요소','시각/날짜','커스텀 텍스트']},
  {id:'new',     icon:'✦', label:'새 위젯',cat:true, parts:['어떤 위젯인지 설명해주세요']},
];
const FIXED_WIDGETS=[
  {id:'clock',   icon:'🕐',label:'Clock',   file:'widgets/clock/index.html',        parts:['디자인 전체','숫자/폰트','12h/24h 형식','날짜·요일','애니메이션','기타']},
  {id:'memo',    icon:'📝',label:'Memo',    file:'widgets/log/index.html',           parts:['라우팅 로직','DB 구성','UI/디자인','새 기능','기타']},
  {id:'todo',    icon:'✅',label:'Todo',    file:'widgets/todo/index.html',          parts:['항목 표시','체크/완료 로직','DB 구성','디자인','필터/정렬','기타'], dbId:'37651f4140c5805e875cdc92a5715d21'},
  {id:'folders', icon:'📁',label:'Folders', file:'widgets/folders/index.html',      parts:['폴더 디자인','연결 대상','폴더 추가/삭제','애니메이션','기타']},
  {id:'habit',   icon:'📋',label:'Habit',   file:'widgets/habittracker/index.html', parts:['항목 목록','디자인','DB 연동','기타']},
  {id:'settings',icon:'⚙', label:'Settings',file:'settings/index.html',             parts:['UI 개선','새 항목 추가','Claude 탭 개선','기타']},
];

function getAllItems(){
  const fi=(S.folders||[]).map(f=>({
    id:'f-'+f.name,icon:'📂',label:f.name+' 폴더',file:'widgets/folders/index.html',
    parts:['연결 대상','색상','아이콘','애니메이션','기타'],
  }));
  return [...SYSTEM_CATS,...FIXED_WIDGETS,...fi];
}

/* 위젯 카드만 동적 생성 (카테고리는 HTML 고정) */
function buildWidgetCards(){
  const grid=document.getElementById('widget-grid');
  grid.innerHTML='';
  getAllItems().filter(i=>!i.cat).forEach(w=>{
    const el=document.createElement('div');
    el.className='wcard';el.dataset.id=w.id;
    el.innerHTML=`<span class="wc-icon">${w.icon}</span>${w.label}`;
    el.addEventListener('click',()=>el.classList.toggle('sel'));
    grid.appendChild(el);
  });
}

/* 카테고리 카드: 리스너 한 번만 등록 (HTML 고정 요소) */
document.querySelectorAll('#cat-grid .wcard').forEach(el=>{
  el.addEventListener('click',()=>el.classList.toggle('sel'));
});

async function loadFromNotion(){
  try{
    const res=await fetch('/api/settings');
    if(!res.ok) throw new Error();
    S=Object.assign(deep(DEFAULTS),await res.json());
    document.getElementById('sync-status').textContent='✓ Notion 연동';
    document.getElementById('sync-status').className='ok';
  }catch{
    try{const l=JSON.parse(localStorage.getItem('wg_settings')||'null');if(l)S=Object.assign(deep(DEFAULTS),l);}catch{}
    document.getElementById('sync-status').textContent='⚠️ 로컈 설정 사용중';
    document.getElementById('sync-status').className='err';
  }
  buildWidgetCards();
}

let selItems=[],mode='bulk',selParts=[];

function setStep(n){
  ['s1','s2','s3'].forEach((id,i)=>document.getElementById(id).style.display=(i+1===n)?'':'none');
  const labels=['무엇을 바꾸고 싶으세요?','어떤 부분을?','어떻게 바꾸치?'];
  document.getElementById('step-label').textContent=labels[n-1];
  [1,2,3].forEach(i=>{
    const d=document.getElementById('dot'+i);
    d.className='sdot'+(i<n?' done':i===n?' active':'');
  });
}

document.getElementById('next1').addEventListener('click',()=>{
  const all=getAllItems();
  selItems=Array.from(document.querySelectorAll('.wcard.sel')).map(el=>all.find(w=>w.id===el.dataset.id)).filter(Boolean);
  if(!selItems.length){showToast('항목을 하나 이상 선택해주세요',2500);return;}
  const multi=selItems.length>1;
  document.getElementById('s2-mode').style.display=multi?'':'none';
  if(!multi)mode='bulk';
  const allParts=[...new Set(selItems.flatMap(w=>w.parts))];
  const list=document.getElementById('parts-bulk');list.innerHTML='';
  allParts.forEach((p,i)=>{
    const item=document.createElement('div');item.className='part-item';
    item.innerHTML=`<label><input type="checkbox" id="bp${i}" value="${p}"> ${p}</label>`;
    list.appendChild(item);
  });
  setStep(2);
});

['mc-bulk','mc-each'].forEach(id=>{
  document.getElementById(id).addEventListener('click',()=>{
    mode=id==='mc-bulk'?'bulk':'each';
    document.getElementById('mc-bulk').classList.toggle('sel',mode==='bulk');
    document.getElementById('mc-each').classList.toggle('sel',mode==='each');
  });
});

document.getElementById('back2').addEventListener('click',()=>setStep(1));

document.getElementById('next2').addEventListener('click',()=>{
  selParts=Array.from(document.querySelectorAll('#parts-bulk input:checked')).map(cb=>cb.value);
  const names=selItems.map(w=>w.label).join(', ');
  const parts=selParts.length?selParts.join(', '):'(미선택)';
  document.getElementById('summary').innerHTML=`<strong>대상:</strong> ${names}<br><strong>부분:</strong> ${parts}`;
  if(mode==='each'){
    document.getElementById('s3-bulk').style.display='none';
    document.getElementById('s3-each').style.display='';
    const secs=document.getElementById('each-secs');secs.innerHTML='';
    selItems.forEach(w=>{
      const sec=document.createElement('div');sec.className='wsec';
      sec.innerHTML=`<div class="wsec-head">${w.icon} ${w.label}</div><div class="wsec-body"><div class="part-list" id="ep-${w.id}"></div><textarea class="ask-ta sm" id="et-${w.id}" placeholder="${w.label}에서 어떻게 바꾸고 싶은지..."></textarea></div>`;
      secs.appendChild(sec);
      const pl=sec.querySelector(`#ep-${w.id}`);
      w.parts.forEach((p,i)=>{
        const it=document.createElement('div');it.className='part-item';
        it.innerHTML=`<label><input type="checkbox" id="ep-${w.id}-${i}" value="${p}"> ${p}</label>`;
        pl.appendChild(it);
      });
    });
  } else {
    document.getElementById('s3-bulk').style.display='';
    document.getElementById('s3-each').style.display='none';
    const ta=document.getElementById('ta-bulk');
    ta.value='';
    ta.placeholder=selItems[0]?.id==='new'?'만들고 싶은 위젯을 설명해주세요...':`${names}에서 ${parts}를 어떻게 바꾸고 싶은지 설명해주세요...`;
  }
  setStep(3);
});

document.getElementById('back3').addEventListener('click',()=>setStep(2));

document.getElementById('btn-send').addEventListener('click',async()=>{
  let sections=[];
  if(mode==='each'){
    let empty=false;
    selItems.forEach(w=>{
      const parts=Array.from(document.querySelectorAll(`#ep-${w.id} input:checked`)).map(cb=>cb.value);
      const text=document.getElementById(`et-${w.id}`)?.value.trim();
      if(!text)empty=true;
      sections.push({w,parts,text});
    });
    if(empty){showToast('각 항목의 변경 내용을 입력해주세요',2500);return;}
  } else {
    const text=document.getElementById('ta-bulk').value.trim();
    if(!text){showToast('변경 내용을 입력해주세요',2500);return;}
    sections=selItems.map(w=>({w,parts:selParts,text}));
  }
  const body=sections.map(({w,parts,text})=>{
    const lines=[`[${w.label}]`];
    if(w.file) lines.push(`  파일: ${w.file}`);
    if(w.dbId) lines.push(`  DB ID: ${w.dbId}`);
    lines.push(`  변경 부분: ${parts.length?parts.join(', '):'자유'}`);
    lines.push(`  요청: ${text}`);
    return lines.join('\n');
  }).join('\n\n');
  const prompt=`[프로젝트]\nGitHub: 45w4s2g96w-ship-it/widget-generator\nVercel: https://widget-generator-theta.vercel.app\n브랜치: main (push → Vercel 자동 배포)\n\n${body}\n\n[지시]\n레포를 직접 읽고 관련 파일을 파악한 뒤 변경을 구현해주세요.\n완료 후 main 브랜치에 push해주세요.`;
  try{await navigator.clipboard.writeText(prompt);}
  catch{
    const ta=document.createElement('textarea');ta.value=prompt;ta.style.cssText='position:fixed;opacity:0';
    document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);
  }
  window.open('https://claude.ai/code','_blank');
  showToast('✓ 프롬프트 복사됨! 새 탭에서 Ctrl+V',5000);
});

function showToast(msg,ms){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),ms||3500);
}

/* 카테고리 리스너는 위에서 한 번만 등록됨 */
buildWidgetCards();
loadFromNotion();
</script>
</body>
</html>
