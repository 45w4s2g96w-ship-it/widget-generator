<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Widget Generator</title>
<link rel="stylesheet" href="./shared/tokens.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR&family=Noto+Serif+KR&family=Nanum+Gothic&family=Nanum+Myeongjo&family=Nanum+Pen+Script&family=Nanum+Brush+Script&family=Black+Han+Sans&family=Do+Hyeon&family=Jua&family=Gaegu&family=Gowun+Dodum&family=Gowun+Batang&family=Hahmlet&family=Gothic+A1&family=IBM+Plex+Sans+KR&family=Stylish&family=Sunflower&family=Single+Day&family=East+Sea+Dokdo&family=Poor+Story&family=Yeon+Sung&family=Cute+Font&family=Dokdo&family=Gugi&family=Song+Myung&family=Inter&family=Work+Sans&family=Archivo+Black&family=Space+Mono&family=IBM+Plex+Mono&family=Bebas+Neue&family=DM+Mono&family=Sora&family=Manrope&family=Space+Grotesk&family=JetBrains+Mono&family=Syne&family=Unbounded&family=Fraunces&family=Instrument+Serif&family=Roboto&family=Poppins&family=Montserrat&family=Playfair+Display&family=Outfit&family=Plus+Jakarta+Sans&family=Crimson+Text&family=Libre+Baskerville&family=Cormorant+Garamond&family=Public+Sans&display=swap">
<style>
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background: #f4f4f2;
    padding: 16px;
    display: flex;
    gap: 16px;
    align-items: flex-start;
    font-size: 12px;
  }
  .col { flex-shrink: 0; }
  .col h3 { font-size: 12px; margin: 0 0 8px; color: #555; border-bottom: 1px solid var(--border); padding-bottom: 5px; }

  .form-panel { width: 280px; height: calc(100vh - 32px); overflow-y: auto; padding-right: 6px; }
  .right-panel { width: 280px; }

  .field { margin-bottom: 8px; }
  .field label { display: block; font-size: 10px; color: #555; margin-bottom: 2px; }
  .field input, .field select, .field textarea {
    width: 100%;
    border: 1px solid var(--border);
    padding: 4px 5px;
    font-size: 11px;
    font-family: var(--font);
  }
  .color-row { display: flex; gap: 6px; align-items: center; }
  .color-row input[type="color"] { width: 26px; height: 22px; padding: 0; border: 1px solid var(--border); cursor: pointer; }
  .status { font-size: 10px; margin-top: 6px; color: #777; min-height: 14px; }

  .output { margin-top: 10px; }
  .output textarea {
    width: 100%; height: 100px; font-family: monospace; font-size: 9px;
    border: 1px solid var(--border); padding: 5px; resize: vertical;
  }
  .output label { display: flex; justify-content: space-between; align-items: center; font-size: 10px; margin: 8px 0 3px; }
  .copy-btn { font-size: 9px; padding: 2px 6px; cursor: pointer; border: 1px solid var(--border); background: #fff; }

  .clock-time { font-size: 24px; font-weight: 700; letter-spacing: 1px; }
  .habit-row { display: flex; align-items: center; gap: 6px; padding: 2px 0; font-size: 11px; }
  .habit-row .box { width: 10px; height: 10px; border: 1px solid var(--ink); flex-shrink: 0; }
  .habit-row .box.done { background: var(--accent); }

  select[multiple] { height: 80px; }

  .btn-sm { width: 100%; padding: 5px; font-size: 11px; margin-top: 4px; }
</style>
</head>
<body>

  <!-- 정보 입력 -->
  <div class="col form-panel">
    <h3>정보 입력</h3>

    <div class="field">
      <label>위젯 ID (영문, 소문자, 공백없이)</label>
      <input type="text" id="widgetId" placeholder="예: habit">
    </div>

    <div class="field">
      <label>타이틀바 텍스트</label>
      <div style="display:flex; align-items:center; border:1px solid var(--border);">
        <span style="padding:4px 0 4px 5px; font-size:11px; color:#777; white-space:nowrap;">C://</span>
        <input type="text" id="title" placeholder="HABITS" style="border:none; padding:4px 5px;">
      </div>
    </div>

    <div class="field">
      <label>타입</label>
      <select id="type">
        <option value="clock">clock — 시계</option>
        <option value="habit">habit — 체크리스트형</option>
        <option value="textinput">textinput — 텍스트 입력형</option>
        <option value="report">report — 통계/리포트형</option>
      </select>
    </div>

    <div class="field">
      <label>창 색 (color)</label>
      <div class="color-row">
        <input type="color" id="colorPicker" value="#1a1a1a">
        <input type="text" id="color" value="#1a1a1a">
      </div>
    </div>

    <div class="field">
      <label>포인트 색 (accent)</label>
      <div class="color-row">
        <input type="color" id="accentPicker" value="#9b8fc7">
        <input type="text" id="accent" value="#9b8fc7">
      </div>
    </div>

    <div class="field">
      <label>폰트</label>
      <select id="font"></select>
    </div>

    <div class="field">
      <label>내 폰트 파일 직접 올리기 (woff2)</label>
      <input type="file" id="customFontFile" accept=".woff2,.woff,.ttf,.otf">
      <input type="text" id="customFontName" placeholder="이 폰트의 이름 (예: MyFont)" style="margin-top:4px;">
    </div>

    <div class="field">
      <label>Notion 대시보드/DB 링크 (전체 URL)</label>
      <input type="text" id="notionLink" placeholder="https://notion.so/...">
      <button class="btn btn-sm" id="analyzeLinkBtn" type="button">링크 분석하기</button>
    </div>

    <div class="field" id="dbSelectField" style="display:none;">
      <label>데이터베이스 선택</label>
      <select id="dbSelect"></select>
    </div>

    <div class="field" id="propertySelectField" style="display:none;">
      <label>속성 선택 (여러 개 가능, Ctrl/Cmd+클릭)</label>
      <select id="propertySelect" multiple></select>
    </div>

    <div class="field">
      <label>Source DB ID</label>
      <input type="text" id="source_db_id" placeholder="비워둬도 됨">
    </div>

    <div class="field">
      <label>Source Property (콤마로 여러 개 가능)</label>
      <input type="text" id="source_property" placeholder="비워둬도 됨">
    </div>

    <div class="field">
      <label>클로드에게 전달할 커스텀 요청사항 (선택)</label>
      <textarea id="customInstructions" rows="3" placeholder="예: 체크 누르면 바로 Notion에 반영되게 해줘"></textarea>
    </div>

    <button class="btn btn-sm" id="createBtn">위젯 생성 (Settings DB에 저장)</button>
    <button class="btn btn-sm" id="sendToClaudeBtn" type="button">💬 클로드에서 코드 받기</button>
    <button class="btn btn-sm" id="sendToClaudeCodeBtn" type="button">⌨️ Claude Code로 보내기</button>
    <div class="status" id="status"></div>

    <div class="output">
      <label>config.json <button class="copy-btn" onclick="copyText('configOutput')">복사</button></label>
      <textarea id="configOutput" readonly></textarea>
    </div>

    <div class="output">
      <label>클로드 전달용 메시지 (커스텀 요청 포함) <button class="copy-btn" onclick="copyText('claudeMessageOutput')">복사</button></label>
      <textarea id="claudeMessageOutput" readonly style="height:140px;"></textarea>
    </div>
  </div>

  <!-- 정보로 미리보기 -->
  <div class="col right-panel">
    <h3>정보로 미리보기 (샘플 데이터)</h3>
    <div class="window" id="previewWindow">
      <div class="titlebar">
        <span id="previewTitle">C:// CLOCK</span>
        <span class="icons"><span>_</span><span>□</span><span>x</span></span>
      </div>
      <div class="content" id="previewContent"></div>
    </div>
  </div>

<script>
  function sampleContent(type) {
    switch (type) {
      case 'habit':
        return `
          <div class="meta">TODAY</div>
          <div class="habit-row"><div class="box done"></div>아침 산책</div>
          <div class="habit-row"><div class="box done"></div>일기 쓰기</div>
          <div class="habit-row"><div class="box"></div>독서 30분</div>
          <div class="habit-row"><div class="box"></div>스트레칭</div>
        `;
      case 'textinput':
        return `
          <div class="meta">INBOX</div>
          <div style="margin-bottom:10px;">오늘 회의에서 나온 아이디어 정리해야 함</div>
          <button class="btn">SAVE & ROUTE</button>
        `;
      case 'report':
        return `
          <div class="meta">WEEK 25</div>
          <div>일기 작성 5/7<br>투두 완료 12/18<br>키워드: 마감, 산책, 회고</div>
        `;
      case 'clock':
      default:
        const d = new Date();
        const time = String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
        return `
          <div class="meta">${d.toLocaleDateString('ko-KR', { year:'numeric', month:'2-digit', day:'2-digit', weekday:'short' })}</div>
          <div class="clock-time">${time}</div>
        `;
    }
  }

  const FONT_LIST = [
    'Helvetica Neue','Noto Sans KR','Noto Serif KR','Nanum Gothic','Nanum Myeongjo',
    'Nanum Pen Script','Nanum Brush Script','Black Han Sans','Do Hyeon','Jua','Gaegu',
    'Gowun Dodum','Gowun Batang','Hahmlet','Gothic A1','IBM Plex Sans KR',
    'Stylish','Sunflower','Single Day','East Sea Dokdo','Poor Story',
    'Yeon Sung','Cute Font','Dokdo','Gugi','Song Myung',
    'Inter','Work Sans','Archivo Black','Space Mono','IBM Plex Mono',
    'Bebas Neue','DM Mono','Sora','Manrope','Space Grotesk',
    'JetBrains Mono','Syne','Unbounded','Fraunces','Instrument Serif',
    'Roboto','Poppins','Montserrat','Playfair Display','Outfit',
    'Plus Jakarta Sans','Crimson Text','Libre Baskerville','Cormorant Garamond','Public Sans'
  ];

  function renderFontDropdown() {
    const select = document.getElementById('font');
    select.innerHTML = FONT_LIST.map(f =>
      `<option value="${f}" style="font-family:'${f}'">${f}</option>`
    ).join('');

    const savedFont = localStorage.getItem('widgetGenerator_lastFont');
    if (savedFont) select.value = savedFont;

    select.addEventListener('change', () => {
      localStorage.setItem('widgetGenerator_lastFont', select.value);
      updatePreview();
    });
  }
  renderFontDropdown();

  document.getElementById('customFontFile').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      const fontName = document.getElementById('customFontName').value || file.name.split('.')[0];
      const style = document.createElement('style');
      style.textContent = `@font-face { font-family: '${fontName}'; src: url(${reader.result}); }`;
      document.head.appendChild(style);

      const select = document.getElementById('font');
      const opt = document.createElement('option');
      opt.value = fontName;
      opt.textContent = fontName + ' (직접 올림)';
      opt.style.fontFamily = `'${fontName}'`;
      select.prepend(opt);
      select.value = fontName;
      updatePreview();
    };
    reader.readAsDataURL(file);
  });

  let fontLoadTimer;
  function loadGoogleFont(fontName) {
    const familyParam = fontName.trim().replace(/\s+/g, '+');
    const linkId = 'dynamicFontLink-' + familyParam;
    if (document.getElementById(linkId)) return;
    const link = document.createElement('link');
    link.id = linkId;
    link.rel = 'stylesheet';
    link.href = `https://fonts.googleapis.com/css2?family=${familyParam}:wght@400;700;900&display=swap`;
    document.head.appendChild(link);
  }

  function updatePreview() {
    const color = document.getElementById('color').value || '#1a1a1a';
    const accent = document.getElementById('accent').value || '#9b8fc7';
    const fontName = document.getElementById('font').value || 'Helvetica Neue';
    const font = `'${fontName}'`;
    const title = 'C:// ' + (document.getElementById('title').value || 'WIDGET').toUpperCase();
    const type = document.getElementById('type').value;

    clearTimeout(fontLoadTimer);
    fontLoadTimer = setTimeout(() => loadGoogleFont(fontName), 400);

    document.documentElement.style.setProperty('--win-color', color);
    document.documentElement.style.setProperty('--accent', accent);
    document.documentElement.style.setProperty('--font', font);
    document.getElementById('previewTitle').textContent = title;
    document.getElementById('previewContent').innerHTML = sampleContent(type);

    updateConfigOutput();
  }

  function buildConfigFromForm() {
    const fontName = document.getElementById('font').value || 'Helvetica Neue';
    return {
      id: document.getElementById('widgetId').value || 'widget-id',
      title: 'C:// ' + (document.getElementById('title').value || 'WIDGET').toUpperCase(),
      color: document.getElementById('color').value,
      accent: document.getElementById('accent').value,
      font: `'${fontName}'`,
      type: document.getElementById('type').value,
      source_db_id: document.getElementById('source_db_id').value || '',
      source_property: document.getElementById('source_property').value || '',
      mode: 'live'
    };
  }

  function buildClaudeMessage() {
    const config = JSON.stringify(buildConfigFromForm(), null, 2);
    const custom = document.getElementById('customInstructions').value.trim();
    let msg = `이 위젯 만들어줘.

기본 config.json은 아래와 같아 (필요하면 이 타입에 맞게 필드 추가/수정해서 최종본 같이 줘):

${config}

해줘야 할 것:
1. widgets/[id]/index.html 작성 (shared/tokens.css, shared/config-loader.js 사용)
2. 위 config.json을 이 타입에 맞게 최종 확정해서 같이 줘 (필드 빠진 거 있으면 추가)
3. 데이터 연동이 필요한 타입이면 api/[이름].js도 같이 작성해줘`;

    if (custom) {
      msg += `\n\n추가 요청사항:\n${custom}`;
    }
    return msg;
  }

  function updateConfigOutput() {
    document.getElementById('configOutput').value = JSON.stringify(buildConfigFromForm(), null, 2);
    document.getElementById('claudeMessageOutput').value = buildClaudeMessage();
  }

  function copyText(id) {
    const el = document.getElementById(id);
    el.select();
    document.execCommand('copy');
  }

  ['widgetId','title','type','color','accent','source_db_id','source_property','customInstructions'].forEach(id => {
    document.getElementById(id).addEventListener('input', updatePreview);
  });
  document.getElementById('colorPicker').addEventListener('input', e => {
    document.getElementById('color').value = e.target.value; updatePreview();
  });
  document.getElementById('accentPicker').addEventListener('input', e => {
    document.getElementById('accent').value = e.target.value; updatePreview();
  });

  document.getElementById('createBtn').addEventListener('click', async () => {
    const body = buildConfigFromForm();
    delete body.mode;
    if (!body.id) {
      document.getElementById('status').textContent = '위젯 ID를 입력하세요';
      return;
    }
    document.getElementById('status').textContent = '생성 중...';
    try {
      const res = await fetch('/api/create-widget', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      if (res.ok) {
        document.getElementById('status').textContent = 'Settings DB에 저장 완료';
      } else {
        const err = await res.json();
        document.getElementById('status').textContent = '실패: ' + (err.error || res.status);
      }
    } catch (e) {
      document.getElementById('status').textContent = '에러: ' + e.message;
    }
  });

  document.getElementById('sendToClaudeBtn').addEventListener('click', async () => {
    const message = buildClaudeMessage();
    try {
      await navigator.clipboard.writeText(message);
      document.getElementById('status').textContent = '복사 완료! Project 채팅창에 붙여넣기(Ctrl+V) 하세요';
    } catch (e) {
      document.getElementById('status').textContent = '복사 실패 — 아래 메시지를 직접 복사해주세요';
    }
    window.open('https://claude.ai/project/019ee501-a25a-705c-82fd-3bf9d3abca14', '_blank');
  });

  document.getElementById('sendToClaudeCodeBtn').addEventListener('click', async () => {
    let message = buildClaudeMessage();
    message = message.replace('이 위젯 만들어줘.', 'widget-generator 레포에 이 위젯 만들어서 GitHub에 바로 commit & push까지 해줘.');
    message += '\n\n작업 끝나면 GitHub에 commit & push까지 해줘.';
    try {
      await navigator.clipboard.writeText(message);
      document.getElementById('status').textContent = '복사 완료! Claude Code 채팅창에 붙여넣기(Ctrl+V) 하세요';
    } catch (e) {
      document.getElementById('status').textContent = '복사 실패 — 아래 메시지를 직접 복사해주세요';
    }
    window.open('https://claude.ai/code', '_blank');
  });

  function extractNotionId(url) {
    const clean = url.split('?')[0];
    const matches = clean.match(/[a-f0-9]{32}/gi);
    return matches ? matches[matches.length - 1] : null;
  }

  async function loadPropertiesFor(dbId) {
    document.getElementById('source_db_id').value = dbId;
    document.getElementById('status').textContent = '속성 불러오는 중...';
    try {
      const res = await fetch(`/api/notion-db-properties?db_id=${dbId}`);
      const data = await res.json();
      if (!res.ok) {
        document.getElementById('status').textContent = '실패: ' + (data.error || res.status);
        return;
      }
      const propSelect = document.getElementById('propertySelect');
      propSelect.innerHTML = data.properties.map(p => `<option value="${p.name}">${p.name} (${p.type})</option>`).join('');
      document.getElementById('propertySelectField').style.display = 'block';
      updatePreview();
    } catch (e) {
      document.getElementById('status').textContent = '에러: ' + e.message;
    }
  }

  document.getElementById('analyzeLinkBtn').addEventListener('click', async () => {
    const url = document.getElementById('notionLink').value.trim();
    const id = extractNotionId(url);
    if (!id) {
      document.getElementById('status').textContent = '링크에서 ID를 못 찾았어요. Notion 전체 URL을 붙여넣어주세요.';
      return;
    }
    document.getElementById('status').textContent = '분석 중...';
    try {
      const res = await fetch(`/api/notion-list-databases?id=${id}`);
      const data = await res.json();
      if (!res.ok) {
        document.getElementById('status').textContent = '실패: ' + (data.error || res.status);
        return;
      }
      if (!data.databases || data.databases.length === 0) {
        document.getElementById('status').textContent = '데이터베이스를 못 찾았어요. (인라인 DB만 인식돼요)';
        return;
      }
      const dbSelect = document.getElementById('dbSelect');
      dbSelect.innerHTML = data.databases.map(d => `<option value="${d.id}">${d.title}</option>`).join('');
      document.getElementById('dbSelectField').style.display = 'block';
      document.getElementById('status').textContent = `데이터베이스 ${data.databases.length}개 찾음`;
      loadPropertiesFor(dbSelect.value);
    } catch (e) {
      document.getElementById('status').textContent = '에러: ' + e.message;
    }
  });

  document.getElementById('dbSelect').addEventListener('change', (e) => loadPropertiesFor(e.target.value));

  // 속성 다중 선택 → 콤마로 묶어서 source_property에 반영
  document.getElementById('propertySelect').addEventListener('change', (e) => {
    const selected = Array.from(e.target.selectedOptions).map(o => o.value);
    document.getElementById('source_property').value = selected.join(', ');
    updatePreview();
  });

  updatePreview();
  setInterval(() => {
    if (document.getElementById('type').value === 'clock') updatePreview();
  }, 30000);
</script>

</body>
</html>
