<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Widget Generator</title>
<link rel="stylesheet" href="./shared/tokens.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR&family=Noto+Serif+KR&family=Nanum+Gothic&family=Nanum+Myeongjo&family=Nanum+Pen+Script&family=Nanum+Brush+Script&family=Black+Han+Sans&family=Do+Hyeon&family=Jua&family=Gaegu&family=Gowun+Dodum&family=Gowun+Batang&family=Hahmlet&family=Gothic+A1&family=IBM+Plex+Sans+KR&family=Stylish&family=Sunflower&family=Single+Day&family=East+Sea+Dokdo&family=Poor+Story&family=Yeon+Sung&family=Cute+Font&family=Dokdo&family=Gugi&family=Song+Myung&family=Inter&family=Work+Sans&family=Archivo+Black&family=Space+Mono&family=IBM+Plex+Mono&family=Bebas+Neue&family=DM+Mono&family=Sora&family=Manrope&family=Space+Grotesk&family=JetBrains+Mono&family=Syne&family=Unbounded&family=Fraunces&family=Instrument+Serif&family=Roboto&family=Poppins&family=Montserrat&family=Playfair+Display&family=Outfit&family=Plus+Jakarta+Sans&family=Crimson+Text&family=Libre+Baskerville&family=Cormorant+Garamond&family=Public+Sans&display=swap">
<style>
  body { background: #f4f4f2; padding: 32px; display: flex; gap: 24px; flex-wrap: wrap; align-items: flex-start; }
  .col { width: 280px; flex-shrink: 0; }
  .col h3 { font-size: 13px; margin-bottom: 10px; color: #555; border-bottom: 1px solid var(--border); padding-bottom: 6px; }
  .form-panel { width: 280px; }
  .field { margin-bottom: 12px; }
  .field label { display: block; font-size: 11px; color: #555; margin-bottom: 3px; }
  .field input, .field select {
    width: 100%;
    border: 1px solid var(--border);
    padding: 5px 6px;
    font-size: 12px;
    font-family: var(--font);
  }
  .color-row { display: flex; gap: 8px; align-items: center; }
  .color-row input[type="color"] { width: 32px; height: 26px; padding: 0; border: 1px solid var(--border); cursor: pointer; }
  .status { font-size: 11px; margin-top: 8px; color: #777; }

  .preview-panel { width: 260px; }
  .preview-panel h3 { font-size: 12px; margin-bottom: 10px; color: #555; }

  .output { margin-top: 20px; }
  .output textarea {
    width: 100%; height: 140px; font-family: monospace; font-size: 10px;
    border: 1px solid var(--border); padding: 6px; resize: vertical;
  }
  .output label { display: flex; justify-content: space-between; align-items: center; font-size: 11px; margin: 10px 0 4px; }
  .copy-btn { font-size: 10px; padding: 2px 8px; cursor: pointer; border: 1px solid var(--border); background: #fff; }

  /* preview content samples */
  .clock-time { font-size: 26px; font-weight: 700; letter-spacing: 1px; }
  .habit-row { display: flex; align-items: center; gap: 7px; padding: 3px 0; font-size: 12px; }
  .habit-row .box { width: 11px; height: 11px; border: 1px solid var(--ink); flex-shrink: 0; }
  .habit-row .box.done { background: var(--accent); }
  .font-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 4px;
    max-height: 280px;
    overflow-y: auto;
    border: 1px solid var(--border);
    padding: 6px;
    margin-top: 6px;
  }
  .font-item {
    border: 1px solid #ddd;
    padding: 6px 8px;
    font-size: 13px;
    cursor: pointer;
    background: #fff;
    overflow: hidden;
    white-space: nowrap;
    text-overflow: ellipsis;
  }
  .font-item:hover { border-color: var(--border); }
  .font-item.selected { background: var(--win-color); color: #fff; border-color: var(--win-color); }
</style>
</head>
<body>

  <!-- 1. 정보 입력 -->
  <div class="col form-panel">
    <h3>① 정보 입력</h3>
    <div class="content" style="border:1px solid var(--border); background:#fff; padding:16px;">

      <div class="field">
        <label>위젯 ID (영문, 소문자, 공백없이)</label>
        <input type="text" id="widgetId" placeholder="예: habit">
      </div>

      <div class="field">
        <label>타이틀바 텍스트</label>
        <div style="display:flex; align-items:center; border:1px solid var(--border);">
          <span style="padding:5px 0 5px 6px; font-size:12px; color:#777; white-space:nowrap;">C://</span>
          <input type="text" id="title" placeholder="HABITS" style="border:none; padding:5px 6px;">
        </div>
      </div>

      <div class="field">
        <label>타입</label>
        <select id="type">
          <option value="clock">clock — 시계</option>
          <option value="habit">habit — 체크리스트형</option>
          <option value="textinput">textinput — 텍스트 입력형</option>
          <option value="report">report — 통계/리포트형</option>
        </select>
      </div>

      <div class="field">
        <label>창 색 (color)</label>
        <div class="color-row">
          <input type="color" id="colorPicker" value="#1a1a1a">
          <input type="text" id="color" value="#1a1a1a">
        </div>
      </div>

      <div class="field">
        <label>포인트 색 (accent)</label>
        <div class="color-row">
          <input type="color" id="accentPicker" value="#9b8fc7">
          <input type="text" id="accent" value="#9b8fc7">
        </div>
      </div>

      <div class="field">
        <label>폰트</label>
        <select id="font" style="font-size:14px; padding:7px 6px;"></select>
      </div>

      <div class="field">
        <label>내 폰트 파일 직접 올리기 (woff2)</label>
        <input type="file" id="customFontFile" accept=".woff2,.woff,.ttf,.otf">
        <input type="text" id="customFontName" placeholder="이 폰트의 이름 (예: MyFont)" style="margin-top:4px;">
      </div>

      <div class="field">
        <label>Source DB ID (데이터 연동 필요한 타입만)</label>
        <input type="text" id="source_db_id" placeholder="비워둬도 됨">
      </div>

      <div class="field">
        <label>Source Property</label>
        <input type="text" id="source_property" placeholder="비워둬도 됨">
      </div>

      <button class="btn" id="createBtn" style="width:100%; padding:7px;">위젯 생성 (Settings DB에 저장)</button>
      <button class="btn" id="sendToClaudeBtn" style="width:100%; padding:7px; margin-top:6px;" type="button">💬 클로드에서 코드 받기 (현재 설정 복사됨)</button>
      <button class="btn" id="sendToClaudeCodeBtn" style="width:100%; padding:7px; margin-top:6px;" type="button">⌨️ Claude Code로 보내기 (복사 후 새 탭)</button>
      <div class="status" id="status"></div>

      <div class="output">
        <label>config.json <button class="copy-btn" onclick="copyText('configOutput')">복사</button></label>
        <textarea id="configOutput" readonly></textarea>
      </div>
    </div>
  </div>

  <!-- 2. 정보로 미리보기 -->
  <div class="col">
    <h3>② 정보로 미리보기 (샘플 데이터)</h3>
    <div class="window" id="previewWindow">
      <div class="titlebar">
        <span id="previewTitle">C:// CLOCK</span>
        <span class="icons"><span>_</span><span>□</span><span>x</span></span>
      </div>
      <div class="content" id="previewContent"></div>
    </div>
  </div>

  <!-- 3. 코드 입력 -->
  <div class="col">
    <h3>③ 코드 입력</h3>
    <p style="font-size:11px; color:#777; margin-bottom:8px;">클로드한테 받은 index.html 전체를 붙여넣으세요.</p>
    <textarea id="pastedCode" placeholder="여기에 index.html 코드 전체를 붙여넣으세요" style="width:260px; height:200px; font-family:monospace; font-size:10px; border:1px solid var(--border); padding:6px;"></textarea>

    <label style="font-size:11px; color:#555; display:block; margin-top:8px;">config.json (① 폼 값에서 자동 생성됨)</label>
    <textarea id="pastedConfig" readonly style="width:260px; height:80px; font-family:monospace; font-size:10px; border:1px solid var(--border); padding:6px; background:#f4f4f2; color:#777;"></textarea>

    <button class="btn" id="renderPastedBtn" style="width:260px; padding:7px; margin-top:6px;">④로 미리보기 실행 →</button>
  </div>

  <!-- 4. 코드로 미리보기 -->
  <div class="col">
    <h3>④ 코드로 미리보기 (실제 작동)</h3>
    <iframe id="pastedPreview" style="width:260px; height:340px; border:1px solid var(--border); background:#fff;"></iframe>
  </div>

<script>
  function sampleContent(type) {
    switch (type) {
      case 'habit':
        return `
          <div class="meta">TODAY</div>
          <div class="habit-row"><div class="box done"></div>아침 산책</div>
          <div class="habit-row"><div class="box done"></div>일기 쓰기</div>
          <div class="habit-row"><div class="box"></div>독서 30분</div>
          <div class="habit-row"><div class="box"></div>스트레칭</div>
        `;
      case 'textinput':
        return `
          <div class="meta">INBOX</div>
          <div style="margin-bottom:10px;">오늘 회의에서 나온 아이디어 정리해야 함</div>
          <button class="btn">SAVE & ROUTE</button>
        `;
      case 'report':
        return `
          <div class="meta">WEEK 25</div>
          <div>일기 작성 5/7<br>투두 완료 12/18<br>키워드: 마감, 산책, 회고</div>
        `;
      case 'clock':
      default:
        const d = new Date();
        const time = String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
        return `
          <div class="meta">${d.toLocaleDateString('ko-KR', { year:'numeric', month:'2-digit', day:'2-digit', weekday:'short' })}</div>
          <div class="clock-time">${time}</div>
        `;
    }
  }

  const FONT_LIST = [
    'Helvetica Neue','Noto Sans KR','Noto Serif KR','Nanum Gothic','Nanum Myeongjo',
    'Nanum Pen Script','Nanum Brush Script','Black Han Sans','Do Hyeon','Jua','Gaegu',
    'Gowun Dodum','Gowun Batang','Hahmlet','Gothic A1','IBM Plex Sans KR',
    'Stylish','Sunflower','Single Day','East Sea Dokdo','Poor Story',
    'Yeon Sung','Cute Font','Dokdo','Gugi','Song Myung',
    'Inter','Work Sans','Archivo Black','Space Mono','IBM Plex Mono',
    'Bebas Neue','DM Mono','Sora','Manrope','Space Grotesk',
    'JetBrains Mono','Syne','Unbounded','Fraunces','Instrument Serif',
    'Roboto','Poppins','Montserrat','Playfair Display','Outfit',
    'Plus Jakarta Sans','Crimson Text','Libre Baskerville','Cormorant Garamond','Public Sans'
  ];

  // 워드처럼 드롭다운 옵션 하나하나를 그 폰트로 렌더링
  function renderFontDropdown() {
    const select = document.getElementById('font');
    select.innerHTML = FONT_LIST.map(f =>
      `<option value="${f}" style="font-family:'${f}'">${f}</option>`
    ).join('');

    const savedFont = localStorage.getItem('widgetGenerator_lastFont');
    if (savedFont) select.value = savedFont;

    select.addEventListener('change', () => {
      localStorage.setItem('widgetGenerator_lastFont', select.value);
      updatePreview();
    });
  }
  renderFontDropdown();

  // 직접 올린 폰트 파일 처리 (@font-face로 즉시 등록)
  document.getElementById('customFontFile').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      const fontName = document.getElementById('customFontName').value || file.name.split('.')[0];
      const style = document.createElement('style');
      style.textContent = `@font-face { font-family: '${fontName}'; src: url(${reader.result}); }`;
      document.head.appendChild(style);

      const select = document.getElementById('font');
      const opt = document.createElement('option');
      opt.value = fontName;
      opt.textContent = fontName + ' (직접 올림)';
      opt.style.fontFamily = `'${fontName}'`;
      select.prepend(opt);
      select.value = fontName;
      updatePreview();
    };
    reader.readAsDataURL(file);
  });

  let fontLoadTimer;
  function loadGoogleFont(fontName) {
    const familyParam = fontName.trim().replace(/\s+/g, '+');
    const linkId = 'dynamicFontLink-' + familyParam;
    if (document.getElementById(linkId)) return;
    const link = document.createElement('link');
    link.id = linkId;
    link.rel = 'stylesheet';
    link.href = `https://fonts.googleapis.com/css2?family=${familyParam}:wght@400;700;900&display=swap`;
    document.head.appendChild(link);
  }

  function updatePreview() {
    const color = document.getElementById('color').value || '#1a1a1a';
    const accent = document.getElementById('accent').value || '#9b8fc7';
    const fontName = document.getElementById('font').value || 'Helvetica Neue';
    const font = `'${fontName}'`;
    const title = 'C:// ' + (document.getElementById('title').value || 'WIDGET').toUpperCase();
    const type = document.getElementById('type').value;

    clearTimeout(fontLoadTimer);
    fontLoadTimer = setTimeout(() => loadGoogleFont(fontName), 400);

    document.documentElement.style.setProperty('--win-color', color);
    document.documentElement.style.setProperty('--accent', accent);
    document.documentElement.style.setProperty('--font', font);
    document.getElementById('previewTitle').textContent = title;
    document.getElementById('previewContent').innerHTML = sampleContent(type);

    updateConfigOutput();
  }

  function updateConfigOutput() {
    const fontName = document.getElementById('font').value || 'Helvetica Neue';
    const config = {
      id: document.getElementById('widgetId').value || 'widget-id',
      title: 'C:// ' + (document.getElementById('title').value || 'WIDGET').toUpperCase(),
      color: document.getElementById('color').value,
      accent: document.getElementById('accent').value,
      font: `'${fontName}'`,
      type: document.getElementById('type').value,
      mode: 'live'
    };
    document.getElementById('configOutput').value = JSON.stringify(config, null, 2);
  }

  function copyText(id) {
    const el = document.getElementById(id);
    el.select();
    document.execCommand('copy');
  }

  // 입력값 바뀔 때마다 실시간 반영
  ['widgetId','title','type','color','accent'].forEach(id => {
    document.getElementById(id).addEventListener('input', updatePreview);
  });
  document.getElementById('colorPicker').addEventListener('input', e => {
    document.getElementById('color').value = e.target.value; updatePreview();
  });
  document.getElementById('accentPicker').addEventListener('input', e => {
    document.getElementById('accent').value = e.target.value; updatePreview();
  });

  // Settings DB에 새 위젯 행 생성
  document.getElementById('createBtn').addEventListener('click', async () => {
    const fontName = document.getElementById('font').value || 'Helvetica Neue';
    const body = {
      id: document.getElementById('widgetId').value,
      title: 'C:// ' + (document.getElementById('title').value || 'WIDGET').toUpperCase(),
      color: document.getElementById('color').value,
      accent: document.getElementById('accent').value,
      font: `'${fontName}'`,
      type: document.getElementById('type').value,
      source_db_id: document.getElementById('source_db_id').value,
      source_property: document.getElementById('source_property').value
    };
    if (!body.id) {
      document.getElementById('status').textContent = '위젯 ID를 입력하세요';
      return;
    }
    document.getElementById('status').textContent = '생성 중...';
    try {
      const res = await fetch('/api/create-widget', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      if (res.ok) {
        document.getElementById('status').textContent = 'Settings DB에 저장 완료 — 아래 config.json을 GitHub에 추가하세요';
      } else {
        const err = await res.json();
        document.getElementById('status').textContent = '실패: ' + (err.error || res.status);
      }
    } catch (e) {
      document.getElementById('status').textContent = '에러: ' + e.message;
    }
  });

  function buildConfigFromForm() {
    const fontName = document.getElementById('font').value || 'Helvetica Neue';
    return {
      id: document.getElementById('widgetId').value || 'widget-id',
      title: 'C:// ' + (document.getElementById('title').value || 'WIDGET').toUpperCase(),
      color: document.getElementById('color').value || '#1a1a1a',
      accent: document.getElementById('accent').value || '#9b8fc7',
      font: `'${fontName}'`,
      type: document.getElementById('type').value,
      source_db_id: document.getElementById('source_db_id').value || '',
      source_property: document.getElementById('source_property').value || ''
    };
  }

  function renderPastedCode() {
    let code = document.getElementById('pastedCode').value;
    code = code.replace(/\.\.\/\.\.\/shared\//g, '/shared/');

    const fakeConfig = buildConfigFromForm();
    document.getElementById('pastedConfig').value = JSON.stringify(fakeConfig, null, 2);

    if (!code.includes('<html') && !code.includes('<!DOCTYPE')) {
      document.getElementById('status').textContent = '위 코드 칸에는 index.html 전체 코드가 들어가야 해요 (HTML 코드가 아닌 것 같아요)';
      return;
    }

    const interceptScript = `
      <scr${''}ipt>
        const __fakeConfig = ${JSON.stringify(fakeConfig)};
        const __originalFetch = window.fetch;
        window.fetch = function(url, opts) {
          if (typeof url === 'string' && url.includes('config.json')) {
            return Promise.resolve(new Response(JSON.stringify(__fakeConfig), { status: 200 }));
          }
          if (typeof url === 'string' && url.includes('/api/get-settings')) {
            return Promise.resolve(new Response(JSON.stringify(__fakeConfig), { status: 200 }));
          }
          return __originalFetch(url, opts);
        };
      </scr${''}ipt>
    `;

    const finalCode = code.replace('<head>', '<head>' + interceptScript);

    const iframe = document.getElementById('pastedPreview');
    iframe.srcdoc = finalCode;
    document.getElementById('status').textContent = '';
  }

  document.getElementById('sendToClaudeBtn').addEventListener('click', async () => {
    const config = document.getElementById('configOutput').value;
    const message = `이 위젯 만들어줘.

기본 config.json은 아래와 같아 (필요하면 이 타입에 맞게 필드 추가/수정해서 최종본 같이 줘):

${config}

해줘야 할 것:
1. widgets/[id]/index.html 작성 (shared/tokens.css, shared/config-loader.js 사용)
2. 위 config.json을 이 타입에 맞게 최종 확정해서 같이 줘 (필드 빠진 거 있으면 추가)
3. 데이터 연동이 필요한 타입이면 api/[이름].js도 같이 작성해줘`;

    try {
      await navigator.clipboard.writeText(message);
      document.getElementById('status').textContent = '복사 완료! Project 채팅창에 붙여넣기(Ctrl+V) 하세요';
    } catch (e) {
      document.getElementById('status').textContent = '복사 실패 — config.json을 직접 복사해주세요';
    }

    window.open('https://claude.ai/project/019ee501-a25a-705c-82fd-3bf9d3abca14', '_blank');
  });

  document.getElementById('sendToClaudeCodeBtn').addEventListener('click', async () => {
    const config = document.getElementById('configOutput').value;
    const message = `widget-generator 레포에 이 위젯 만들어서 GitHub에 바로 commit & push까지 해줘.

기본 config.json은 아래와 같아 (필요하면 이 타입에 맞게 필드 추가/수정):

${config}

해줘야 할 것:
1. widgets/[id]/index.html 작성 (shared/tokens.css, shared/config-loader.js 사용)
2. widgets/[id]/config.json 작성 (위 값 기반, 타입에 맞게 보완)
3. 데이터 연동이 필요한 타입이면 api/[이름].js도 작성
4. 전부 GitHub에 commit & push`;

    try {
      await navigator.clipboard.writeText(message);
      document.getElementById('status').textContent = '복사 완료! Claude Code 채팅창에 붙여넣기(Ctrl+V) 하세요';
    } catch (e) {
      document.getElementById('status').textContent = '복사 실패 — config.json을 직접 복사해주세요';
    }

    window.open('https://claude.ai/code', '_blank');
  });

  document.getElementById('renderPastedBtn').addEventListener('click', renderPastedCode);

  updatePreview();
  setInterval(() => {
    if (document.getElementById('type').value === 'clock') updatePreview();
  }, 30000);
</script>

</body>
</html>
