<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Widget Settings</title>
<link rel="stylesheet" href="./shared/tokens.css">
<style>
  body { background: #f4f4f2; padding: 32px; }
  .window { max-width: 320px; }
  .field { margin-bottom: 12px; }
  .field label { display: block; font-size: 11px; color: #555; margin-bottom: 3px; }
  .field input, .field select {
    width: 100%;
    border: 1px solid var(--border);
    padding: 5px 6px;
    font-size: 12px;
    font-family: var(--font);
  }
  .color-row { display: flex; gap: 8px; align-items: center; }
  .color-row input[type="color"] { width: 32px; height: 26px; padding: 0; border: 1px solid var(--border); cursor: pointer; }
  .status { font-size: 11px; margin-top: 8px; color: #777; }
</style>
</head>
<body>

  <div class="window">
    <div class="titlebar">
      <span>C:// SETTINGS</span>
      <span class="icons"><span>_</span><span>□</span><span>x</span></span>
    </div>
    <div class="content">

      <div class="field">
        <label>위젯 선택</label>
        <select id="widgetSelect"></select>
      </div>

      <div class="field">
        <label>타이틀바 텍스트</label>
        <input type="text" id="title" placeholder="C:// CLOCK">
      </div>

      <div class="field">
        <label>창 색 (color)</label>
        <div class="color-row">
          <input type="color" id="colorPicker" value="#1a1a1a">
          <input type="text" id="color" placeholder="#1a1a1a">
        </div>
      </div>

      <div class="field">
        <label>포인트 색 (accent)</label>
        <div class="color-row">
          <input type="color" id="accentPicker" value="#9b8fc7">
          <input type="text" id="accent" placeholder="#9b8fc7">
        </div>
      </div>

      <div class="field">
        <label>폰트</label>
        <select id="font"></select>
      </div>

      <div class="field">
        <label>Source DB ID (habit 등 데이터 연동 위젯만)</label>
        <input type="text" id="source_db_id" placeholder="비워둬도 됨">
      </div>

      <div class="field">
        <label>Source Property (multi-select 속성명)</label>
        <input type="text" id="source_property" placeholder="비워둬도 됨">
      </div>

      <button class="btn" id="saveBtn" style="width:100%; padding:7px;">SAVE</button>
      <div class="status" id="status"></div>

    </div>
  </div>

<script>
  let currentPageId = null;

  const FONT_LIST = [
    'Helvetica Neue','Noto Sans KR','Noto Serif KR','Nanum Gothic','Nanum Myeongjo',
    'Nanum Pen Script','Nanum Brush Script','Black Han Sans','Do Hyeon','Jua','Gaegu',
    'Gowun Dodum','Gowun Batang','Hahmlet','Gothic A1','IBM Plex Sans KR',
    'Stylish','Sunflower','Single Day','East Sea Dokdo','Poor Story',
    'Yeon Sung','Cute Font','Dokdo','Gugi','Song Myung',
    'Inter','Work Sans','Archivo Black','Space Mono','IBM Plex Mono',
    'Bebas Neue','DM Mono','Sora','Manrope','Space Grotesk',
    'JetBrains Mono','Syne','Unbounded','Fraunces','Instrument Serif',
    'Roboto','Poppins','Montserrat','Playfair Display','Outfit',
    'Plus Jakarta Sans','Crimson Text','Libre Baskerville','Cormorant Garamond','Public Sans'
  ];

  // GitHub shared/fonts/manifest.json에 등록된 커스텀 폰트도 같이 불러옴
  async function loadFontOptions() {
    const select = document.getElementById('font');
    let customFonts = [];
    try {
      const res = await fetch('/shared/fonts/manifest.json');
      if (res.ok) {
        const data = await res.json();
        customFonts = data.map(f => f.name);
      }
    } catch (e) {
      // manifest 없으면 그냥 구글 폰트만 사용
    }

    const customOptions = customFonts.map(f => `<option value="${f}">${f} (직접 업로드)</option>`).join('');
    const googleOptions = FONT_LIST.map(f => `<option value="${f}">${f}</option>`).join('');
    select.innerHTML = customOptions + googleOptions;
  }

  async function loadWidgetOptions() {
    const select = document.getElementById('widgetSelect');
    try {
      const res = await fetch('/api/list-widgets');
      const data = await res.json();
      const widgets = data.widgets && data.widgets.length ? data.widgets : ['clock'];
      select.innerHTML = widgets.map(w => `<option value="${w}">${w}</option>`).join('');
    } catch (e) {
      select.innerHTML = `<option value="clock">clock</option>`;
    }
  }

  async function loadSettings(widgetId) {
    document.getElementById('status').textContent = '불러오는 중...';
    try {
      const res = await fetch(`/api/get-settings?widgetId=${widgetId}`);
      if (!res.ok) {
        document.getElementById('status').textContent = '저장된 설정 없음 (Notion DB에 행이 있는지 확인)';
        return;
      }
      const data = await res.json();
      currentPageId = data.pageId;
      document.getElementById('title').value = data.title || '';
      document.getElementById('color').value = data.color || '';
      document.getElementById('colorPicker').value = data.color || '#1a1a1a';
      document.getElementById('accent').value = data.accent || '';
      document.getElementById('accentPicker').value = data.accent || '#9b8fc7';

      // 저장된 font 값은 "'폰트명'" 형태라 따옴표 제거해서 select에 매칭
      const fontName = (data.font || 'Helvetica Neue').replace(/['"]/g, '').split(',')[0].trim();
      document.getElementById('font').value = fontName;

      document.getElementById('source_db_id').value = data.source_db_id || '';
      document.getElementById('source_property').value = data.source_property || '';
      document.getElementById('status').textContent = '불러오기 완료';
    } catch (e) {
      document.getElementById('status').textContent = '에러: ' + e.message;
    }
  }

  document.getElementById('widgetSelect').addEventListener('change', (e) => {
    loadSettings(e.target.value);
  });

  document.getElementById('colorPicker').addEventListener('input', (e) => {
    document.getElementById('color').value = e.target.value;
  });
  document.getElementById('accentPicker').addEventListener('input', (e) => {
    document.getElementById('accent').value = e.target.value;
  });

  document.getElementById('saveBtn').addEventListener('click', async () => {
    if (!currentPageId) {
      document.getElementById('status').textContent = '먼저 위젯을 선택해서 불러오세요';
      return;
    }
    document.getElementById('status').textContent = '저장 중...';
    const fontName = document.getElementById('font').value;
    const body = {
      pageId: currentPageId,
      title: document.getElementById('title').value,
      color: document.getElementById('color').value,
      accent: document.getElementById('accent').value,
      font: `'${fontName}'`,
      source_db_id: document.getElementById('source_db_id').value,
      source_property: document.getElementById('source_property').value
    };
    try {
      const res = await fetch('/api/save-settings', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      if (res.ok) {
        document.getElementById('status').textContent = '저장 완료 — 위젯에 바로 반영됨';
      } else {
        document.getElementById('status').textContent = '저장 실패';
      }
    } catch (e) {
      document.getElementById('status').textContent = '에러: ' + e.message;
    }
  });

  async function init() {
    await loadFontOptions();
    await loadWidgetOptions();
    const firstWidget = document.getElementById('widgetSelect').value;
    if (firstWidget) loadSettings(firstWidget);
  }
  init();
</script>

</body>
</html>
