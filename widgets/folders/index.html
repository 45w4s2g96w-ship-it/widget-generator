<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>C:// FOLDERS</title>
  <link rel="stylesheet" href="../../shared/tokens.css" />
  <style>
    @font-face {
      font-family: 'ChosunGu';
      src: url('../../shared/fonts/ChosunGu.TTF') format('truetype');
      font-display: swap;
    }
    body { display:flex; justify-content:center; font-family:'ChosunGu',sans-serif; background:transparent; }
    .window { max-width:300px; background:transparent; border:none; box-shadow:none; }

    .content {
      padding: 6px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .folder {
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      flex: 0 0 calc(50% - 6px);
      max-width: calc(50% - 6px);
    }

    .folder-tab {
      width: 44px;
      height: 12px;
      border-radius: 4px 4px 0 0;
    }

    .folder-body {
      border: 1.5px solid #111;
      border-radius: 0 4px 4px 4px;
      padding: 10px 10px 9px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      transition: filter 0.1s;
      position: relative;
    }
    .folder-body::after {
      content:'';
      position:absolute;
      inset: 3px 3px -4px -4px;
      border-right: 1.5px solid #111;
      border-bottom: 1.5px solid #111;
      border-radius: 0 4px 4px 4px;
      z-index: -1;
    }
    .folder:hover  .folder-body { filter: brightness(0.94); }
    .folder:active .folder-body { filter: brightness(0.82); }

    .folder-lines { width:100%; display:flex; flex-direction:column; gap:4px; margin-bottom:1px; }
    .folder-line  { height:2px; border-radius:1px; background:rgba(0,0,0,0.18); }
    .folder-line:nth-child(2) { width:68%; }
    .folder-line:nth-child(3) { width:84%; }

    .folder-label {
      font-family: 'ChosunGu', sans-serif;
      font-size: 12px;
      font-weight: 700;
      color: #1a1a1a;
      line-height: 1.2;
    }
    .folder-sub {
      font-family: 'ChosunGu', sans-serif;
      font-size: 9.5px;
      color: #666;
      letter-spacing: 0.2px;
    }

    /* toast */
    #toast {
      position:fixed; bottom:14px; left:50%; transform:translateX(-50%);
      background:#1a1a1a; color:#fff;
      font-family:'ChosunGu',sans-serif; font-size:10.5px;
      padding:6px 14px; border:1px solid #444;
      opacity:0; transition:opacity 0.18s;
      pointer-events:none; white-space:nowrap; z-index:99;
    }
    #toast.show { opacity:1; }
  </style>
</head>
<body>
  <div class="window">
    <div class="content" id="folder-content"></div>
  </div>
  <div id="toast"></div>

  <script>
    const DEFAULT_FOLDERS = [
      { name:'Diary', colorBody:'#d8ccf0', colorTab:'#b8a8d8', type:'diary-api', url:'' },
      { name:'Book',  colorBody:'#c8c8c8', colorTab:'#a0a0a0', type:'url',
        url:'https://www.notion.so/37851f4140c580c995d6f55451f2c1f7' },
    ];

    function getFolders() {
      try {
        const s = JSON.parse(localStorage.getItem('wg_settings') || 'null');
        return (s?.folders && s.folders.length) ? s.folders : DEFAULT_FOLDERS;
      } catch(e) { return DEFAULT_FOLDERS; }
    }

    /* 서울 오늘 날짜 (5시 컷오프) */
    function todayLabel() {
      const now = new Date(new Date().toLocaleString('en-US', { timeZone:'Asia/Seoul' }));
      if (now.getHours() < 5) now.setDate(now.getDate() - 1);
      return `${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,'0')}.${String(now.getDate()).padStart(2,'0')}`;
    }

    function showToast(msg, ms) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      clearTimeout(t._timer);
      t._timer = setTimeout(() => t.classList.remove('show'), ms || 3200);
    }

    function render() {
      const folders = getFolders();
      const content = document.getElementById('folder-content');
      content.innerHTML = '';

      folders.forEach(f => {
        const el = document.createElement('div');
        el.className = 'folder';
        const isDiary = f.type === 'diary-api';
        el.innerHTML = `
          <div class="folder-tab"  style="background:${f.colorTab}"></div>
          <div class="folder-body" style="background:${f.colorBody}">
            <div class="folder-lines">
              <div class="folder-line"></div>
              <div class="folder-line"></div>
              <div class="folder-line"></div>
            </div>
            <div class="folder-label">${f.name}</div>
            <div class="folder-sub">${isDiary ? todayLabel() : '↗'}</div>
          </div>`;

        if (isDiary) {
          let busy = false;
          el.addEventListener('click', async () => {
            if (busy) return;
            busy = true;
            showToast('페이지 찾는 중...', 60000);
            try {
              const res  = await fetch('/api/diary-today');
              const data = await res.json();
              document.getElementById('toast').classList.remove('show');
              if (data.url) window.top.location.href = data.url;
              else showToast(data.error || '오늘 다이어리 없음', 4000);
            } catch(e) { showToast('연결 실패', 3000); }
            busy = false;
          });
        } else {
          el.addEventListener('click', () => {
            if (f.url) window.top.location.href = f.url;
          });
        }

        content.appendChild(el);
      });
    }

    render();
  </script>
</body>
</html>
