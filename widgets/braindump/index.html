<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>C:// BRAINDUMP</title>
  <link rel="stylesheet" href="../../shared/tokens.css" />
  <style>
    @font-face {
      font-family: 'ChosunGu';
      src: url('../../shared/fonts/ChosunGu.TTF') format('truetype');
      font-display: swap;
    }

    body {
      display: flex;
      justify-content: center;
      font-family: 'ChosunGu', 'Helvetica Neue', sans-serif;
    }

    .window { max-width: 300px; }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      overflow-x: auto;
      border-bottom: 1px solid #e0e0e0;
      background: #fafafa;
      scrollbar-width: none;
    }
    .tabs::-webkit-scrollbar { display: none; }

    .tab {
      flex-shrink: 0;
      padding: 4px 9px;
      font-size: 10px;
      color: #999;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      font-family: 'ChosunGu', sans-serif;
      user-select: none;
    }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 700; }
    .tab:hover:not(.active) { color: var(--ink); }

    /* ── Content ── */
    .content {
      padding: 0;
      height: 400px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Memo list ── */
    .memo-list {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .memo-list::-webkit-scrollbar { width: 3px; }
    .memo-list::-webkit-scrollbar-thumb { background: #ddd; }

    .memo-empty {
      font-size: 11px;
      color: #bbb;
      text-align: center;
      padding: 24px 0;
    }

    .loading-indicator {
      font-size: 10.5px;
      color: #bbb;
      text-align: center;
      padding: 8px 0;
    }

    /* ── Memo item ── */
    .memo-item { display: flex; gap: 6px; align-items: flex-start; }

    .memo-cb {
      flex-shrink: 0;
      width: 13px;
      height: 13px;
      border: 1px solid #ccc;
      cursor: pointer;
      margin-top: 2px;
      display: none;
      background: #fff;
    }
    .memo-cb.checked { background: var(--accent); border-color: var(--accent); }
    .delete-mode .memo-cb { display: block; }

    .memo-body { flex: 1; min-width: 0; }

    .memo-meta {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-bottom: 2px;
    }

    .memo-time { font-size: 9.5px; color: #aaa; letter-spacing: 0.3px; }

    .memo-cat {
      font-size: 9px;
      color: var(--accent);
      border: 1px solid var(--accent);
      padding: 0 3px;
      line-height: 1.5;
    }

    .memo-star {
      font-size: 10px;
      color: #f0c040;
      cursor: pointer;
      opacity: 0.25;
      margin-left: auto;
      flex-shrink: 0;
    }
    .memo-star.on { opacity: 1; }

    .memo-text {
      font-size: 11.5px;
      color: var(--ink);
      line-height: 1.55;
      word-break: break-all;
      white-space: pre-wrap;
    }
    .memo-item.is-done .memo-text { color: #bbb; text-decoration: line-through; }
    .memo-item.is-done .memo-body { opacity: 0.6; }

    .memo-expand {
      font-size: 10px;
      color: var(--accent);
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
      font-family: 'ChosunGu', sans-serif;
    }

    .memo-list-ul {
      margin: 0;
      padding-left: 14px;
      font-size: 11.5px;
      line-height: 1.55;
      color: var(--ink);
    }

    .memo-checklist { display: flex; flex-direction: column; gap: 2px; }
    .memo-checklist-item {
      display: flex;
      gap: 5px;
      align-items: flex-start;
      font-size: 11.5px;
      line-height: 1.55;
    }
    .memo-checklist-item input { margin-top: 3px; flex-shrink: 0; }

    .memo-actions { display: flex; gap: 4px; margin-top: 3px; }

    .action-btn {
      font-size: 9.5px;
      color: #aaa;
      background: none;
      border: 1px solid #e0e0e0;
      padding: 1px 5px;
      cursor: pointer;
      font-family: 'ChosunGu', sans-serif;
    }
    .action-btn:hover { color: var(--accent); border-color: var(--accent); }

    /* ── Delete bar ── */
    .delete-bar {
      display: none;
      padding: 6px 10px;
      border-top: 1px solid #e0e0e0;
      background: #fafafa;
      gap: 6px;
      align-items: center;
      font-size: 10.5px;
    }
    .delete-bar.visible { display: flex; }
    .delete-bar span { flex: 1; color: #888; }

    .del-btn {
      border: 1px solid #ddd;
      background: #fff;
      font-family: 'ChosunGu', sans-serif;
      font-size: 10px;
      padding: 3px 8px;
      cursor: pointer;
      color: #888;
    }
    .del-btn.danger { border-color: #e74c3c; color: #e74c3c; }
    .del-btn:hover { background: #f5f5f5; }

    /* ── Input area ── */
    .input-area {
      border-top: 1px solid #e0e0e0;
      padding: 8px 10px;
      display: flex;
      gap: 6px;
      align-items: flex-end;
    }

    #memo-input {
      flex: 1;
      border: 1px solid var(--border);
      background: #fff;
      font-family: 'ChosunGu', 'Helvetica Neue', sans-serif;
      font-size: 11.5px;
      line-height: 1.55;
      padding: 5px 7px;
      resize: none;
      outline: none;
      color: var(--ink);
      min-height: 38px;
      max-height: 100px;
    }
    #memo-input::placeholder { color: #ccc; }
    #memo-input:focus { border-color: var(--accent); }

    #send-btn {
      flex-shrink: 0;
      border: 1px solid var(--accent);
      background: var(--accent);
      color: #fff;
      font-family: 'ChosunGu', 'Helvetica Neue', sans-serif;
      font-size: 10.5px;
      padding: 5px 8px;
      cursor: pointer;
      align-self: flex-end;
    }
    #send-btn:hover { filter: brightness(1.1); }
    #send-btn:active { filter: brightness(0.9); }
    #send-btn:disabled { opacity: 0.45; cursor: default; filter: none; }

    /* ── Titlebar extras ── */
    .titlebar-right { display: flex; align-items: center; gap: 6px; }

    .trash-btn {
      font-size: 12px;
      opacity: 0.55;
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
      color: var(--win-text);
      line-height: 1;
    }
    .trash-btn:hover { opacity: 0.9; }
    .trash-btn.active { opacity: 1; }

    /* ── Route modal ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.35);
      z-index: 100;
      justify-content: center;
      align-items: center;
    }
    .modal-overlay.visible { display: flex; }

    .route-modal {
      background: #fff;
      border: 1px solid var(--border);
      width: 232px;
      font-family: 'ChosunGu', sans-serif;
    }

    .modal-titlebar {
      background: var(--win-color);
      color: var(--win-text);
      font-size: 10.5px;
      font-weight: 700;
      padding: 4px 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .modal-close {
      background: none;
      border: none;
      color: var(--win-text);
      cursor: pointer;
      font-size: 11px;
      opacity: 0.7;
      padding: 0;
      line-height: 1;
    }
    .modal-close:hover { opacity: 1; }

    .modal-body { padding: 10px 12px; }

    .modal-preview {
      font-size: 10.5px;
      color: #666;
      border-left: 2px solid var(--accent);
      padding-left: 6px;
      margin-bottom: 10px;
      word-break: break-all;
      line-height: 1.5;
    }

    .folder-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 5px;
      margin-bottom: 10px;
    }

    .folder-option {
      border: 1px solid #e0e0e0;
      background: #fff;
      font-family: 'ChosunGu', sans-serif;
      font-size: 10.5px;
      padding: 5px 4px;
      cursor: pointer;
      text-align: center;
      color: var(--ink);
    }
    .folder-option:hover { border-color: var(--accent); color: var(--accent); }
    .folder-option.selected { border-color: var(--accent); background: var(--accent); color: #fff; }

    .sub-form { display: none; margin-bottom: 8px; }
    .sub-form.visible { display: block; }

    .form-row { margin-bottom: 6px; }
    .form-label { font-size: 9.5px; color: #888; margin-bottom: 2px; }

    .form-select, .form-date {
      width: 100%;
      border: 1px solid #ddd;
      font-family: 'ChosunGu', sans-serif;
      font-size: 11px;
      padding: 4px 6px;
      color: var(--ink);
      background: #fff;
    }
    .form-select:focus, .form-date:focus { outline: none; border-color: var(--accent); }

    .modal-submit {
      width: 100%;
      border: 1px solid var(--accent);
      background: var(--accent);
      color: #fff;
      font-family: 'ChosunGu', sans-serif;
      font-size: 11px;
      padding: 6px;
      cursor: pointer;
    }
    .modal-submit:hover { filter: brightness(1.1); }
    .modal-submit:disabled { opacity: 0.45; cursor: default; filter: none; }
  </style>
</head>
<body>
  <div class="window">
    <div class="titlebar">
      <span data-widget-title>C:// BRAINDUMP</span>
      <div class="titlebar-right">
        <button class="trash-btn" id="trash-btn" title="삭제 모드">🗑</button>
        <span style="opacity:0.75;cursor:default">⚙</span>
      </div>
    </div>

    <div class="tabs" id="tabs">
      <div class="tab active" data-folder="ALL">ALL</div>
      <div class="tab" data-folder="IDEA">IDEA</div>
      <div class="tab" data-folder="TO-DO">TO-DO</div>
      <div class="tab" data-folder="CART">CART</div>
      <div class="tab" data-folder="DIARY">DIARY</div>
      <div class="tab" data-folder="LOG">LOG</div>
      <div class="tab" data-folder="ETC">ETC</div>
      <div class="tab" data-folder="★">★</div>
    </div>

    <div class="content">
      <div class="memo-list" id="memo-list">
        <div class="loading-indicator">불러오는 중...</div>
      </div>

      <div class="delete-bar" id="delete-bar">
        <span id="sel-count">0개 선택됨</span>
        <button class="del-btn" id="del-selected-btn">선택 삭제</button>
        <button class="del-btn danger" id="del-all-btn">전체 삭제</button>
      </div>

      <div class="input-area" id="input-area">
        <textarea id="memo-input" placeholder="생각을 던져보세요... (Enter=전송)" rows="2"></textarea>
        <button id="send-btn">SEND</button>
      </div>
    </div>
  </div>

  <!-- Route modal -->
  <div class="modal-overlay" id="route-modal">
    <div class="route-modal">
      <div class="modal-titlebar">
        <span>분류하기</span>
        <button class="modal-close" id="modal-close">✕</button>
      </div>
      <div class="modal-body">
        <div class="modal-preview" id="modal-preview"></div>

        <div class="folder-grid" id="folder-grid">
          <button class="folder-option" data-target="IDEA">💡 IDEA</button>
          <button class="folder-option" data-target="TO-DO">✅ TO-DO</button>
          <button class="folder-option" data-target="CART">🛒 CART</button>
          <button class="folder-option" data-target="DIARY">📔 DIARY</button>
          <button class="folder-option" data-target="LOG">📋 LOG</button>
          <button class="folder-option" data-target="ETC">📁 ETC</button>
        </div>

        <div class="sub-form" id="form-idea">
          <div class="form-row">
            <div class="form-label">영역</div>
            <select class="form-select" id="idea-area">
              <option value="anything">anything</option>
              <option value="life">life</option>
              <option value="work">work</option>
            </select>
          </div>
        </div>

        <div class="sub-form" id="form-todo">
          <div class="form-row">
            <div class="form-label">마감일 (선택)</div>
            <input type="date" class="form-date" id="todo-due" />
          </div>
        </div>

        <div class="sub-form" id="form-cart">
          <div class="form-row">
            <div class="form-label">종류</div>
            <select class="form-select" id="cart-type">
              <option value="Need &amp; Buy">Need &amp; Buy</option>
              <option value="Need &amp; Want">Need &amp; Want</option>
              <option value="Need Later">Need Later</option>
              <option value="Just Want">Just Want</option>
            </select>
          </div>
        </div>

        <button class="modal-submit" id="modal-submit" style="display:none">저장</button>
      </div>
    </div>
  </div>

  <script src="../../shared/config-loader.js"></script>
  <script>
    let cfg = {};
    let memos = [];
    let activeFolder = 'ALL';
    let deleteMode = false;
    let selectedIds = new Set();
    let activeMemo = null;
    let selectedTarget = null;

    (async () => {
      cfg = await loadWidgetConfig();
      await loadMemos();
    })();

    function pad(n) { return String(n).padStart(2, '0'); }

    // ── Tabs ──
    document.getElementById('tabs').addEventListener('click', e => {
      const tab = e.target.closest('.tab');
      if (!tab) return;
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      activeFolder = tab.dataset.folder;
      renderMemos();
    });

    // ── Delete mode ──
    document.getElementById('trash-btn').addEventListener('click', () => {
      deleteMode = !deleteMode;
      document.getElementById('trash-btn').classList.toggle('active', deleteMode);
      document.getElementById('delete-bar').classList.toggle('visible', deleteMode);
      document.getElementById('input-area').style.display = deleteMode ? 'none' : '';
      if (!deleteMode) { selectedIds.clear(); updateSelCount(); }
      renderMemos();
    });

    document.getElementById('del-selected-btn').addEventListener('click', async () => {
      if (!selectedIds.size) return;
      await deleteMemos([...selectedIds]);
    });

    document.getElementById('del-all-btn').addEventListener('click', async () => {
      const ids = filteredMemos().map(m => m.id);
      if (!ids.length) return;
      if (!confirm(`${ids.length}개 메모를 모두 삭제할까요?`)) return;
      await deleteMemos(ids);
    });

    async function deleteMemos(ids) {
      try {
        const r = await fetch('/api/braindump', {
          method: 'DELETE',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ pageIds: ids }),
        });
        const d = await r.json();
        if (!r.ok) throw new Error(d.error);
        memos = memos.filter(m => !ids.includes(m.id));
        selectedIds.clear();
        updateSelCount();
        renderMemos();
      } catch (err) {
        alert(err.message);
      }
    }

    function updateSelCount() {
      document.getElementById('sel-count').textContent = `${selectedIds.size}개 선택됨`;
    }

    // ── Send ──
    document.getElementById('send-btn').addEventListener('click', sendMemo);
    document.getElementById('memo-input').addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMemo();
      }
    });

    async function sendMemo() {
      const text = document.getElementById('memo-input').value.trim();
      if (!text) return;
      const btn = document.getElementById('send-btn');
      btn.disabled = true;
      try {
        const r = await fetch('/api/braindump', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ source_db_id: cfg.source_db_id, text }),
        });
        const d = await r.json();
        if (!r.ok) throw new Error(d.error);
        document.getElementById('memo-input').value = '';
        memos = [...d.created, ...memos];
        renderMemos();
        document.getElementById('memo-list').scrollTop = 0;
      } catch (err) {
        alert(err.message);
      } finally {
        btn.disabled = false;
      }
    }

    // ── Load ──
    async function loadMemos() {
      const list = document.getElementById('memo-list');
      try {
        const params = new URLSearchParams({ source_db_id: cfg.source_db_id });
        const r = await fetch('/api/braindump?' + params);
        const d = await r.json();
        if (!r.ok) throw new Error(d.error);
        memos = d.memos;
        renderMemos();
      } catch (err) {
        list.innerHTML = `<div class="memo-empty">${escHtml(err.message)}</div>`;
      }
    }

    // ── Render ──
    function filteredMemos() {
      if (activeFolder === 'ALL') return memos;
      if (activeFolder === '★') return memos.filter(m => m.important);
      return memos.filter(m => m.category === activeFolder);
    }

    function renderMemos() {
      const list = document.getElementById('memo-list');
      list.className = 'memo-list' + (deleteMode ? ' delete-mode' : '');
      const filtered = filteredMemos();
      if (!filtered.length) {
        list.innerHTML = '<div class="memo-empty">메모가 없어요.</div>';
        return;
      }
      list.innerHTML = '';
      filtered.forEach(m => list.appendChild(buildMemoEl(m)));
    }

    function formatTime(isoStr) {
      if (!isoStr) return '';
      const d = new Date(isoStr);
      return `${pad(d.getHours())}:${pad(d.getMinutes())}`;
    }

    function renderText(text) {
      const lines = text.split('\n').map(l => l.trim()).filter(Boolean);
      const allBullets = lines.length && lines.every(l => l.startsWith('- '));
      const allChecks  = lines.length && lines.every(l => l.startsWith('[] ') || l.startsWith('[x] '));

      if (allBullets) {
        const ul = document.createElement('ul');
        ul.className = 'memo-list-ul';
        lines.forEach(l => { const li = document.createElement('li'); li.textContent = l.slice(2); ul.appendChild(li); });
        return ul;
      }

      if (allChecks) {
        const wrap = document.createElement('div');
        wrap.className = 'memo-checklist';
        lines.forEach(l => {
          const item = document.createElement('div');
          item.className = 'memo-checklist-item';
          const cb = document.createElement('input');
          cb.type = 'checkbox';
          cb.checked = l.startsWith('[x] ');
          cb.disabled = true;
          const span = document.createElement('span');
          span.textContent = l.replace(/^\[.\] /, '');
          item.appendChild(cb);
          item.appendChild(span);
          wrap.appendChild(item);
        });
        return wrap;
      }

      const LIMIT = 120;
      const div = document.createElement('div');
      div.className = 'memo-text';
      if (text.length > LIMIT) {
        const short = document.createTextNode(text.slice(0, LIMIT) + '...');
        const btn = document.createElement('button');
        btn.className = 'memo-expand';
        btn.textContent = ' 더보기';
        btn.onclick = () => { div.textContent = ''; div.appendChild(document.createTextNode(text)); };
        div.appendChild(short);
        div.appendChild(btn);
      } else {
        div.textContent = text;
      }
      return div;
    }

    function buildMemoEl(m) {
      const item = document.createElement('div');
      item.className = 'memo-item' + (m.done ? ' is-done' : '');
      item.dataset.id = m.id;

      const cb = document.createElement('div');
      cb.className = 'memo-cb' + (selectedIds.has(m.id) ? ' checked' : '');
      cb.addEventListener('click', () => {
        if (selectedIds.has(m.id)) selectedIds.delete(m.id);
        else selectedIds.add(m.id);
        cb.classList.toggle('checked', selectedIds.has(m.id));
        updateSelCount();
      });

      const body = document.createElement('div');
      body.className = 'memo-body';

      const meta = document.createElement('div');
      meta.className = 'memo-meta';

      const time = document.createElement('span');
      time.className = 'memo-time';
      time.textContent = formatTime(m.createdAt);
      meta.appendChild(time);

      if (m.category) {
        const cat = document.createElement('span');
        cat.className = 'memo-cat';
        cat.textContent = m.category;
        meta.appendChild(cat);
      }

      const star = document.createElement('span');
      star.className = 'memo-star' + (m.important ? ' on' : '');
      star.textContent = '★';
      star.title = m.important ? '중요 해제' : '중요 표시';
      star.addEventListener('click', async () => {
        m.important = !m.important;
        star.classList.toggle('on', m.important);
        await fetch('/api/braindump', {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ pageId: m.id, important: m.important }),
        });
      });
      meta.appendChild(star);

      body.appendChild(meta);
      body.appendChild(renderText(m.text));

      if (!m.category || m.category === 'ETC') {
        const actions = document.createElement('div');
        actions.className = 'memo-actions';
        const routeBtn = document.createElement('button');
        routeBtn.className = 'action-btn';
        routeBtn.textContent = '→ 분류';
        routeBtn.addEventListener('click', () => openRouteModal(m));
        actions.appendChild(routeBtn);
        body.appendChild(actions);
      }

      item.appendChild(cb);
      item.appendChild(body);
      return item;
    }

    // ── Route modal ──
    function openRouteModal(memo) {
      activeMemo = memo;
      selectedTarget = null;
      document.getElementById('modal-preview').textContent =
        memo.text.length > 80 ? memo.text.slice(0, 80) + '...' : memo.text;
      document.querySelectorAll('.folder-option').forEach(b => b.classList.remove('selected'));
      document.querySelectorAll('.sub-form').forEach(f => f.classList.remove('visible'));
      document.getElementById('modal-submit').style.display = 'none';
      document.getElementById('todo-due').value = '';
      document.getElementById('route-modal').classList.add('visible');
    }

    document.getElementById('modal-close').addEventListener('click', () => {
      document.getElementById('route-modal').classList.remove('visible');
    });
    document.getElementById('route-modal').addEventListener('click', e => {
      if (e.target === document.getElementById('route-modal'))
        document.getElementById('route-modal').classList.remove('visible');
    });

    document.getElementById('folder-grid').addEventListener('click', e => {
      const btn = e.target.closest('.folder-option');
      if (!btn) return;
      document.querySelectorAll('.folder-option').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      selectedTarget = btn.dataset.target;

      document.querySelectorAll('.sub-form').forEach(f => f.classList.remove('visible'));
      if (selectedTarget === 'IDEA')  document.getElementById('form-idea').classList.add('visible');
      if (selectedTarget === 'TO-DO') document.getElementById('form-todo').classList.add('visible');
      if (selectedTarget === 'CART')  document.getElementById('form-cart').classList.add('visible');
      document.getElementById('modal-submit').style.display = 'block';
    });

    document.getElementById('modal-submit').addEventListener('click', async () => {
      if (!selectedTarget || !activeMemo) return;
      const btn = document.getElementById('modal-submit');
      btn.disabled = true;

      const payload = {
        memoId: activeMemo.id,
        text: activeMemo.text,
        target: selectedTarget,
      };
      if (selectedTarget === 'IDEA')  payload.ideaArea = document.getElementById('idea-area').value;
      if (selectedTarget === 'TO-DO') payload.dueDate  = document.getElementById('todo-due').value || null;
      if (selectedTarget === 'CART')  payload.cartType  = document.getElementById('cart-type').value;

      try {
        const r = await fetch('/api/braindump-route', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });
        const d = await r.json();
        if (!r.ok) throw new Error(d.error);

        activeMemo.category = selectedTarget;
        const markDone = ['DIARY', 'TO-DO', 'CART', 'IDEA'].includes(selectedTarget);
        if (markDone) activeMemo.done = true;
        document.getElementById('route-modal').classList.remove('visible');
        renderMemos();
      } catch (err) {
        alert(err.message);
      } finally {
        btn.disabled = false;
      }
    });

    function escHtml(str) {
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }
  </script>
</body>
</html>
