<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>C:// HABIT</title>
  <link rel="stylesheet" href="../../shared/tokens.css" />
  <style>
    @font-face {
      font-family: 'ChosunGu';
      src: url('../../shared/fonts/ChosunGu.TTF') format('truetype');
      font-display: swap;
    }

    html, body { height: 100%; margin: 0; }
    body {
      padding: 0;
      font-family: 'ChosunGu', 'Helvetica Neue', sans-serif;
    }

    .window {
      width: 100%;
      max-width: none;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    .content {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 7px 8px 8px;
    }
    .content::-webkit-scrollbar { width: 3px; }
    .content::-webkit-scrollbar-thumb { background: #ddd; }

    .widget-date {
      font-size: 11.5px;
      color: #888;
      letter-spacing: 0.3px;
      margin-bottom: 10px;
    }
    #date-val { color: var(--accent); font-weight: 700; }

    .group-section { margin-bottom: 10px; }
    .group-section:last-child { margin-bottom: 0; }

    .group-header {
      display: flex;
      align-items: center;
      gap: 5px;
      margin-bottom: 3px;
      padding-bottom: 2px;
      border-bottom: 1px solid #f0f0f0;
    }

    .group-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .group-dot.morning { background: #5b8dee; }
    .group-dot.day     { background: #4caf7d; }
    .group-dot.night   { background: #e0a030; }

    .group-label {
      font-size: 10.5px;
      color: #888;
      letter-spacing: 0.4px;
    }

    .habit-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 3px 2px;
      cursor: pointer;
      border-radius: 2px;
    }
    .habit-row:hover { background: rgba(155, 143, 199, 0.07); }
    .habit-row.pending { opacity: 0.55; cursor: default; }

    .habit-check {
      flex-shrink: 0;
      width: 13px;
      height: 13px;
      border: 1px solid #bbb;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      color: transparent;
      transition: background 0.1s, border-color 0.1s;
    }
    .habit-check.done {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .habit-name {
      font-size: 12.5px;
      color: var(--ink);
      line-height: 1.5;
      word-break: break-all;
      flex: 1;
    }
    .habit-name.done {
      text-decoration: line-through;
      color: #bbb;
    }

    .empty-msg {
      font-size: 12px;
      color: #ccc;
      text-align: center;
      padding: 24px 0;
    }

    #status {
      font-size: 10px;
      min-height: 12px;
      color: #c0392b;
      margin-top: 5px;
    }
    #status.ok { color: var(--accent); }
  </style>
</head>
<body>
  <div class="window">
    <div class="titlebar">
      <span data-widget-title>C:// HABIT</span>
      <span style="opacity:0.75;cursor:default">⚙</span>
    </div>
    <div class="content">
      <div class="widget-date">date: <span id="date-val">----.--.--</span></div>
      <div id="habits-content"><div class="empty-msg">불러오는 중...</div></div>
      <div id="status"></div>
    </div>
  </div>

  <script src="../../shared/config-loader.js"></script>
  <script>
    const GROUP_LABEL = { morning: '아침', day: '종일', night: '저녁' };
    const GROUP_ORDER = ['morning', 'day', 'night'];

    let cfg = {};
    let todayDailyPageId = null;

    (async () => {
      cfg = await loadWidgetConfig();
      await loadHabits();
    })();

    function setStatus(msg, type = '') {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.className = type;
    }

    async function loadHabits() {
      const el = document.getElementById('habits-content');
      try {
        const params = new URLSearchParams({
          habit_db_id: cfg.habit_db_id,
          daily_db_id: cfg.daily_db_id,
        });
        const r = await fetch('/api/habit-today?' + params);
        const data = await r.json();
        if (!r.ok) throw new Error(data.error);

        document.getElementById('date-val').textContent = data.today || '';
        todayDailyPageId = data.todayDailyPageId;

        el.innerHTML = '';
        const groups = data.groups || {};
        let anyHabit = false;

        GROUP_ORDER.forEach(key => {
          const habits = groups[key] || [];
          if (!habits.length) return;
          anyHabit = true;

          const section = document.createElement('div');
          section.className = 'group-section';

          const header = document.createElement('div');
          header.className = 'group-header';
          const dot = document.createElement('span');
          dot.className = `group-dot ${key}`;
          const label = document.createElement('span');
          label.className = 'group-label';
          label.textContent = GROUP_LABEL[key] || key;
          header.appendChild(dot);
          header.appendChild(label);
          section.appendChild(header);

          habits.forEach(habit => section.appendChild(buildRow(habit)));
          el.appendChild(section);
        });

        if (!anyHabit) el.innerHTML = '<div class="empty-msg">진행 중인 습관이 없어요.</div>';
      } catch (err) {
        el.innerHTML = `<div class="empty-msg">${escHtml(err.message)}</div>`;
      }
    }

    function buildRow(habit) {
      const row = document.createElement('div');
      row.className = 'habit-row';
      row.dataset.id = habit.id;

      const check = document.createElement('div');
      check.className = 'habit-check' + (habit.done ? ' done' : '');
      check.textContent = habit.done ? '✓' : '';

      const name = document.createElement('div');
      name.className = 'habit-name' + (habit.done ? ' done' : '');
      name.textContent = habit.name;

      row.appendChild(check);
      row.appendChild(name);

      row.addEventListener('click', () => toggleHabit(habit, row, check, name));
      return row;
    }

    async function toggleHabit(habit, row, check, name) {
      if (row.classList.contains('pending')) return;
      if (!todayDailyPageId) {
        setStatus('오늘의 Daily 페이지가 없습니다.');
        return;
      }

      const newDone = !habit.done;
      row.classList.add('pending');

      // Optimistic update
      habit.done = newDone;
      check.className = 'habit-check' + (newDone ? ' done' : '');
      check.textContent = newDone ? '✓' : '';
      name.className = 'habit-name' + (newDone ? ' done' : '');

      try {
        const r = await fetch('/api/habit-today', {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ habitPageId: habit.id, todayDailyPageId, done: newDone }),
        });
        const data = await r.json();
        if (!r.ok) throw new Error(data.error);
        setStatus('');
      } catch (err) {
        // Rollback
        habit.done = !newDone;
        check.className = 'habit-check' + (!newDone ? ' done' : '');
        check.textContent = !newDone ? '✓' : '';
        name.className = 'habit-name' + (!newDone ? ' done' : '');
        setStatus(err.message);
      } finally {
        row.classList.remove('pending');
      }
    }

    function escHtml(str) {
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }
  </script>
</body>
</html>
