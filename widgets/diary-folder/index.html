<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Diary</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: transparent;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 24px;
      font-family: 'Helvetica Neue', Arial, sans-serif;
    }

    .folder-wrap {
      position: relative;
      width: 160px;
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    /* folder tab */
    .folder-tab {
      width: 56px;
      height: 16px;
      background: #c4b4e2;
      border-radius: 8px 8px 0 0;
      margin-left: 0;
    }

    /* folder body */
    .folder-body {
      background: #d8ccf0;
      border-radius: 0 8px 8px 8px;
      padding: 18px 16px 16px;
      box-shadow: 0 3px 12px rgba(0,0,0,0.18), inset 0 1px 0 rgba(255,255,255,0.4);
      transition: filter 0.12s;
    }

    .folder-wrap:hover .folder-body { filter: brightness(1.06); }
    .folder-wrap:active .folder-body { filter: brightness(0.93); }

    .folder-icon {
      font-size: 32px;
      line-height: 1;
      margin-bottom: 10px;
      display: block;
    }

    .folder-name {
      font-size: 14px;
      font-weight: 700;
      color: #4a3a6a;
      letter-spacing: 0.3px;
      margin-bottom: 4px;
    }

    .folder-date {
      font-size: 11px;
      color: #7a68a0;
      letter-spacing: 0.5px;
    }

    /* toast */
    #toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #333;
      color: #fff;
      font-size: 11px;
      padding: 7px 14px;
      border-radius: 4px;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
      white-space: nowrap;
    }
    #toast.show { opacity: 1; }
  </style>
</head>
<body>
  <div class="folder-wrap" id="folder">
    <div class="folder-tab"></div>
    <div class="folder-body">
      <span class="folder-icon">📔</span>
      <div class="folder-name">Diary</div>
      <div class="folder-date" id="date-label">loading...</div>
    </div>
  </div>
  <div id="toast"></div>

  <script>
    const now = new Date(new Date().toLocaleString('en-US', { timeZone: 'Asia/Seoul' }));
    if (now.getHours() < 5) now.setDate(now.getDate() - 1);
    const y = now.getFullYear();
    const m = String(now.getMonth() + 1).padStart(2, '0');
    const d = String(now.getDate()).padStart(2, '0');
    document.getElementById('date-label').textContent = `${y}.${m}.${d}`;

    let busy = false;

    function showToast(msg, duration) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), duration || 3000);
    }

    document.getElementById('folder').addEventListener('click', async () => {
      if (busy) return;
      busy = true;
      showToast('열고 있어요...', 60000);
      try {
        const res = await fetch('/api/diary-today');
        const data = await res.json();
        if (data.url) {
          window.open(data.url, '_blank');
          document.getElementById('toast').classList.remove('show');
        } else {
          showToast(data.error || '오늘 날짜 페이지 없음', 4000);
        }
      } catch (e) {
        showToast('연결 실패', 4000);
      }
      busy = false;
    });
  </script>
</body>
</html>
