<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>C:// CLOCK</title>
  <link rel="stylesheet" href="../../shared/tokens.css" />
  <style>
    body { display: flex; justify-content: center; }

    .window { max-width: 300px; }

    .content {
      padding: 16px 18px 18px;
    }

    .clock-date {
      font-size: 13px;
      color: #777;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .clock-date .day-paren {
      color: var(--accent);
      font-size: 11px;
    }

    .clock-time {
      font-size: 52px;
      font-weight: 700;
      letter-spacing: 3px;
      color: var(--ink);
      font-variant-numeric: tabular-nums;
      display: flex;
      align-items: center;
      line-height: 1;
    }

    .colon {
      color: var(--accent);
      font-size: 36px;
      margin: 0 2px;
      /* pixel heart를 콜론 대신 쓰기 위해 숨김 */
      display: none;
    }

    .hearts {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      margin: 0 6px;
    }

    .heart {
      width: 7px;
      height: 7px;
      background: var(--accent);
      position: relative;
      transform: rotate(45deg);
      flex-shrink: 0;
    }
    .heart::before,
    .heart::after {
      content: '';
      width: 7px;
      height: 7px;
      background: var(--accent);
      border-radius: 50%;
      position: absolute;
    }
    .heart::before { top: -3.5px; left: 0; }
    .heart::after  { left: -3.5px; top: 0; }

    .hearts.blink { animation: blink 1s step-start infinite; }
    @keyframes blink { 50% { opacity: 0; } }
  </style>
</head>
<body>
  <div class="window">
    <div class="titlebar">
      <span data-widget-title>C:// CLOCK</span>
      <span class="icons">
        <span>_</span><span>□</span><span>×</span>
      </span>
    </div>
    <div class="content">
      <div class="clock-date" id="date">
        <span id="date-ymd">----.--.--</span>
        <span class="day-paren" id="date-day">(---)</span>
      </div>
      <div class="clock-time">
        <span id="time-h">00</span>
        <span class="hearts blink" id="hearts">
          <span class="heart"></span>
          <span class="heart"></span>
        </span>
        <span id="time-m">00</span>
      </div>
    </div>
  </div>

  <script src="../../shared/config-loader.js"></script>
  <script>
    loadWidgetConfig();

    const DAYS = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];

    function pad(n) { return String(n).padStart(2, '0'); }

    function tick() {
      const now = new Date();
      document.getElementById('time-h').textContent = pad(now.getHours());
      document.getElementById('time-m').textContent = pad(now.getMinutes());

      const y = now.getFullYear();
      const mo = pad(now.getMonth() + 1);
      const d = pad(now.getDate());
      const day = DAYS[now.getDay()];
      document.getElementById('date-ymd').textContent = `${y}-${mo}-${d}`;
      document.getElementById('date-day').textContent = `(${day})`;
    }

    tick();
    setInterval(tick, 1000);
  </script>
</body>
</html>
