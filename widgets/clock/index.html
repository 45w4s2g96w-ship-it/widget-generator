<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>C:// CLOCK</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../shared/tokens.css" />
  <style>
    :root {
      --card-bg: #1e1b2e;
      --card-radius: 16px;
      --card-gap: 10px;
    }

    body {
      margin: 0;
      padding: 20px;
      background: #111111;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      font-family: 'Montserrat', sans-serif;
    }

    .flip-widget {
      width: 100%;
      max-width: 300px;
    }

    .titlebar {
      background: #111111;
      color: var(--accent);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1.5px;
      padding: 0 2px 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-family: 'Montserrat', sans-serif;
    }

    .date-row { padding: 0 4px 12px; }

    .date-text {
      font-size: 11px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 1px;
      opacity: 0.85;
    }

    .cards-row {
      display: flex;
      gap: var(--card-gap);
    }

    .flip-card {
      flex: 1;
      background: var(--card-bg);
      border-radius: var(--card-radius);
      padding: 20px 12px 14px;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      overflow: hidden;
    }

    .flip-card::after {
      content: '';
      position: absolute;
      left: 0; right: 0;
      top: 50%;
      height: 1px;
      background: rgba(0,0,0,0.4);
      z-index: 10;
    }

    .flip-inner {
      position: relative;
      width: 100%;
      height: 88px;
      perspective: 400px;
    }

    .flip-top, .flip-bot {
      position: absolute;
      left: 0; right: 0;
      overflow: hidden;
      display: flex;
      justify-content: center;
    }
    .flip-top {
      top: 0;
      height: 50%;
      align-items: flex-start;
    }
    .flip-bot {
      bottom: 0;
      height: 50%;
      align-items: flex-end;
    }

    .flip-num {
      font-size: 72px;
      font-weight: 800;
      line-height: 1;
      color: var(--accent);
      letter-spacing: -2px;
      font-variant-numeric: tabular-nums;
      position: absolute;
    }
    .flip-top .flip-num { top: 0; }
    .flip-bot .flip-num { bottom: 0; }

    .flip-anim {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 50%;
      transform-origin: bottom center;
      transform-style: preserve-3d;
      z-index: 5;
      display: none;
    }
    .flip-anim.running {
      display: block;
      animation: flipDown 0.45s ease-in forwards;
    }

    .flip-face {
      position: absolute;
      inset: 0;
      overflow: hidden;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      background: var(--card-bg);
      backface-visibility: hidden;
    }
    .flip-face.back {
      transform: rotateX(180deg);
      align-items: flex-end;
    }
    .flip-face .flip-num { top: 0; bottom: auto; }
    .flip-face.back .flip-num { bottom: 0; top: auto; }

    @keyframes flipDown {
      0%   { transform: rotateX(0deg); }
      100% { transform: rotateX(-180deg); }
    }

    .card-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1.5px;
      color: var(--accent);
      opacity: 0.55;
      margin-top: 8px;
      align-self: flex-end;
    }
  </style>
</head>
<body>
  <div class="flip-widget">
    <div class="titlebar">
      <span data-widget-title>C:// CLOCK</span>
      <span style="opacity:0.75;cursor:default">⚙</span>
    </div>

    <div class="date-row">
      <span class="date-text" id="date-str">---- -- --</span>
    </div>

    <div class="cards-row">
      <div class="flip-card" id="card-h">
        <div class="flip-inner">
          <div class="flip-top"><div class="flip-num" id="h-cur-top">00</div></div>
          <div class="flip-bot"><div class="flip-num" id="h-cur-bot">00</div></div>
          <div class="flip-anim" id="h-anim">
            <div class="flip-face front"><div class="flip-num" id="h-anim-front">00</div></div>
            <div class="flip-face back"><div class="flip-num" id="h-anim-back">00</div></div>
          </div>
        </div>
        <div class="card-label" id="ampm">AM</div>
      </div>

      <div class="flip-card" id="card-m">
        <div class="flip-inner">
          <div class="flip-top"><div class="flip-num" id="m-cur-top">00</div></div>
          <div class="flip-bot"><div class="flip-num" id="m-cur-bot">00</div></div>
          <div class="flip-anim" id="m-anim">
            <div class="flip-face front"><div class="flip-num" id="m-anim-front">00</div></div>
            <div class="flip-face back"><div class="flip-num" id="m-anim-back">00</div></div>
          </div>
        </div>
        <div class="card-label" id="dayofweek">MON</div>
      </div>
    </div>
  </div>

  <script src="../../shared/config-loader.js"></script>
  <script>
    loadWidgetConfig();

    const DAYS = ['SUNDAY','MONDAY','TUESDAY','WEDNESDAY','THURSDAY','FRIDAY','SATURDAY'];
    function pad(n) { return String(n).padStart(2, '0'); }

    let prevH = null, prevM = null;

    function flip(animEl, frontEl, backEl, topEl, botEl, newVal) {
      frontEl.textContent = topEl.textContent;
      backEl.textContent  = newVal;

      animEl.classList.remove('running');
      void animEl.offsetWidth;
      animEl.classList.add('running');

      setTimeout(() => { botEl.textContent = newVal; }, 225);

      animEl.addEventListener('animationend', () => {
        topEl.textContent = newVal;
        animEl.classList.remove('running');
      }, { once: true });
    }

    function tick() {
      const now = new Date();
      const h = now.getHours();
      const m = now.getMinutes();
      const h12 = pad(h % 12 || 12);
      const mStr = pad(m);

      document.getElementById('ampm').textContent      = h < 12 ? 'AM' : 'PM';
      document.getElementById('dayofweek').textContent = DAYS[now.getDay()];
      const y = now.getFullYear(), mo = pad(now.getMonth()+1), d = pad(now.getDate());
      document.getElementById('date-str').textContent  = `${y}.${mo}.${d}`;

      if (h12 !== prevH) {
        if (prevH !== null) {
          flip(
            document.getElementById('h-anim'),
            document.getElementById('h-anim-front'),
            document.getElementById('h-anim-back'),
            document.getElementById('h-cur-top'),
            document.getElementById('h-cur-bot'),
            h12
          );
        } else {
          document.getElementById('h-cur-top').textContent = h12;
          document.getElementById('h-cur-bot').textContent = h12;
        }
        prevH = h12;
      }

      if (mStr !== prevM) {
        if (prevM !== null) {
          flip(
            document.getElementById('m-anim'),
            document.getElementById('m-anim-front'),
            document.getElementById('m-anim-back'),
            document.getElementById('m-cur-top'),
            document.getElementById('m-cur-bot'),
            mStr
          );
        } else {
          document.getElementById('m-cur-top').textContent = mStr;
          document.getElementById('m-cur-bot').textContent = mStr;
        }
        prevM = mStr;
      }
    }

    tick();
    setInterval(tick, 1000);
  </script>
</body>
</html>
