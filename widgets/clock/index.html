<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>C:// CLOCK</title>
  <link rel="stylesheet" href="../../shared/tokens.css" />
  <style>
    @font-face {
      font-family: 'ChosunGu';
      src: url('../../shared/fonts/ChosunGu.TTF') format('truetype');
      font-display: swap;
    }

    body { display: flex; justify-content: center; font-family: 'ChosunGu', sans-serif; }

    .window { max-width: 300px; }

    .content { padding: 16px 18px 18px; }

    .clock-date {
      font-size: 13px;
      color: #777;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .clock-date .day-paren {
      color: var(--accent);
      font-size: 11px;
    }

    .clock-time {
      font-size: 52px;
      font-weight: 700;
      letter-spacing: 3px;
      color: var(--ink);
      font-variant-numeric: tabular-nums;
      display: flex;
      align-items: center;
      line-height: 1;
    }

    /* 픽셀 하트: 5×4 grid, 2px per pixel, box-shadow로 격자 그리기 */
    .hearts {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      margin: 0 10px;
      flex-shrink: 0;
    }

    .pixel-heart {
      position: relative;
      width: 10px;
      height: 8px;
      flex-shrink: 0;
    }
    .pixel-heart::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 2px;
      height: 2px;
      background: transparent;
      box-shadow:
        2px  0px 0 0 var(--accent),
        6px  0px 0 0 var(--accent),
        0px  2px 0 0 var(--accent),
        2px  2px 0 0 var(--accent),
        4px  2px 0 0 var(--accent),
        6px  2px 0 0 var(--accent),
        8px  2px 0 0 var(--accent),
        2px  4px 0 0 var(--accent),
        4px  4px 0 0 var(--accent),
        6px  4px 0 0 var(--accent),
        4px  6px 0 0 var(--accent);
    }

    .hearts.blink { animation: blink 1s step-start infinite; }
    @keyframes blink { 50% { opacity: 0; } }
  </style>
</head>
<body>
  <div class="window">
    <div class="titlebar">
      <span data-widget-title>C:// CLOCK</span>
      <span style="opacity:0.75;cursor:default">⚙</span>
    </div>
    <div class="content">
      <div class="clock-date">
        <span id="date-ymd">----.--.--</span>
        <span class="day-paren" id="date-day">(---)</span>
      </div>
      <div class="clock-time">
        <span id="time-h">00</span>
        <span class="hearts blink">
          <span class="pixel-heart"></span>
          <span class="pixel-heart"></span>
        </span>
        <span id="time-m">00</span>
      </div>
    </div>
  </div>

  <script src="../../shared/config-loader.js"></script>
  <script>
    loadWidgetConfig();

    const DAYS = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];

    function pad(n) { return String(n).padStart(2, '0'); }

    function tick() {
      const now = new Date();
      document.getElementById('time-h').textContent = pad(now.getHours());
      document.getElementById('time-m').textContent = pad(now.getMinutes());

      const y = now.getFullYear();
      const mo = pad(now.getMonth() + 1);
      const d = pad(now.getDate());
      document.getElementById('date-ymd').textContent = `${y}-${mo}-${d}`;
      document.getElementById('date-day').textContent = `(${DAYS[now.getDay()]})`;
    }

    tick();
    setInterval(tick, 1000);
  </script>
</body>
</html>
