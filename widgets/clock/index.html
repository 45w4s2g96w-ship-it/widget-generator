<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clock Widget</title>
<link rel="stylesheet" href="/shared/tokens.css">
<style>
  body {
    margin: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    background: transparent;
  }
  .window {
    width: 280px;
  }
  .content {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    padding: 24px 16px;
  }
  .clock-time {
    font-size: 32px;
    font-weight: 700;
    color: var(--ink);
    letter-spacing: 1px;
  }
  .clock-date {
    font-size: 13px;
    color: var(--accent);
  }
</style>
</head>
<body>
  <div class="window">
    <div class="titlebar" data-widget-title>C:// CLOCK</div>
    <div class="content">
      <div class="clock-time" id="time">00:00:00</div>
      <div class="clock-date" id="date">----.--.--</div>
    </div>
  </div>

  <script type="module">
    import { loadWidgetConfig } from '/shared/config-loader.js';

    async function init() {
      await loadWidgetConfig();
      tick();
      setInterval(tick, 1000);
    }

    function tick() {
      const now = new Date();
      const hh = String(now.getHours()).padStart(2, '0');
      const mm = String(now.getMinutes()).padStart(2, '0');
      const ss = String(now.getSeconds()).padStart(2, '0');
      document.getElementById('time').textContent = `${hh}:${mm}:${ss}`;

      const days = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
      const y = now.getFullYear();
      const m = String(now.getMonth() + 1).padStart(2, '0');
      const d = String(now.getDate()).padStart(2, '0');
      document.getElementById('date').textContent = `${y}.${m}.${d} ${days[now.getDay()]}`;
    }

    init();
  </script>
</body>
</html>
