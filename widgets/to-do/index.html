<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>C:// TO-DO</title>
  <link rel="stylesheet" href="../../shared/tokens.css" />
  <style>
    @font-face {
      font-family: 'ChosunGu';
      src: url('../../shared/fonts/ChosunGu.TTF') format('truetype');
      font-display: swap;
    }

    body {
      display: flex;
      justify-content: center;
      font-family: 'ChosunGu', 'Helvetica Neue', sans-serif;
    }

    .window { max-width: 320px; }

    .content {
      padding: 10px 12px 14px;
      min-height: 120px;
      max-height: 480px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 0;
    }
    .content::-webkit-scrollbar { width: 3px; }
    .content::-webkit-scrollbar-thumb { background: #ddd; }

    .group-label {
      font-size: 9.5px;
      font-weight: 700;
      letter-spacing: 0.6px;
      color: #999;
      text-transform: uppercase;
      padding: 8px 0 3px;
      border-bottom: 1px solid #eee;
      margin-bottom: 2px;
    }
    .group-label:first-child { padding-top: 2px; }

    /* parent todo row */
    .todo-row {
      display: flex;
      align-items: baseline;
      gap: 4px;
      padding: 3px 0;
      cursor: default;
    }
    .todo-text {
      flex: 1;
      font-size: 11.5px;
      line-height: 1.5;
      color: var(--ink);
      cursor: pointer;
      word-break: break-all;
    }
    .todo-text:hover { text-decoration: underline; }
    .todo-period {
      font-size: 10px;
      color: #aaa;
      white-space: nowrap;
      flex-shrink: 0;
    }

    /* highlight today items */
    .todo-row.today .todo-text {
      background: linear-gradient(transparent 55%, rgba(255, 230, 0, 0.45) 55%);
      display: inline;
    }
    .todo-row.today .todo-period { color: #c0392b; font-weight: 700; }

    /* pin */
    .pin-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 12px;
      padding: 0 2px;
      line-height: 1;
      opacity: 0.35;
      flex-shrink: 0;
      filter: grayscale(1);
      transition: opacity 0.15s;
    }
    .pin-btn:hover { opacity: 0.7; }
    .pin-btn.pinned {
      opacity: 1;
      filter: none;
    }

    /* toggle arrow */
    .toggle-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 9px;
      color: #bbb;
      padding: 0;
      flex-shrink: 0;
      line-height: 1.6;
      width: 12px;
      text-align: center;
    }
    .toggle-btn:hover { color: var(--ink); }

    /* subtask list */
    .subtask-list {
      display: none;
      padding-left: 16px;
      margin-bottom: 2px;
    }
    .subtask-list.open { display: block; }

    .subtask-row {
      display: flex;
      align-items: baseline;
      gap: 4px;
      padding: 2px 0;
    }
    .subtask-text {
      flex: 1;
      font-size: 11px;
      color: #555;
      cursor: pointer;
      word-break: break-all;
    }
    .subtask-text:hover { text-decoration: underline; }
    .subtask-period {
      font-size: 9.5px;
      color: #bbb;
      white-space: nowrap;
    }
    .subtask-row.today .subtask-text {
      background: linear-gradient(transparent 55%, rgba(255, 230, 0, 0.45) 55%);
      display: inline;
    }
    .subtask-row.today .subtask-period { color: #c0392b; font-weight: 700; }

    .empty-msg {
      font-size: 11px;
      color: #ccc;
      text-align: center;
      padding: 20px 0;
    }

    /* ── edit modal ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.35);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }

    .modal {
      background: #fff;
      border: 1px solid var(--border);
      padding: 16px;
      width: 280px;
      font-family: 'ChosunGu', 'Helvetica Neue', sans-serif;
    }

    .modal-title {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.4px;
      color: #444;
      margin-bottom: 12px;
    }

    .modal label {
      display: block;
      font-size: 10px;
      color: #888;
      margin-bottom: 3px;
      margin-top: 10px;
    }
    .modal label:first-of-type { margin-top: 0; }

    .modal input[type="text"],
    .modal input[type="date"],
    .modal input[type="datetime-local"] {
      width: 100%;
      border: 1px solid #ddd;
      padding: 5px 7px;
      font-family: 'ChosunGu', 'Helvetica Neue', sans-serif;
      font-size: 11.5px;
      color: var(--ink);
      outline: none;
    }
    .modal input:focus { border-color: var(--accent); }

    .modal-actions {
      display: flex;
      gap: 6px;
      justify-content: flex-end;
      margin-top: 14px;
    }

    .modal-actions button {
      border: 1px solid var(--accent);
      background: var(--accent);
      color: #fff;
      font-family: 'ChosunGu', 'Helvetica Neue', sans-serif;
      font-size: 10.5px;
      padding: 4px 12px;
      cursor: pointer;
    }
    .modal-actions button:hover { filter: brightness(1.1); }
    .modal-actions button:active { filter: brightness(0.9); }
    .modal-actions button:disabled { opacity: 0.45; cursor: default; filter: none; }
    .modal-actions .cancel-btn {
      background: #fff;
      color: #666;
      border-color: #ccc;
    }
    .modal-actions .cancel-btn:hover { filter: none; background: #f5f5f5; }

    .modal-status {
      font-size: 10px;
      min-height: 14px;
      color: #c0392b;
      margin-top: 6px;
    }
    .modal-status.ok { color: var(--accent); }
  </style>
</head>
<body>
  <div class="window">
    <div class="titlebar">
      <span data-widget-title>C:// TO-DO</span>
      <span style="opacity:0.75;cursor:default">⚙</span>
    </div>
    <div class="content" id="todo-content">
      <div class="empty-msg">불러오는 중...</div>
    </div>
  </div>

  <!-- edit modal -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <div class="modal-title">항목 편집</div>
      <label>제목</label>
      <input type="text" id="edit-title" />
      <label>마감일</label>
      <input type="datetime-local" id="edit-due" />
      <div class="modal-status" id="modal-status"></div>
      <div class="modal-actions">
        <button class="cancel-btn" id="modal-cancel">취소</button>
        <button id="modal-save">저장</button>
      </div>
    </div>
  </div>

  <script src="../../shared/config-loader.js"></script>
  <script>
    let cfg = {};
    let allPages = [];
    let todayStr = '';
    let editingPageId = null;
    let openToggles = new Set();

    (async () => {
      cfg = await loadWidgetConfig();
      await loadTodos();
    })();

    async function loadTodos() {
      try {
        const params = new URLSearchParams({ source_db_id: cfg.source_db_id });
        const r = await fetch('/api/get-todo?' + params);
        const data = await r.json();
        if (!r.ok) throw new Error(data.error);
        allPages = data.pages;
        todayStr = data.today;
        render();
      } catch (err) {
        document.getElementById('todo-content').innerHTML =
          `<div class="empty-msg">${escHtml(err.message)}</div>`;
      }
    }

    // ── date helpers ──

    function getSeoulDate(str) {
      // str is ISO date string from Notion (YYYY-MM-DD or YYYY-MM-DDTHH:mm:ss+09:00)
      return str.slice(0, 10);
    }

    function getWeekBounds(todayISO) {
      const d = new Date(todayISO + 'T00:00:00');
      // Monday=0 ... Sunday=6 offset
      const dow = (d.getDay() + 6) % 7; // Mon=0
      const mon = new Date(d); mon.setDate(d.getDate() - dow);
      const sun = new Date(mon); sun.setDate(mon.getDate() + 6);
      const fmt = dt => dt.toLocaleDateString('sv-SE');
      return { weekStart: fmt(mon), weekEnd: fmt(sun) };
    }

    function getPeriod(page, todayISO) {
      if (!page.dueStart) return null;
      const dateOnly = getSeoulDate(page.dueStart);
      if (dateOnly === todayISO) return 'today';
      const { weekEnd } = getWeekBounds(todayISO);
      if (dateOnly <= weekEnd) return 'week';
      return 'month';
    }

    function periodLabel(page, todayISO) {
      const dateOnly = getSeoulDate(page.dueStart);
      if (dateOnly === todayISO) {
        if (page.hasTime) {
          const t = page.dueStart.slice(11, 16);
          return `(${t})`;
        }
        return '(오늘)';
      }
      const { weekEnd } = getWeekBounds(todayISO);
      if (dateOnly <= weekEnd) return '(이번 주)';
      return '(이번 달)';
    }

    // ── render ──

    function render() {
      const content = document.getElementById('todo-content');

      // build id→page map
      const pageMap = {};
      allPages.forEach(p => { pageMap[p.id] = p; });

      // separate parents (no parent) and children
      const parents = allPages.filter(p => p.parentIds.length === 0);
      const orphans = allPages.filter(p => p.parentIds.length > 0 &&
        !p.parentIds.some(pid => pageMap[pid]));
      // treat orphans (parent not in current result set) as top-level
      const topLevel = [...parents, ...orphans];

      if (topLevel.length === 0 && allPages.length === 0) {
        content.innerHTML = '<div class="empty-msg">이번 달 마감 항목이 없어요.</div>';
        return;
      }

      // sort by period then date
      function sortKey(p) {
        const period = getPeriod(p, todayStr);
        const order = period === 'today' ? 0 : period === 'week' ? 1 : 2;
        return `${order}_${p.dueStart || 'z'}`;
      }
      topLevel.sort((a, b) => sortKey(a).localeCompare(sortKey(b)));

      const groups = [
        { key: 'today', label: '오늘', items: topLevel.filter(p => getPeriod(p, todayStr) === 'today') },
        { key: 'week',  label: '이번 주', items: topLevel.filter(p => getPeriod(p, todayStr) === 'week') },
        { key: 'month', label: '이번 달', items: topLevel.filter(p => getPeriod(p, todayStr) === 'month') },
      ];

      const frag = document.createDocumentFragment();

      groups.forEach(group => {
        if (group.items.length === 0) return;

        const label = document.createElement('div');
        label.className = 'group-label';
        label.textContent = group.label;
        frag.appendChild(label);

        group.items.forEach(page => {
          const isToday = getPeriod(page, todayStr) === 'today';
          const children = page.childIds.map(cid => pageMap[cid]).filter(Boolean);

          // parent row
          const row = document.createElement('div');
          row.className = 'todo-row' + (isToday ? ' today' : '');

          // toggle button (only if has children)
          const toggleBtn = document.createElement('button');
          toggleBtn.className = 'toggle-btn';
          if (children.length > 0) {
            toggleBtn.textContent = openToggles.has(page.id) ? '▾' : '▸';
          } else {
            toggleBtn.textContent = '';
            toggleBtn.style.cursor = 'default';
          }

          const textSpan = document.createElement('span');
          textSpan.className = 'todo-text';
          textSpan.textContent = page.title;

          const periodSpan = document.createElement('span');
          periodSpan.className = 'todo-period';
          periodSpan.textContent = periodLabel(page, todayStr);

          const pinBtn = document.createElement('button');
          pinBtn.className = 'pin-btn' + (isToday ? ' pinned' : '');
          pinBtn.textContent = '📌';
          pinBtn.title = '오늘로 고정';

          row.appendChild(toggleBtn);
          row.appendChild(textSpan);
          row.appendChild(periodSpan);
          row.appendChild(pinBtn);
          frag.appendChild(row);

          // subtask list
          const subList = document.createElement('div');
          subList.className = 'subtask-list' + (openToggles.has(page.id) ? ' open' : '');

          children.forEach(child => {
            const childPeriod = child.dueStart ? getPeriod(child, todayStr) : null;
            const childToday = childPeriod === 'today';

            const subRow = document.createElement('div');
            subRow.className = 'subtask-row' + (childToday ? ' today' : '');

            const subText = document.createElement('span');
            subText.className = 'subtask-text';
            subText.textContent = child.title;

            const subPeriod = document.createElement('span');
            subPeriod.className = 'subtask-period';
            subPeriod.textContent = child.dueStart ? periodLabel(child, todayStr) : '';

            subRow.appendChild(subText);
            subRow.appendChild(subPeriod);
            subList.appendChild(subRow);

            subText.addEventListener('click', () => openEditModal(child));
          });

          frag.appendChild(subList);

          // events
          if (children.length > 0) {
            toggleBtn.addEventListener('click', () => {
              if (openToggles.has(page.id)) openToggles.delete(page.id);
              else openToggles.add(page.id);
              render();
            });
          }

          textSpan.addEventListener('click', () => openEditModal(page));

          pinBtn.addEventListener('click', async () => {
            pinBtn.disabled = true;
            try {
              const r = await fetch('/api/get-todo', {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ pageId: page.id, dueDate: todayStr }),
              });
              const data = await r.json();
              if (!r.ok) throw new Error(data.error);
              // update local state
              page.dueStart = todayStr;
              page.hasTime = false;
              render();
            } catch (err) {
              alert('핀 저장 실패: ' + err.message);
              pinBtn.disabled = false;
            }
          });
        });
      });

      content.innerHTML = '';
      content.appendChild(frag);
    }

    // ── edit modal ──

    function openEditModal(page) {
      editingPageId = page.id;
      document.getElementById('edit-title').value = page.title;

      const dueInput = document.getElementById('edit-due');
      if (page.dueStart) {
        if (page.hasTime) {
          dueInput.value = page.dueStart.slice(0, 16);
        } else {
          dueInput.value = page.dueStart.slice(0, 10) + 'T00:00';
        }
      } else {
        dueInput.value = '';
      }

      document.getElementById('modal-status').textContent = '';
      document.getElementById('modal-status').className = 'modal-status';
      document.getElementById('modal-save').disabled = false;
      document.getElementById('modal-overlay').classList.add('open');
    }

    document.getElementById('modal-cancel').addEventListener('click', closeModal);
    document.getElementById('modal-overlay').addEventListener('click', (e) => {
      if (e.target === document.getElementById('modal-overlay')) closeModal();
    });

    function closeModal() {
      document.getElementById('modal-overlay').classList.remove('open');
      editingPageId = null;
    }

    document.getElementById('modal-save').addEventListener('click', async () => {
      if (!editingPageId) return;
      const title = document.getElementById('edit-title').value.trim();
      const dueRaw = document.getElementById('edit-due').value;
      if (!title) {
        setModalStatus('제목을 입력해주세요.', '');
        return;
      }

      const saveBtn = document.getElementById('modal-save');
      saveBtn.disabled = true;
      setModalStatus('저장 중...');

      // convert datetime-local to ISO with seconds
      let dueDate = null;
      let hasTime = false;
      if (dueRaw) {
        const dateOnly = dueRaw.slice(0, 10);
        const timePart = dueRaw.slice(11, 16);
        if (timePart && timePart !== '00:00') {
          dueDate = `${dateOnly}T${timePart}:00+09:00`;
          hasTime = true;
        } else {
          dueDate = dateOnly;
        }
      }

      try {
        const r = await fetch('/api/get-todo', {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ pageId: editingPageId, title, dueDate }),
        });
        const data = await r.json();
        if (!r.ok) throw new Error(data.error);

        // update local state
        const page = allPages.find(p => p.id === editingPageId);
        if (page) {
          page.title = title;
          page.dueStart = dueDate;
          page.hasTime = hasTime;
          // if new due is beyond this month or null, remove from list
          const now = new Date(todayStr + 'T00:00:00');
          const endOfMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0)
            .toLocaleDateString('sv-SE');
          if (!dueDate || dueDate.slice(0, 10) > endOfMonth) {
            allPages = allPages.filter(p => p.id !== editingPageId);
          }
        }

        setModalStatus('저장됨 ✓', 'ok');
        setTimeout(() => {
          closeModal();
          render();
        }, 600);
      } catch (err) {
        setModalStatus(err.message, '');
        saveBtn.disabled = false;
      }
    });

    function setModalStatus(msg, type) {
      const el = document.getElementById('modal-status');
      el.textContent = msg;
      el.className = 'modal-status' + (type ? ' ' + type : '');
    }

    function escHtml(str) {
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }
  </script>
</body>
</html>
