<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>C:// TO-DO</title>
  <link rel="stylesheet" href="../../shared/tokens.css" />
  <style>
    @font-face {
      font-family: 'ChosunGu';
      src: url('../../shared/fonts/ChosunGu.TTF') format('truetype');
      font-display: swap;
    }
    body { display: flex; justify-content: center; font-family: 'ChosunGu', 'Helvetica Neue', sans-serif; }
    .window { max-width: 320px; }

    .titlebar-right { display: flex; align-items: center; gap: 6px; }
    #add-btn { background: none; border: none; color: #fff; font-size: 15px; line-height: 1; cursor: pointer; opacity: 0.75; padding: 0; }
    #add-btn:hover { opacity: 1; }

    .content { padding: 5px 6px 7px; height: 720px; overflow-y: auto; display: flex; flex-direction: column; }
    .content::-webkit-scrollbar { width: 3px; }
    .content::-webkit-scrollbar-thumb { background: #ddd; }

    .todo-row { display: flex; align-items: center; gap: 5px; padding: 3px 4px 3px 2px; border-radius: 2px; }
    .todo-row.today { background: rgba(180, 155, 215, 0.28); }

    .pin-btn {
      background: none; border: none; cursor: pointer;
      font-size: 11px; padding: 0; line-height: 1; flex-shrink: 0;
      filter: grayscale(1); opacity: 0.3; transition: opacity 0.15s;
    }
    .pin-btn:hover { opacity: 0.6; }
    .pin-btn.pinned {
      filter: invert(52%) sepia(30%) saturate(500%) hue-rotate(220deg) brightness(0.9);
      opacity: 1;
    }

    .todo-label { flex: 1; display: flex; align-items: center; gap: 3px; min-width: 0; cursor: pointer; }
    .todo-label:hover .todo-inner { text-decoration: underline; }
    .todo-inner { font-size: 11.5px; line-height: 1.55; color: var(--ink); word-break: break-all; }
    .todo-inner.done-text { text-decoration: line-through; color: #aaa; }

    .done-btn { width: 12px; height: 12px; border: 1px solid #bbb; background: #fff; flex-shrink: 0; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 9px; color: transparent; }
    .done-btn.checked { background: #bbb; color: #fff; }

    .empty-msg { font-size: 11px; color: #ccc; text-align: center; padding: 20px 0; }

    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.32); z-index: 100; align-items: center; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #fff; border: 1px solid var(--border);
      padding: 12px 12px 10px; width: 232px;
      font-family: 'ChosunGu', 'Helvetica Neue', sans-serif;
    }

    .field { margin-bottom: 7px; }
    .field label { display: block; font-size: 9px; color: #bbb; letter-spacing: 0.3px; margin-bottom: 2px; }
    .field input[type="text"],
    .field input[type="datetime-local"],
    .field textarea {
      width: 100%; border: 1px solid #e0e0e0; padding: 4px 6px;
      font-family: 'ChosunGu', 'Helvetica Neue', sans-serif;
      font-size: 11px; color: var(--ink); outline: none; box-sizing: border-box;
    }
    .field textarea { resize: none; height: 44px; line-height: 1.45; }
    .field input:focus, .field textarea:focus { border-color: var(--accent); }

    .field-check { display: flex; align-items: center; gap: 6px; padding: 2px 0; }
    .field-check input[type="checkbox"] { width: 12px; height: 12px; accent-color: var(--accent); cursor: pointer; margin: 0; }
    .field-check label { font-size: 11px; color: #555; cursor: pointer; }

    .modal-actions { display: flex; gap: 5px; justify-content: flex-end; margin-top: 10px; }
    .modal-actions button {
      border: 1px solid var(--accent); background: var(--accent); color: #fff;
      font-family: 'ChosunGu', 'Helvetica Neue', sans-serif;
      font-size: 10px; padding: 3px 12px; cursor: pointer;
    }
    .modal-actions button:hover { filter: brightness(1.1); }
    .modal-actions button:active { filter: brightness(0.9); }
    .modal-actions button:disabled { opacity: 0.45; cursor: default; filter: none; }
    .modal-actions .cancel-btn { background: #fff; color: #888; border-color: #ccc; }
    .modal-actions .cancel-btn:hover { filter: none; background: #f5f5f5; }
    .modal-status { font-size: 9.5px; min-height: 13px; color: #c0392b; margin-top: 4px; }
    .modal-status.ok { color: var(--accent); }
  </style>
</head>
<body>
  <div class="window">
    <div class="titlebar">
      <span data-widget-title>C:// TO-DO</span>
      <div class="titlebar-right">
        <button id="add-btn" title="할일 추가">+</button>
        <span style="opacity:0.75;cursor:default">&#9881;</span>
      </div>
    </div>
    <div class="content" id="todo-content">
      <div class="empty-msg">불러오는 중...</div>
    </div>
  </div>

  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <div class="field">
        <label>이름 *</label>
        <input type="text" id="f-title" placeholder="할일" />
      </div>
      <div class="field">
        <label>마감일</label>
        <input type="datetime-local" id="f-due" />
      </div>
      <div class="field">
        <label>메모</label>
        <textarea id="f-memo" placeholder="메모"></textarea>
      </div>
      <div class="field-check">
        <input type="checkbox" id="f-done" />
        <label for="f-done">완료</label>
      </div>
      <div class="modal-status" id="modal-status"></div>
      <div class="modal-actions">
        <button class="cancel-btn" id="modal-cancel">취소</button>
        <button id="modal-save">저장</button>
      </div>
    </div>
  </div>

  <script src="../../shared/config-loader.js"></script>
  <script>
    let cfg = {}, allPages = [], todayStr = '', endOfWeek = '';
    let editingPageId = null;

    (async () => { cfg = await loadWidgetConfig(); await loadTodos(); })();

    async function loadTodos() {
      try {
        const r = await fetch('/api/get-todo?' + new URLSearchParams({ source_db_id: cfg.source_db_id }));
        const data = await r.json();
        if (!r.ok) throw new Error(data.error);
        allPages = data.pages; todayStr = data.today; endOfWeek = data.endOfWeek;
        render();
      } catch (err) {
        document.getElementById('todo-content').innerHTML = `<div class="empty-msg">${escHtml(err.message)}</div>`;
      }
    }

    function dateOnly(str) { return str ? str.slice(0, 10) : ''; }
    function isToday(page) { return dateOnly(page.dueStart) === todayStr; }
    function periodLabel(page) {
      if (!isToday(page)) return null;
      return page.hasTime ? `(${page.dueStart.slice(11, 16)})` : null;
    }
    function byDate(a, b) {
      const da = dateOnly(a.dueStart || ''), db = dateOnly(b.dueStart || '');
      if (da !== db) return da.localeCompare(db);
      if (a.hasTime !== b.hasTime) return a.hasTime ? -1 : 1;
      return (a.dueStart || '').localeCompare(b.dueStart || '');
    }

    function render() {
      const content = document.getElementById('todo-content');
      const items = [...allPages].sort(byDate);
      if (!items.length) {
        content.innerHTML = '<div class="empty-msg">이번 주 마감 할일이 없어요.</div>';
        return;
      }
      const frag = document.createDocumentFragment();
      items.forEach(page => {
        const today = isToday(page);
        const pLabel = periodLabel(page);
        const row = document.createElement('div');
        row.className = 'todo-row' + (today ? ' today' : '');

        const pinBtn = document.createElement('button');
        pinBtn.className = 'pin-btn' + (today ? ' pinned' : '');
        pinBtn.textContent = '📌';
        pinBtn.title = '오늘로 고정';

        const labelDiv = document.createElement('div');
        labelDiv.className = 'todo-label';
        const inner = document.createElement('span');
        inner.className = 'todo-inner' + (page.done ? ' done-text' : '');
        inner.textContent = pLabel ? `${page.title} ${pLabel}` : page.title;
        labelDiv.appendChild(inner);

        const doneBtn = document.createElement('div');
        doneBtn.className = 'done-btn' + (page.done ? ' checked' : '');
        doneBtn.textContent = page.done ? '✓' : '';

        row.appendChild(pinBtn);
        row.appendChild(labelDiv);
        row.appendChild(doneBtn);
        frag.appendChild(row);

        labelDiv.addEventListener('click', () => openModal(page));
        pinBtn.addEventListener('click', () => pinToday(page, pinBtn));
        doneBtn.addEventListener('click', () => toggleDone(page, doneBtn, inner));
      });
      content.innerHTML = '';
      content.appendChild(frag);
    }

    async function pinToday(page, btn) {
      btn.disabled = true;
      try {
        const r = await fetch('/api/get-todo', { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ pageId: page.id, dueDate: todayStr, cfg }) });
        const data = await r.json();
        if (!r.ok) throw new Error(data.error);
        page.dueStart = todayStr; page.hasTime = false; render();
      } catch (err) { alert('핀 저장 실패: ' + err.message); btn.disabled = false; }
    }

    async function toggleDone(page, btn, textEl) {
      const newDone = !page.done;
      btn.classList.toggle('checked', newDone); btn.textContent = newDone ? '✓' : '';
      textEl.classList.toggle('done-text', newDone); page.done = newDone;
      try {
        await fetch('/api/get-todo', { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ pageId: page.id, done: newDone, cfg }) });
      } catch { page.done = !newDone; btn.classList.toggle('checked', !newDone); textEl.classList.toggle('done-text', !newDone); }
    }

    function openModal(page) {
      editingPageId = page ? page.id : null;
      document.getElementById('f-title').value = page ? page.title : '';
      document.getElementById('f-memo').value = page ? (page.memo || '') : '';
      document.getElementById('f-done').checked = page ? page.done : false;
      const dueInput = document.getElementById('f-due');
      dueInput.value = (page && page.dueStart)
        ? `${page.dueStart.slice(0, 10)}T${page.hasTime ? page.dueStart.slice(11, 16) : '00:00'}`
        : '';
      document.getElementById('modal-status').textContent = '';
      document.getElementById('modal-status').className = 'modal-status';
      document.getElementById('modal-save').disabled = false;
      document.getElementById('modal-overlay').classList.add('open');
      setTimeout(() => document.getElementById('f-title').focus(), 50);
    }

    document.getElementById('add-btn').addEventListener('click', () => openModal(null));
    document.getElementById('modal-cancel').addEventListener('click', closeModal);
    document.getElementById('modal-overlay').addEventListener('click', e => { if (e.target === document.getElementById('modal-overlay')) closeModal(); });
    function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }

    document.getElementById('modal-save').addEventListener('click', async () => {
      const title = document.getElementById('f-title').value.trim();
      const dueRaw = document.getElementById('f-due').value;
      const memo = document.getElementById('f-memo').value.trim();
      const done = document.getElementById('f-done').checked;
      if (!title) { setModalStatus('이름을 입력해주세요.'); return; }

      const saveBtn = document.getElementById('modal-save');
      saveBtn.disabled = true; setModalStatus('저장 중...');

      let dueDate = null, hasTime = false;
      if (dueRaw) {
        const d = dueRaw.slice(0, 10), t = dueRaw.slice(11, 16);
        if (t && t !== '00:00') { dueDate = `${d}T${t}:00+09:00`; hasTime = true; }
        else dueDate = d;
      }

      try {
        if (editingPageId) {
          const r = await fetch('/api/get-todo', { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ pageId: editingPageId, title, dueDate, memo, done, cfg }) });
          const data = await r.json();
          if (!r.ok) throw new Error(data.error);
          const page = allPages.find(p => p.id === editingPageId);
          if (page) {
            page.title = title; page.dueStart = dueDate; page.hasTime = hasTime; page.memo = memo; page.done = done;
            const d = dueDate ? dueDate.slice(0, 10) : null;
            if (!d || d < todayStr || d > endOfWeek) allPages = allPages.filter(p => p.id !== editingPageId);
          }
        } else {
          const r = await fetch('/api/get-todo', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ source_db_id: cfg.source_db_id, title, dueDate, memo, cfg }) });
          const newPage = await r.json();
          if (!r.ok) throw new Error(newPage.error);
          const d = newPage.dueStart ? newPage.dueStart.slice(0, 10) : null;
          if (d && d >= todayStr && d <= endOfWeek) allPages.push(newPage);
        }
        setModalStatus('저장됨 ✓', 'ok');
        setTimeout(() => { closeModal(); render(); }, 500);
      } catch (err) { setModalStatus(err.message); saveBtn.disabled = false; }
    });

    function setModalStatus(msg, type) {
      const el = document.getElementById('modal-status');
      el.textContent = msg; el.className = 'modal-status' + (type ? ' ' + type : '');
    }
    function escHtml(str) { return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
  </script>
</body>
</html>
