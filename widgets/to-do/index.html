<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>C:// TO-DO</title>
  <link rel="stylesheet" href="../../shared/tokens.css" />
  <style>
    @font-face {
      font-family: 'ChosunGu';
      src: url('../../shared/fonts/ChosunGu.TTF') format('truetype');
      font-display: swap;
    }
    body { display: flex; justify-content: center; font-family: 'ChosunGu', 'Helvetica Neue', sans-serif; }
    .window { max-width: 320px; }

    .titlebar-right { display: flex; align-items: center; gap: 6px; }
    #add-btn { background: none; border: none; color: #fff; font-size: 14px; line-height: 1; cursor: pointer; opacity: 0.75; padding: 0; }
    #add-btn:hover { opacity: 1; }

    .content { padding: 10px 12px 14px; min-height: 120px; max-height: 480px; overflow-y: auto; display: flex; flex-direction: column; }
    .content::-webkit-scrollbar { width: 3px; }
    .content::-webkit-scrollbar-thumb { background: #ddd; }

    .todo-row { display: flex; align-items: center; gap: 5px; padding: 3px 4px 3px 2px; border-radius: 2px; }
    .todo-row.today { background: rgba(180, 155, 215, 0.28); }

    .pin-btn { background: none; border: none; cursor: pointer; font-size: 11px; padding: 0; line-height: 1; opacity: 0.28; flex-shrink: 0; filter: grayscale(1); transition: opacity 0.15s; }
    .pin-btn:hover { opacity: 0.65; }
    .pin-btn.pinned { opacity: 1; filter: none; }

    .todo-label { flex: 1; display: flex; align-items: center; gap: 3px; min-width: 0; cursor: pointer; }
    .todo-label:hover .todo-inner { text-decoration: underline; }
    .todo-inner { font-size: 11.5px; line-height: 1.55; color: var(--ink); word-break: break-all; }
    .todo-inner.done-text { text-decoration: line-through; color: #aaa; }

    .toggle-btn { background: none; border: none; cursor: pointer; font-size: 13.5px; color: #bbb; padding: 0; flex-shrink: 0; line-height: 1; }
    .toggle-btn:hover { color: var(--ink); }
    .toggle-btn.empty { cursor: default; visibility: hidden; }

    .done-btn { width: 12px; height: 12px; border: 1px solid #bbb; background: #fff; flex-shrink: 0; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 9px; color: transparent; }
    .done-btn.checked { background: #bbb; color: #fff; }

    .subtask-list { display: none; padding-left: 20px; margin-bottom: 2px; }
    .subtask-list.open { display: block; }
    .subtask-row { display: flex; align-items: center; gap: 4px; padding: 2px 4px 2px 2px; border-radius: 2px; cursor: pointer; }
    .subtask-row.today { background: rgba(180, 155, 215, 0.28); }
    .subtask-row:hover .subtask-inner { text-decoration: underline; }
    .subtask-inner { flex: 1; font-size: 11px; color: #555; word-break: break-all; }
    .subtask-inner.done-text { text-decoration: line-through; color: #bbb; }
    .sub-done-btn { width: 10px; height: 10px; border: 1px solid #ccc; background: #fff; flex-shrink: 0; cursor: pointer; }
    .sub-done-btn.checked { background: #ccc; }

    .empty-msg { font-size: 11px; color: #ccc; text-align: center; padding: 20px 0; }

    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.35); z-index: 100; align-items: center; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal { background: #fff; border: 1px solid var(--border); padding: 16px; width: 280px; font-family: 'ChosunGu', 'Helvetica Neue', sans-serif; }
    .modal-title { font-size: 11px; font-weight: 700; letter-spacing: 0.4px; color: #444; margin-bottom: 12px; }
    .modal label { display: block; font-size: 10px; color: #888; margin-bottom: 3px; margin-top: 10px; }
    .modal label:first-of-type { margin-top: 0; }
    .modal input[type="text"], .modal input[type="datetime-local"] { width: 100%; border: 1px solid #ddd; padding: 5px 7px; font-family: 'ChosunGu', 'Helvetica Neue', sans-serif; font-size: 11.5px; color: var(--ink); outline: none; }
    .modal input:focus { border-color: var(--accent); }
    .modal-actions { display: flex; gap: 6px; justify-content: flex-end; margin-top: 14px; }
    .modal-actions button { border: 1px solid var(--accent); background: var(--accent); color: #fff; font-family: 'ChosunGu', 'Helvetica Neue', sans-serif; font-size: 10.5px; padding: 4px 12px; cursor: pointer; }
    .modal-actions button:hover { filter: brightness(1.1); }
    .modal-actions button:active { filter: brightness(0.9); }
    .modal-actions button:disabled { opacity: 0.45; cursor: default; filter: none; }
    .modal-actions .cancel-btn { background: #fff; color: #666; border-color: #ccc; }
    .modal-actions .cancel-btn:hover { filter: none; background: #f5f5f5; }
    .modal-status { font-size: 10px; min-height: 14px; color: #c0392b; margin-top: 6px; }
    .modal-status.ok { color: var(--accent); }
  </style>
</head>
<body>
  <div class="window">
    <div class="titlebar">
      <span data-widget-title>C:// TO-DO</span>
      <div class="titlebar-right">
        <button id="add-btn" title="할일 추가">+</button>
        <span style="opacity:0.75;cursor:default">&#9881;</span>
      </div>
    </div>
    <div class="content" id="todo-content">
      <div class="empty-msg">불러오는 중...</div>
    </div>
  </div>

  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <div class="modal-title" id="modal-heading">항목 편집</div>
      <label>제목</label>
      <input type="text" id="edit-title" />
      <label>마감일</label>
      <input type="datetime-local" id="edit-due" />
      <div class="modal-status" id="modal-status"></div>
      <div class="modal-actions">
        <button class="cancel-btn" id="modal-cancel">취소</button>
        <button id="modal-save">저장</button>
      </div>
    </div>
  </div>

  <script src="../../shared/config-loader.js"></script>
  <script>
    let cfg = {}, allPages = [], todayStr = '', endOfWeek = '';
    let editingPageId = null, openToggles = new Set();

    (async () => { cfg = await loadWidgetConfig(); await loadTodos(); })();

    async function loadTodos() {
      try {
        const r = await fetch('/api/get-todo?' + new URLSearchParams({ source_db_id: cfg.source_db_id }));
        const data = await r.json();
        if (!r.ok) throw new Error(data.error);
        allPages = data.pages; todayStr = data.today; endOfWeek = data.endOfWeek;
        render();
      } catch (err) {
        document.getElementById('todo-content').innerHTML = `<div class="empty-msg">${escHtml(err.message)}</div>`;
      }
    }

    function dateOnly(str) { return str ? str.slice(0, 10) : ''; }

    function isToday(page) { return dateOnly(page.dueStart) === todayStr; }

    function periodLabel(page) {
      if (!isToday(page)) return null;
      return page.hasTime ? `(${page.dueStart.slice(11, 16)})` : null;
    }

    function byDate(a, b) {
      const da = dateOnly(a.dueStart || ''), db = dateOnly(b.dueStart || '');
      if (da !== db) return da.localeCompare(db);
      if (a.hasTime !== b.hasTime) return a.hasTime ? -1 : 1;
      return (a.dueStart || '').localeCompare(b.dueStart || '');
    }

    function render() {
      const content = document.getElementById('todo-content');
      const pageMap = {};
      allPages.forEach(p => { pageMap[p.id] = p; });

      const items = allPages
        .filter(p => p.parentIds.length === 0 || !p.parentIds.some(pid => pageMap[pid]))
        .sort(byDate);

      if (!items.length) {
        content.innerHTML = '<div class="empty-msg">이번 주 마감 항목이 없어요.</div>';
        return;
      }

      const frag = document.createDocumentFragment();
      items.forEach(page => appendRow(frag, page, pageMap));
      content.innerHTML = '';
      content.appendChild(frag);
    }

    function appendRow(frag, page, pageMap) {
      const today = isToday(page);
      const children = page.childIds.map(cid => pageMap[cid]).filter(Boolean);
      const pLabel = periodLabel(page);

      const row = document.createElement('div');
      row.className = 'todo-row' + (today ? ' today' : '');

      const pinBtn = document.createElement('button');
      pinBtn.className = 'pin-btn' + (today ? ' pinned' : '');
      pinBtn.textContent = '📌';
      pinBtn.title = '오늘로 고정';

      const labelDiv = document.createElement('div');
      labelDiv.className = 'todo-label';
      const inner = document.createElement('span');
      inner.className = 'todo-inner' + (page.done ? ' done-text' : '');
      inner.textContent = pLabel ? `${page.title} ${pLabel}` : page.title;
      const toggleBtn = document.createElement('button');
      toggleBtn.className = 'toggle-btn' + (children.length ? '' : ' empty');
      toggleBtn.textContent = children.length ? (openToggles.has(page.id) ? '▾' : '▸') : '▸';
      labelDiv.appendChild(inner);
      labelDiv.appendChild(toggleBtn);

      const doneBtn = document.createElement('div');
      doneBtn.className = 'done-btn' + (page.done ? ' checked' : '');
      doneBtn.textContent = page.done ? '✓' : '';

      row.appendChild(pinBtn);
      row.appendChild(labelDiv);
      row.appendChild(doneBtn);
      frag.appendChild(row);

      const subList = document.createElement('div');
      subList.className = 'subtask-list' + (openToggles.has(page.id) ? ' open' : '');
      children.forEach(child => {
        const cToday = isToday(child);
        const cLabel = periodLabel(child);
        const subRow = document.createElement('div');
        subRow.className = 'subtask-row' + (cToday ? ' today' : '');
        const subInner = document.createElement('span');
        subInner.className = 'subtask-inner' + (child.done ? ' done-text' : '');
        subInner.textContent = cLabel ? `${child.title} ${cLabel}` : child.title;
        const subDone = document.createElement('div');
        subDone.className = 'sub-done-btn' + (child.done ? ' checked' : '');
        subRow.appendChild(subInner);
        subRow.appendChild(subDone);
        subList.appendChild(subRow);
        subRow.addEventListener('click', e => { if (subDone.contains(e.target)) return; openEditModal(child); });
        subDone.addEventListener('click', () => toggleDone(child, subDone, subInner));
      });
      frag.appendChild(subList);

      labelDiv.addEventListener('click', e => { if (toggleBtn.contains(e.target)) return; openEditModal(page); });
      if (children.length) {
        toggleBtn.addEventListener('click', e => {
          e.stopPropagation();
          openToggles.has(page.id) ? openToggles.delete(page.id) : openToggles.add(page.id);
          render();
        });
      }
      pinBtn.addEventListener('click', () => pinToday(page, pinBtn));
      doneBtn.addEventListener('click', () => toggleDone(page, doneBtn, inner));
    }

    async function pinToday(page, btn) {
      btn.disabled = true;
      try {
        const r = await fetch('/api/get-todo', { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ pageId: page.id, dueDate: todayStr }) });
        const data = await r.json();
        if (!r.ok) throw new Error(data.error);
        page.dueStart = todayStr; page.hasTime = false;
        render();
      } catch (err) { alert('핀 저장 실패: ' + err.message); btn.disabled = false; }
    }

    async function toggleDone(page, btn, textEl) {
      const newDone = !page.done;
      btn.classList.toggle('checked', newDone);
      if (btn.className.includes('done-btn')) btn.textContent = newDone ? '✓' : '';
      textEl.classList.toggle('done-text', newDone);
      page.done = newDone;
      try {
        await fetch('/api/get-todo', { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ pageId: page.id, done: newDone }) });
      } catch { page.done = !newDone; btn.classList.toggle('checked', !newDone); textEl.classList.toggle('done-text', !newDone); }
    }

    function openEditModal(page) {
      editingPageId = page.id;
      document.getElementById('modal-heading').textContent = '항목 편집';
      document.getElementById('edit-title').value = page.title;
      const dueInput = document.getElementById('edit-due');
      dueInput.value = page.dueStart ? `${page.dueStart.slice(0, 10)}T${page.hasTime ? page.dueStart.slice(11, 16) : '00:00'}` : '';
      resetModal();
    }

    function openAddModal() {
      editingPageId = null;
      document.getElementById('modal-heading').textContent = '할일 추가';
      document.getElementById('edit-title').value = '';
      document.getElementById('edit-due').value = '';
      resetModal();
    }

    function resetModal() {
      document.getElementById('modal-status').textContent = '';
      document.getElementById('modal-status').className = 'modal-status';
      document.getElementById('modal-save').disabled = false;
      document.getElementById('modal-overlay').classList.add('open');
    }

    document.getElementById('add-btn').addEventListener('click', openAddModal);
    document.getElementById('modal-cancel').addEventListener('click', closeModal);
    document.getElementById('modal-overlay').addEventListener('click', e => { if (e.target === document.getElementById('modal-overlay')) closeModal(); });
    function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }

    document.getElementById('modal-save').addEventListener('click', async () => {
      const title = document.getElementById('edit-title').value.trim();
      const dueRaw = document.getElementById('edit-due').value;
      if (!title) { setModalStatus('제목을 입력해주세요.'); return; }
      const saveBtn = document.getElementById('modal-save');
      saveBtn.disabled = true; setModalStatus('저장 중...');

      let dueDate = null, hasTime = false;
      if (dueRaw) {
        const d = dueRaw.slice(0, 10), t = dueRaw.slice(11, 16);
        if (t && t !== '00:00') { dueDate = `${d}T${t}:00+09:00`; hasTime = true; }
        else dueDate = d;
      }

      try {
        if (editingPageId) {
          const r = await fetch('/api/get-todo', { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ pageId: editingPageId, title, dueDate }) });
          const data = await r.json();
          if (!r.ok) throw new Error(data.error);
          const page = allPages.find(p => p.id === editingPageId);
          if (page) {
            page.title = title; page.dueStart = dueDate; page.hasTime = hasTime;
            const d = dueDate ? dueDate.slice(0, 10) : null;
            if (!d || d < todayStr || d > endOfWeek) allPages = allPages.filter(p => p.id !== editingPageId);
          }
        } else {
          const r = await fetch('/api/get-todo', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ source_db_id: cfg.source_db_id, title, dueDate }) });
          const newPage = await r.json();
          if (!r.ok) throw new Error(newPage.error);
          const d = newPage.dueStart ? newPage.dueStart.slice(0, 10) : null;
          if (d && d >= todayStr && d <= endOfWeek) allPages.push(newPage);
        }
        setModalStatus('저장됨 ✓', 'ok');
        setTimeout(() => { closeModal(); render(); }, 600);
      } catch (err) { setModalStatus(err.message); saveBtn.disabled = false; }
    });

    function setModalStatus(msg, type) {
      const el = document.getElementById('modal-status');
      el.textContent = msg;
      el.className = 'modal-status' + (type ? ' ' + type : '');
    }
    function escHtml(str) { return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
  </script>
</body>
</html>
