<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>C:// TO-DO</title>
  <link rel="stylesheet" href="../../shared/tokens.css" />
  <style>
    @font-face {
      font-family: 'ChosunGu';
      src: url('../../shared/fonts/ChosunGu.TTF') format('truetype');
      font-display: swap;
    }

    body {
      display: flex;
      justify-content: center;
      font-family: 'ChosunGu', 'Helvetica Neue', sans-serif;
    }

    .window { max-width: 320px; }

    .content {
      padding: 10px 12px 14px;
      min-height: 120px;
      max-height: 480px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }
    .content::-webkit-scrollbar { width: 3px; }
    .content::-webkit-scrollbar-thumb { background: #ddd; }

    .group-label {
      font-size: 9.5px;
      font-weight: 700;
      letter-spacing: 0.6px;
      color: #999;
      padding: 8px 0 3px;
      border-bottom: 1px solid #eee;
      margin-bottom: 2px;
    }
    .group-label:first-child { padding-top: 2px; }

    /* ─ parent row ─ */
    .todo-row {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 3px 0;
    }

    /* label area: text + period + toggle all inline */
    .todo-label {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 3px;
      min-width: 0;
      cursor: pointer;
    }
    .todo-label:hover .todo-text { text-decoration: underline; }

    .todo-inner {
      /* wraps text+period as one inline block for highlight */
      display: inline;
      font-size: 11.5px;
      line-height: 1.55;
      color: var(--ink);
      word-break: break-all;
    }
    .todo-period {
      font-size: 10.5px;
      color: #aaa;
      white-space: nowrap;
    }

    /* toggle button sits right after label text */
    .toggle-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 13.5px;   /* 9px × 1.5 */
      color: #bbb;
      padding: 0;
      flex-shrink: 0;
      line-height: 1;
    }
    .toggle-btn:hover { color: var(--ink); }
    .toggle-btn.empty { cursor: default; visibility: hidden; }

    /* highlight: full solid bg like Notion */
    .todo-row.today .todo-inner {
      background: rgba(180, 155, 215, 0.28);
      border-radius: 2px;
      padding: 0 2px;
    }
    .todo-row.today .todo-period { color: #c0392b; font-weight: 700; }

    .pin-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 12px;
      padding: 0 2px;
      line-height: 1;
      opacity: 0.3;
      flex-shrink: 0;
      filter: grayscale(1);
      transition: opacity 0.15s;
    }
    .pin-btn:hover { opacity: 0.65; }
    .pin-btn.pinned { opacity: 1; filter: none; }

    /* ─ subtask ─ */
    .subtask-list {
      display: none;
      padding-left: 14px;
      margin-bottom: 2px;
    }
    .subtask-list.open { display: block; }

    .subtask-row {
      display: flex;
      align-items: center;
      gap: 3px;
      padding: 2px 0;
      cursor: pointer;
    }
    .subtask-row:hover .subtask-inner { text-decoration: underline; }

    .subtask-inner {
      font-size: 11px;
      color: #555;
      word-break: break-all;
    }
    .subtask-period {
      font-size: 9.5px;
      color: #bbb;
      white-space: nowrap;
    }
    .subtask-row.today .subtask-inner {
      background: rgba(180, 155, 215, 0.28);
      border-radius: 2px;
      padding: 0 2px;
    }
    .subtask-row.today .subtask-period { color: #c0392b; font-weight: 700; }

    .empty-msg {
      font-size: 11px;
      color: #ccc;
      text-align: center;
      padding: 20px 0;
    }

    /* ─ modal ─ */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.35);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }

    .modal {
      background: #fff;
      border: 1px solid var(--border);
      padding: 16px;
      width: 280px;
      font-family: 'ChosunGu', 'Helvetica Neue', sans-serif;
    }
    .modal-title {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.4px;
      color: #444;
      margin-bottom: 12px;
    }
    .modal label {
      display: block;
      font-size: 10px;
      color: #888;
      margin-bottom: 3px;
      margin-top: 10px;
    }
    .modal label:first-of-type { margin-top: 0; }
    .modal input[type="text"],
    .modal input[type="datetime-local"] {
      width: 100%;
      border: 1px solid #ddd;
      padding: 5px 7px;
      font-family: 'ChosunGu', 'Helvetica Neue', sans-serif;
      font-size: 11.5px;
      color: var(--ink);
      outline: none;
    }
    .modal input:focus { border-color: var(--accent); }
    .modal-actions {
      display: flex;
      gap: 6px;
      justify-content: flex-end;
      margin-top: 14px;
    }
    .modal-actions button {
      border: 1px solid var(--accent);
      background: var(--accent);
      color: #fff;
      font-family: 'ChosunGu', 'Helvetica Neue', sans-serif;
      font-size: 10.5px;
      padding: 4px 12px;
      cursor: pointer;
    }
    .modal-actions button:hover { filter: brightness(1.1); }
    .modal-actions button:active { filter: brightness(0.9); }
    .modal-actions button:disabled { opacity: 0.45; cursor: default; filter: none; }
    .modal-actions .cancel-btn { background: #fff; color: #666; border-color: #ccc; }
    .modal-actions .cancel-btn:hover { filter: none; background: #f5f5f5; }
    .modal-status { font-size: 10px; min-height: 14px; color: #c0392b; margin-top: 6px; }
    .modal-status.ok { color: var(--accent); }
  </style>
</head>
<body>
  <div class="window">
    <div class="titlebar">
      <span data-widget-title>C:// TO-DO</span>
      <span style="opacity:0.75;cursor:default">⚙</span>
    </div>
    <div class="content" id="todo-content">
      <div class="empty-msg">불러오는 중...</div>
    </div>
  </div>

  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <div class="modal-title">항목 편집</div>
      <label>제목</label>
      <input type="text" id="edit-title" />
      <label>마감일</label>
      <input type="datetime-local" id="edit-due" />
      <div class="modal-status" id="modal-status"></div>
      <div class="modal-actions">
        <button class="cancel-btn" id="modal-cancel">취소</button>
        <button id="modal-save">저장</button>
      </div>
    </div>
  </div>

  <script src="../../shared/config-loader.js"></script>
  <script>
    let cfg = {};
    let allPages = [];
    let todayStr = '';
    let endOfWeek = '';
    let editingPageId = null;
    let openToggles = new Set();

    (async () => {
      cfg = await loadWidgetConfig();
      await loadTodos();
    })();

    async function loadTodos() {
      try {
        const params = new URLSearchParams({ source_db_id: cfg.source_db_id });
        const r = await fetch('/api/get-todo?' + params);
        const data = await r.json();
        if (!r.ok) throw new Error(data.error);
        allPages = data.pages;
        todayStr = data.today;
        endOfWeek = data.endOfWeek;
        render();
      } catch (err) {
        document.getElementById('todo-content').innerHTML =
          `<div class="empty-msg">${escHtml(err.message)}</div>`;
      }
    }

    function dateOnly(str) { return str ? str.slice(0, 10) : ''; }

    function getPeriod(page) {
      if (!page.dueStart) return null;
      const d = dateOnly(page.dueStart);
      if (d === todayStr) return 'today';
      if (d <= endOfWeek) return 'week';
      return null;
    }

    // Returns period label string for today items only; null otherwise
    function periodLabel(page) {
      if (dateOnly(page.dueStart) !== todayStr) return null;
      if (page.hasTime) return `(${page.dueStart.slice(11, 16)})`;
      return '(오늘)';
    }

    function render() {
      const content = document.getElementById('todo-content');
      const pageMap = {};
      allPages.forEach(p => { pageMap[p.id] = p; });

      const topLevel = allPages.filter(p =>
        p.parentIds.length === 0 || !p.parentIds.some(pid => pageMap[pid])
      );

      const todayItems = topLevel.filter(p => getPeriod(p) === 'today').sort(byDate);
      const weekItems  = topLevel.filter(p => getPeriod(p) === 'week').sort(byDate);

      if (!todayItems.length && !weekItems.length) {
        content.innerHTML = '<div class="empty-msg">이번 주 마감 항목이 없어요.</div>';
        return;
      }

      const frag = document.createDocumentFragment();

      [{ label: '오늘', items: todayItems }, { label: '이번 주', items: weekItems }].forEach(group => {
        if (!group.items.length) return;

        const lbl = document.createElement('div');
        lbl.className = 'group-label';
        lbl.textContent = group.label;
        frag.appendChild(lbl);

        group.items.forEach(page => {
          const isToday = getPeriod(page) === 'today';
          const children = page.childIds.map(cid => pageMap[cid]).filter(Boolean);
          const pLabel = periodLabel(page);

          // ─ parent row
          const row = document.createElement('div');
          row.className = 'todo-row' + (isToday ? ' today' : '');

          // clickable label area (text + period + toggle)
          const labelDiv = document.createElement('div');
          labelDiv.className = 'todo-label';

          const inner = document.createElement('span');
          inner.className = 'todo-inner';
          inner.textContent = pLabel ? `${page.title} ${pLabel}` : page.title;

          const toggleBtn = document.createElement('button');
          toggleBtn.className = 'toggle-btn' + (children.length ? '' : ' empty');
          toggleBtn.textContent = children.length
            ? (openToggles.has(page.id) ? '▾' : '▸')
            : '▸';

          labelDiv.appendChild(inner);
          labelDiv.appendChild(toggleBtn);

          const pinBtn = document.createElement('button');
          pinBtn.className = 'pin-btn' + (isToday ? ' pinned' : '');
          pinBtn.textContent = '📌';
          pinBtn.title = '오늘로 고정';

          row.appendChild(labelDiv);
          row.appendChild(pinBtn);
          frag.appendChild(row);

          // ─ subtask list
          const subList = document.createElement('div');
          subList.className = 'subtask-list' + (openToggles.has(page.id) ? ' open' : '');

          children.forEach(child => {
            const childToday = getPeriod(child) === 'today';
            const cLabel = periodLabel(child);

            const subRow = document.createElement('div');
            subRow.className = 'subtask-row' + (childToday ? ' today' : '');

            const subInner = document.createElement('span');
            subInner.className = 'subtask-inner';
            subInner.textContent = cLabel ? `${child.title} ${cLabel}` : child.title;

            subRow.appendChild(subInner);
            subList.appendChild(subRow);

            subRow.addEventListener('click', () => openEditModal(child));
          });

          frag.appendChild(subList);

          // events
          labelDiv.addEventListener('click', (e) => {
            if (e.target === toggleBtn || toggleBtn.contains(e.target)) return;
            openEditModal(page);
          });

          if (children.length) {
            toggleBtn.addEventListener('click', (e) => {
              e.stopPropagation();
              openToggles.has(page.id) ? openToggles.delete(page.id) : openToggles.add(page.id);
              render();
            });
          }

          pinBtn.addEventListener('click', async () => {
            pinBtn.disabled = true;
            try {
              const r = await fetch('/api/get-todo', {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ pageId: page.id, dueDate: todayStr }),
              });
              const data = await r.json();
              if (!r.ok) throw new Error(data.error);
              page.dueStart = todayStr;
              page.hasTime = false;
              render();
            } catch (err) {
              alert('핀 저장 실패: ' + err.message);
              pinBtn.disabled = false;
            }
          });
        });
      });

      content.innerHTML = '';
      content.appendChild(frag);
    }

    function byDate(a, b) {
      return (a.dueStart || '').localeCompare(b.dueStart || '');
    }

    function openEditModal(page) {
      editingPageId = page.id;
      document.getElementById('edit-title').value = page.title;
      const dueInput = document.getElementById('edit-due');
      if (page.dueStart) {
        const timePart = page.hasTime ? page.dueStart.slice(11, 16) : '00:00';
        dueInput.value = `${page.dueStart.slice(0, 10)}T${timePart}`;
      } else {
        dueInput.value = '';
      }
      document.getElementById('modal-status').textContent = '';
      document.getElementById('modal-status').className = 'modal-status';
      document.getElementById('modal-save').disabled = false;
      document.getElementById('modal-overlay').classList.add('open');
    }

    document.getElementById('modal-cancel').addEventListener('click', closeModal);
    document.getElementById('modal-overlay').addEventListener('click', e => {
      if (e.target === document.getElementById('modal-overlay')) closeModal();
    });

    function closeModal() {
      document.getElementById('modal-overlay').classList.remove('open');
      editingPageId = null;
    }

    document.getElementById('modal-save').addEventListener('click', async () => {
      if (!editingPageId) return;
      const title = document.getElementById('edit-title').value.trim();
      const dueRaw = document.getElementById('edit-due').value;
      if (!title) { setModalStatus('제목을 입력해주세요.'); return; }

      const saveBtn = document.getElementById('modal-save');
      saveBtn.disabled = true;
      setModalStatus('저장 중...');

      let dueDate = null, hasTime = false;
      if (dueRaw) {
        const d = dueRaw.slice(0, 10), t = dueRaw.slice(11, 16);
        if (t && t !== '00:00') { dueDate = `${d}T${t}:00+09:00`; hasTime = true; }
        else dueDate = d;
      }

      try {
        const r = await fetch('/api/get-todo', {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ pageId: editingPageId, title, dueDate }),
        });
        const data = await r.json();
        if (!r.ok) throw new Error(data.error);

        const page = allPages.find(p => p.id === editingPageId);
        if (page) {
          page.title = title; page.dueStart = dueDate; page.hasTime = hasTime;
          const d = dueDate ? dueDate.slice(0, 10) : null;
          if (!d || d < todayStr || d > endOfWeek)
            allPages = allPages.filter(p => p.id !== editingPageId);
        }

        setModalStatus('저장됨 ✓', 'ok');
        setTimeout(() => { closeModal(); render(); }, 600);
      } catch (err) {
        setModalStatus(err.message);
        saveBtn.disabled = false;
      }
    });

    function setModalStatus(msg, type) {
      const el = document.getElementById('modal-status');
      el.textContent = msg;
      el.className = 'modal-status' + (type ? ' ' + type : '');
    }

    function escHtml(str) {
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }
  </script>
</body>
</html>
