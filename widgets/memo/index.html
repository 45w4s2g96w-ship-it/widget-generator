<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>C:// MEMO</title>
  <link rel="stylesheet" href="../../shared/tokens.css" />
  <style>
    @font-face {
      font-family: 'ChosunGu';
      src: url('../../shared/fonts/ChosunGu.TTF') format('truetype');
      font-display: swap;
    }

    html, body { height: 100%; margin: 0; }

    body {
      display: flex;
      justify-content: center;
      font-family: 'ChosunGu', 'Helvetica Neue', sans-serif;
    }

    .window {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      height: 100%;
      min-height: 0;
    }

    .tabs {
      flex-shrink: 0;
      display: flex;
      overflow-x: auto;
      border-bottom: 1px solid #e0e0e0;
      background: #fafafa;
      scrollbar-width: none;
    }
    .tabs::-webkit-scrollbar { display: none; }
    .tab {
      flex-shrink: 0;
      padding: 4px 9px;
      font-size: 10px;
      color: #999;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      font-family: 'ChosunGu', sans-serif;
      -webkit-user-select: none;
      user-select: none;
    }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 700; }
    .tab:hover:not(.active) { color: var(--ink); }

    .content {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: row;
      overflow: hidden;
    }

    .folder-panel {
      width: 52px;
      flex-shrink: 0;
      border-right: 1px solid #ebebeb;
      background: transparent;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 8px 0;
      gap: 4px;
      overflow: hidden;
    }

    .folder-target {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 4px 3px;
      gap: 3px;
      width: 46px;
      border-radius: 4px;
      border: 1px solid transparent;
      transition: background 0.12s, border-color 0.12s;
      cursor: default;
      flex-shrink: 0;
    }
    .folder-target.drag-over { background: rgba(155,143,199,0.15); border-color: var(--accent); }
    .folder-target.drag-over .folder-label { color: var(--accent); }
    .folder-target.drag-over .folder-shape,
    .folder-target.drag-over .folder-shape::before { background: var(--accent); opacity: 0.7; }

    .folder-shape {
      width: 26px; height: 20px;
      background: #ccc;
      border-radius: 0 3px 3px 3px;
      position: relative;
      flex-shrink: 0;
    }
    .folder-shape::before {
      content: '';
      position: absolute;
      top: -5px; left: 0;
      width: 11px; height: 6px;
      background: #ccc;
      border-radius: 2px 4px 0 0;
    }

    .folder-label {
      font-size: 7px; color: #aaa;
      font-family: 'ChosunGu', sans-serif;
      letter-spacing: 0.3px;
      text-align: center; line-height: 1.2;
    }

    .chat-area {
      flex: 1; min-width: 0;
      overflow-y: auto;
      padding: 10px 8px 6px 8px;
      display: flex; flex-direction: column; gap: 8px;
    }
    .chat-area::-webkit-scrollbar { width: 3px; }
    .chat-area::-webkit-scrollbar-thumb { background: #ddd; }

    .chat-empty { font-size: 11px; color: #ccc; text-align: center; padding: 24px 0; }
    .loading-indicator { font-size: 10.5px; color: #ccc; text-align: center; padding: 8px 0; }

    .bubble-row {
      display: flex; justify-content: flex-end; align-items: flex-end;
      gap: 5px; flex-shrink: 0;
    }

    .bubble-cb {
      flex-shrink: 0; width: 13px; height: 13px;
      border: 1px solid #ccc; cursor: pointer;
      background: #fff; display: none; align-self: center;
    }
    .bubble-cb.checked { background: var(--accent); border-color: var(--accent); }
    .delete-mode .bubble-cb { display: block; }

    .bubble {
      max-width: 96%;
      background: rgba(155,143,199,0.13);
      border: 1px solid rgba(155,143,199,0.3);
      border-radius: 12px 12px 2px 12px;
      padding: 6px 9px;
      position: relative;
      cursor: pointer;
      -webkit-user-select: none;
      user-select: none;
    }
    .bubble:hover { background: rgba(155,143,199,0.2); }

    .bubble-header {
      display: flex; justify-content: flex-end; align-items: center;
      gap: 4px; margin-bottom: 3px;
    }
    .bubble-cat {
      font-size: 8.5px; color: var(--accent);
      border: 1px solid var(--accent);
      padding: 0 3px; line-height: 1.4;
    }
    .bubble-star {
      font-size: 9px; color: #f0c040; opacity: 0.22;
      cursor: pointer; line-height: 1;
      -webkit-user-select: none; user-select: none;
    }
    .bubble-star.on { opacity: 1; }
    .bubble-time { font-size: 9px; color: #c0c0c0; -webkit-user-select: none; user-select: none; }

    .bubble-drag-area {
      -webkit-user-select: none;
      user-select: none;
      cursor: grab;
    }

    .bubble-text {
      font-size: 11.5px; color: var(--ink);
      line-height: 1.5; word-break: break-all; white-space: pre-wrap;
    }
    .bubble-list-ul { margin: 0; padding-left: 13px; font-size: 11.5px; line-height: 1.5; color: var(--ink); }
    .bubble-checklist { display: flex; flex-direction: column; gap: 2px; }
    .bubble-checklist-item { display: flex; gap: 5px; align-items: flex-start; font-size: 11.5px; line-height: 1.5; }
    .bubble-checklist-item input { margin-top: 3px; flex-shrink: 0; }

    .delete-bar {
      flex-shrink: 0; display: none;
      padding: 5px 8px; border-top: 1px solid #e0e0e0;
      background: #fafafa; gap: 5px; align-items: center; font-size: 10px;
    }
    .delete-bar.visible { display: flex; }
    .delete-bar span { flex: 1; color: #888; }
    .del-btn {
      border: 1px solid #ddd; background: #fff; font-family: 'ChosunGu', sans-serif;
      font-size: 9.5px; padding: 8px 7px; cursor: pointer; color: #888;
      -webkit-tap-highlight-color: transparent;
    }
    .del-btn.danger { border-color: #e74c3c; color: #e74c3c; }
    .del-btn.done-btn { border-color: var(--accent); color: var(--accent); }

    .input-area {
      flex-shrink: 0; border-top: 1px solid #e0e0e0;
      padding: 7px 8px; display: flex; gap: 5px; align-items: flex-end;
    }
    #memo-input {
      flex: 1; border: 1px solid var(--border); background: #fff;
      font-family: 'ChosunGu', 'Helvetica Neue', sans-serif;
      font-size: 11.5px; line-height: 1.5; padding: 5px 7px;
      resize: none; outline: none; color: var(--ink);
      min-height: 36px; max-height: 90px;
    }
    #memo-input::placeholder { color: #ccc; }
    #memo-input:focus { border-color: var(--accent); }
    #send-btn {
      flex-shrink: 0; border: 1px solid var(--accent); background: var(--accent);
      color: #fff; font-family: 'ChosunGu', sans-serif; font-size: 10.5px;
      padding: 5px 8px; cursor: pointer; align-self: flex-end;
      -webkit-tap-highlight-color: transparent;
    }
    #send-btn:hover { filter: brightness(1.1); }
    #send-btn:active { filter: brightness(0.9); }
    #send-btn:disabled { opacity: 0.45; cursor: default; filter: none; }

    .titlebar { flex-shrink: 0; }
    .titlebar-right { position: relative; display: flex; align-items: center; gap: 6px; }
    .trash-btn {
      font-size: 12px; opacity: 0.55; cursor: pointer; background: none; border: none;
      padding: 4px; color: var(--win-text); line-height: 1;
      -webkit-tap-highlight-color: transparent;
    }
    .trash-btn:hover { opacity: 0.9; }

    .trash-menu {
      display: none; position: absolute; top: 100%; right: 20px; margin-top: 6px;
      background: #fff; border: 1px solid #ddd;
      box-shadow: 0 4px 14px rgba(0,0,0,0.14);
      z-index: 600; min-width: 160px; font-family: 'ChosunGu', sans-serif;
    }
    .trash-menu.visible { display: block; }
    .trash-menu-item {
      padding: 12px 13px; font-size: 11px; color: var(--ink); cursor: pointer;
      border-bottom: 1px solid #f0f0f0; white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
    }
    .trash-menu-item:last-child { border-bottom: none; }
    .trash-menu-item:hover { background: #f7f5ff; color: var(--accent); }
    .trash-menu-item.danger:hover { background: #fff5f5; color: #e74c3c; }

    .popup-backdrop {
      display: none; position: fixed; inset: 0; z-index: 490;
      background: rgba(0,0,0,0.001); -webkit-tap-highlight-color: transparent;
    }
    .popup-backdrop.visible { display: block; }

    .drop-popup {
      display: none; position: fixed; z-index: 500;
      background: #fff; border: 1px solid var(--border);
      padding: 10px 13px 12px; width: 210px;
      font-family: 'ChosunGu', sans-serif;
      box-shadow: 0 4px 18px rgba(0,0,0,0.18);
    }
    .drop-popup.visible { display: block; }
    .drop-popup-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 6px;
    }
    .drop-popup-header label { font-size: 9.5px; color: #888; margin: 0; }
    .drop-popup-close {
      background: none; border: none; padding: 6px 8px;
      font-size: 15px; line-height: 1; color: #bbb; cursor: pointer;
      display: flex; align-items: center; -webkit-tap-highlight-color: transparent;
    }
    .drop-popup-close:hover { color: #888; }
    .drop-popup select,
    .drop-popup input[type=date],
    .drop-popup input[type=text],
    .drop-popup input[type=url],
    .drop-popup textarea {
      width: 100%; border: 1px solid #ddd; font-family: 'ChosunGu', sans-serif;
      font-size: 11px; padding: 4px 6px; margin-bottom: 8px; color: var(--ink);
      background: #fff; box-sizing: border-box; -webkit-appearance: none; border-radius: 0;
      height: 28px;
    }
    .drop-popup textarea {
      height: auto; resize: none;
    }
    .drop-popup select:focus, .drop-popup input:focus, .drop-popup textarea:focus { outline: none; border-color: var(--accent); }
    #drop-folder { font-weight: 700; color: var(--accent); border-color: var(--accent); margin-bottom: 10px; }
    .drop-popup label.field-label { font-size: 9.5px; color: #888; display: block; margin-bottom: 2px; }
    .drop-divider { border: none; border-top: 1px solid #eee; margin: 0 0 9px; }
    .drop-btns { display: flex; gap: 5px; margin-top: 4px; }
    .drop-btns button {
      flex: 1; font-family: 'ChosunGu', sans-serif; font-size: 11px;
      padding: 11px 4px; cursor: pointer; border-radius: 0;
      -webkit-tap-highlight-color: transparent;
    }
    #drop-ok { border: 1px solid var(--accent); background: var(--accent); color: #fff; }
    #drop-cancel { border: 1px solid #ddd; background: #fff; color: #888; }
    #drop-ok:active { filter: brightness(0.9); }
    #drop-cancel:active { background: #f5f5f5; }
    #drop-ok:disabled { opacity: 0.45; cursor: default; }

    #toast {
      display: none; position: fixed; bottom: 70px; left: 50%;
      transform: translateX(-50%); z-index: 800;
      padding: 8px 16px; font-size: 11px; font-family: 'ChosunGu', sans-serif;
      border-radius: 3px; color: #fff; white-space: nowrap;
      pointer-events: none;
    }
    #toast.ok  { background: #27ae60; }
    #toast.err { background: #e74c3c; }
    #toast.pending { background: #888; }
    #toast.show { display: block; }
  </style>
</head>
<body>
  <div class="window">
    <div class="titlebar">
      <span data-widget-title>C:// MEMO</span>
      <div class="titlebar-right">
        <button class="trash-btn" id="trash-btn" title="삭제">🗑</button>
        <div class="trash-menu" id="trash-menu">
          <div class="trash-menu-item danger" id="del-categorized">분류 완료된 항목 지우기</div>
          <div class="trash-menu-item danger" id="del-uncategorized">미분류 항목 지우기</div>
          <div class="trash-menu-item" id="del-select">선택 항목 지우기</div>
        </div>
        <span style="opacity:0.75;cursor:default">⚙</span>
      </div>
    </div>

    <div class="tabs" id="tabs">
      <div class="tab active" data-folder="ALL">ALL</div>
      <div class="tab" data-folder="DIARY">DIARY</div>
      <div class="tab" data-folder="TO-DO">TO-DO</div>
      <div class="tab" data-folder="IDEA">IDEA</div>
      <div class="tab" data-folder="CART">CART</div>
      <div class="tab" data-folder="BOOKMARK">BOOKMARK</div>
      <div class="tab" data-folder="ETC">ETC</div>
      <div class="tab" data-folder="★">★</div>
    </div>

    <div class="content">
      <div class="folder-panel" id="folder-panel">
        <div class="folder-target" data-target="DIARY"><div class="folder-shape"></div><span class="folder-label">DIARY</span></div>
        <div class="folder-target" data-target="TO-DO"><div class="folder-shape"></div><span class="folder-label">TO-DO</span></div>
        <div class="folder-target" data-target="IDEA"><div class="folder-shape"></div><span class="folder-label">IDEA</span></div>
        <div class="folder-target" data-target="CART"><div class="folder-shape"></div><span class="folder-label">CART</span></div>
        <div class="folder-target" data-target="BOOKMARK"><div class="folder-shape"></div><span class="folder-label">BOOK
MARK</span></div>
        <div class="folder-target" data-target="ETC"><div class="folder-shape"></div><span class="folder-label">ETC</span></div>
      </div>
      <div class="chat-area" id="chat-area">
        <div class="loading-indicator">불러오는 중...</div>
      </div>
    </div>

    <div class="delete-bar" id="delete-bar">
      <span id="sel-count">0개 선택됨</span>
      <button class="del-btn danger" id="del-selected-btn">선택 삭제</button>
      <button class="del-btn done-btn" id="del-done-btn">완료</button>
    </div>

    <div class="input-area" id="input-area">
      <textarea id="memo-input" placeholder="생각을 던져보세요... (Enter=전송)" rows="2"></textarea>
      <button id="send-btn">SEND</button>
    </div>
  </div>

  <div id="toast"></div>
  <div class="popup-backdrop" id="popup-backdrop"></div>

  <div class="drop-popup" id="drop-popup">
    <div class="drop-popup-header">
      <label>폴더 선택</label>
      <button class="drop-popup-close" id="drop-close">×</button>
    </div>
    <select id="drop-folder">
      <option value="DIARY">DIARY</option>
      <option value="TO-DO">TO-DO</option>
      <option value="IDEA">IDEA</option>
      <option value="CART">CART</option>
      <option value="BOOKMARK">BOOKMARK</option>
      <option value="ETC">ETC</option>
    </select>
    <hr class="drop-divider" id="drop-divider" style="display:none" />
    <div id="drop-form-idea" style="display:none">
      <label class="field-label">영역</label>
      <select id="drop-idea-area">
        <option value="anything">anything</option>
        <option value="life">life</option>
        <option value="work">work</option>
      </select>
    </div>
    <div id="drop-form-todo" style="display:none">
      <label class="field-label">메모 (선택)</label>
      <textarea id="drop-todo-memo" rows="2" placeholder="추가 메모..."></textarea>
      <label class="field-label">마감일 (선택)</label>
      <input type="date" id="drop-todo-due" />
    </div>
    <div id="drop-form-cart" style="display:none">
      <label class="field-label">종류</label>
      <select id="drop-cart-type">
        <option value="Need &amp; Buy">Need &amp; Buy</option>
        <option value="Need &amp; Want">Need &amp; Want</option>
        <option value="Need Later">Need Later</option>
        <option value="Just Want">Just Want</option>
      </select>
    </div>
    <div id="drop-form-bookmark" style="display:none">
      <label class="field-label">제목 <span style="color:#e74c3c">*</span></label>
      <input type="text" id="drop-bookmark-title" placeholder="제목 입력" />
      <label class="field-label">링크 (선택)</label>
      <input type="url" id="drop-bookmark-link" placeholder="https://..." />
    </div>
    <div class="drop-btns">
      <button id="drop-cancel">취소</button>
      <button id="drop-ok">확인</button>
    </div>
  </div>

  <script src="../../shared/config-loader.js"></script>
  <script>
    let cfg = {};
    let memos = [];
    let activeFolder = 'ALL';
    let deleteMode = false;
    let selectedIds = new Set();
    let pendingDrop = null;

    const drag = { memo: null, active: false, startX: 0, startY: 0 };
    const DRAG_THRESHOLD = 8;

    /* ── 토스트 ── */
    let _toastTimer;
    function showToast(msg, type = 'ok') {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.className = 'show ' + type;
      clearTimeout(_toastTimer);
      const dur = type === 'err' ? 6000 : type === 'pending' ? 60000 : 3500;
      _toastTimer = setTimeout(() => { el.className = ''; }, dur);
    }
    function hideToast() {
      clearTimeout(_toastTimer);
      document.getElementById('toast').className = '';
    }

    function addTap(el, fn, opts = {}) {
      el.addEventListener('touchstart', e => {
        e.preventDefault();
        if (opts.stopProp) e.stopPropagation();
        fn();
      }, { passive: false });
      el.addEventListener('click', e => {
        if (opts.stopProp) e.stopPropagation();
        fn();
      });
    }

    (async () => {
      cfg = await loadWidgetConfig();
      await loadMemos();
    })();

    function pad(n) { return String(n).padStart(2, '0'); }

    /* ── 탭 ── */
    function activateTab(folder) {
      document.querySelectorAll('.tab').forEach(t =>
        t.classList.toggle('active', t.dataset.folder === folder));
      activeFolder = folder; renderMemos();
    }
    document.getElementById('tabs').addEventListener('click', e => {
      const tab = e.target.closest('.tab'); if (tab) activateTab(tab.dataset.folder);
    });
    document.getElementById('tabs').addEventListener('touchstart', e => {
      const tab = e.target.closest('.tab'); if (!tab) return;
      e.preventDefault(); activateTab(tab.dataset.folder);
    }, { passive: false });

    /* ── 쓰레기통 메뉴 ── */
    const trashMenu = document.getElementById('trash-menu');

    addTap(document.getElementById('trash-btn'), () => {
      trashMenu.classList.toggle('visible');
    }, { stopProp: true });

    document.addEventListener('click', () => trashMenu.classList.remove('visible'));
    document.addEventListener('touchstart', () => trashMenu.classList.remove('visible'), { passive: true });

    addTap(document.getElementById('del-categorized'), async () => {
      trashMenu.classList.remove('visible');
      const ids = memos.filter(m => m.category).map(m => m.id);
      if (!ids.length) { showToast('분류된 항목이 없어요.', 'err'); return; }
      await deleteMemos(ids);
    }, { stopProp: true });

    addTap(document.getElementById('del-uncategorized'), async () => {
      trashMenu.classList.remove('visible');
      const ids = memos.filter(m => !m.category).map(m => m.id);
      if (!ids.length) { showToast('미분류 항목이 없어요.', 'err'); return; }
      await deleteMemos(ids);
    }, { stopProp: true });

    addTap(document.getElementById('del-select'), () => {
      trashMenu.classList.remove('visible');
      enterDeleteMode();
    }, { stopProp: true });

    function enterDeleteMode() {
      deleteMode = true;
      document.getElementById('delete-bar').classList.add('visible');
      document.getElementById('input-area').style.display = 'none';
      selectedIds.clear(); updateSelCount(); renderMemos();
    }

    function exitDeleteMode() {
      deleteMode = false;
      document.getElementById('delete-bar').classList.remove('visible');
      document.getElementById('input-area').style.display = '';
      selectedIds.clear(); updateSelCount(); renderMemos();
    }

    addTap(document.getElementById('del-selected-btn'), async () => {
      if (!selectedIds.size) return;
      await deleteMemos([...selectedIds]);
    });
    addTap(document.getElementById('del-done-btn'), exitDeleteMode);

    async function deleteMemos(ids) {
      try {
        const r = await fetch('/api/memo', {
          method: 'DELETE',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ pageIds: ids }),
        });
        const d = await r.json();
        if (!r.ok) throw new Error(d.error);
        memos = memos.filter(m => !ids.includes(m.id));
        if (deleteMode) exitDeleteMode(); else renderMemos();
        showToast('삭제됨', 'ok');
      } catch (err) { showToast(err.message, 'err'); }
    }

    function updateSelCount() {
      document.getElementById('sel-count').textContent = `${selectedIds.size}개 선택됨`;
    }

    /* ── 입력 ── */
    addTap(document.getElementById('send-btn'), sendMemo);
    document.getElementById('memo-input').addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMemo(); }
    });

    async function sendMemo() {
      const text = document.getElementById('memo-input').value.trim();
      if (!text) return;
      const btn = document.getElementById('send-btn');
      btn.disabled = true;
      try {
        const r = await fetch('/api/memo', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ source_db_id: cfg.source_db_id, text }),
        });
        const d = await r.json();
        if (!r.ok) throw new Error(d.error);
        document.getElementById('memo-input').value = '';
        memos = [...d.created, ...memos];
        renderMemos(); scrollBottom();
      } catch (err) { showToast(err.message, 'err'); }
      finally { btn.disabled = false; }
    }

    function scrollBottom() {
      const a = document.getElementById('chat-area');
      setTimeout(() => { a.scrollTop = a.scrollHeight; }, 30);
    }

    async function loadMemos() {
      try {
        const params = new URLSearchParams({ source_db_id: cfg.source_db_id });
        const r = await fetch('/api/memo?' + params);
        const d = await r.json();
        if (!r.ok) throw new Error(d.error);
        memos = d.memos;
        renderMemos(); scrollBottom();
      } catch (err) {
        document.getElementById('chat-area').innerHTML =
          `<div class="chat-empty">${escHtml(err.message)}</div>`;
      }
    }

    function filteredMemos() {
      if (activeFolder === 'ALL') return memos;
      if (activeFolder === '★') return memos.filter(m => m.important);
      return memos.filter(m => m.category === activeFolder);
    }

    function renderMemos() {
      const area = document.getElementById('chat-area');
      area.className = 'chat-area' + (deleteMode ? ' delete-mode' : '');
      const list = filteredMemos().slice().reverse();
      if (!list.length) { area.innerHTML = '<div class="chat-empty">메모가 없어요.</div>'; return; }
      area.innerHTML = '';
      list.forEach(m => area.appendChild(buildBubble(m)));
    }

    function formatTime(iso) {
      if (!iso) return '';
      const d = new Date(iso);
      return `${pad(d.getHours())}:${pad(d.getMinutes())}`;
    }

    function makeTextNode(text) {
      const lines = text.split('\n').map(l => l.trim()).filter(Boolean);
      const allBullets = lines.length && lines.every(l => l.startsWith('- '));
      const allChecks  = lines.length && lines.every(l => l.startsWith('[] ') || l.startsWith('[x] '));
      if (allBullets) {
        const ul = document.createElement('ul'); ul.className = 'bubble-list-ul';
        lines.forEach(l => { const li = document.createElement('li'); li.textContent = l.slice(2); ul.appendChild(li); });
        return ul;
      }
      if (allChecks) {
        const wrap = document.createElement('div'); wrap.className = 'bubble-checklist';
        lines.forEach(l => {
          const row = document.createElement('div'); row.className = 'bubble-checklist-item';
          const cb = document.createElement('input'); cb.type = 'checkbox'; cb.checked = l.startsWith('[x] '); cb.disabled = true;
          const sp = document.createElement('span'); sp.textContent = l.replace(/^\[.\] /, '');
          row.appendChild(cb); row.appendChild(sp); wrap.appendChild(row);
        });
        return wrap;
      }
      const div = document.createElement('div'); div.className = 'bubble-text'; div.textContent = text;
      return div;
    }

    function buildBubble(m) {
      const row = document.createElement('div');
      row.className = 'bubble-row'; row.dataset.id = m.id;

      const cb = document.createElement('div');
      cb.className = 'bubble-cb' + (selectedIds.has(m.id) ? ' checked' : '');
      function toggleCb() {
        if (selectedIds.has(m.id)) selectedIds.delete(m.id); else selectedIds.add(m.id);
        cb.classList.toggle('checked', selectedIds.has(m.id)); updateSelCount();
      }
      cb.addEventListener('click', toggleCb);
      cb.addEventListener('touchstart', e => { e.preventDefault(); toggleCb(); }, { passive: false });

      const bub = document.createElement('div');
      bub.className = 'bubble';

      const hdr = document.createElement('div'); hdr.className = 'bubble-header';
      if (m.category) {
        const cat = document.createElement('span'); cat.className = 'bubble-cat'; cat.textContent = m.category;
        hdr.appendChild(cat);
      }
      const star = document.createElement('span');
      star.className = 'bubble-star' + (m.important ? ' on' : ''); star.textContent = '★';
      async function doStar(e) {
        e.stopPropagation(); if (drag.active) return;
        m.important = !m.important; star.classList.toggle('on', m.important);
        await fetch('/api/memo', {
          method: 'PATCH', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ pageId: m.id, important: m.important }),
        });
      }
      star.addEventListener('click', doStar);
      star.addEventListener('touchstart', e => { e.preventDefault(); e.stopPropagation(); doStar(e); }, { passive: false });

      const time = document.createElement('span'); time.className = 'bubble-time'; time.textContent = formatTime(m.createdAt);
      hdr.appendChild(star); hdr.appendChild(time);
      bub.appendChild(hdr);

      const textNode = makeTextNode(m.text);

      if (!deleteMode) {
        const dragArea = document.createElement('div');
        dragArea.className = 'bubble-drag-area';
        dragArea.appendChild(textNode);

        dragArea.addEventListener('touchstart', e => {
          const t = e.touches[0];
          drag.memo = m; drag.active = false;
          drag.startX = t.clientX; drag.startY = t.clientY;
        }, { passive: true });

        dragArea.addEventListener('touchmove', e => {
          if (!drag.memo || drag.memo.id !== m.id) return;
          const t = e.touches[0];
          const dist = Math.hypot(t.clientX - drag.startX, t.clientY - drag.startY);
          if (!drag.active && dist > DRAG_THRESHOLD) drag.active = true;
          if (drag.active) { e.preventDefault(); updateFolderHighlight(t.clientX, t.clientY); }
        }, { passive: false });

        dragArea.addEventListener('touchend', e => {
          if (!drag.memo || drag.memo.id !== m.id) return;
          e.preventDefault();
          const t = e.changedTouches[0];
          const cx = t.clientX, cy = t.clientY;
          const wasDragging = drag.active;
          cleanupDrag();
          if (wasDragging) {
            const target = getFolderAt(cx, cy);
            if (!target) return;
            if (target === 'DIARY') { submitRoute(m, 'DIARY', {}); return; }
            showDropPopup(target, m, cx, cy);
          } else {
            showDropPopup(m.category || 'ETC', m, cx, cy);
          }
        }, { passive: false });

        dragArea.addEventListener('mousedown', e => {
          if (e.button !== 0) return;
          drag.memo = m; drag.active = false;
          drag.startX = e.clientX; drag.startY = e.clientY;
          function onMove(ev) {
            const dist = Math.hypot(ev.clientX - drag.startX, ev.clientY - drag.startY);
            if (!drag.active && dist > DRAG_THRESHOLD) drag.active = true;
            if (drag.active) updateFolderHighlight(ev.clientX, ev.clientY);
          }
          function onUp(ev) {
            document.removeEventListener('mousemove', onMove);
            document.removeEventListener('mouseup', onUp);
            if (!drag.memo || drag.memo.id !== m.id) { cleanupDrag(); return; }
            const cx = ev.clientX, cy = ev.clientY;
            const wasDragging = drag.active;
            cleanupDrag();
            if (wasDragging) {
              const target = getFolderAt(cx, cy);
              if (!target) return;
              if (target === 'DIARY') { submitRoute(m, 'DIARY', {}); return; }
              showDropPopup(target, m, cx, cy);
            } else {
              showDropPopup(m.category || 'ETC', m, cx, cy);
            }
          }
          document.addEventListener('mousemove', onMove);
          document.addEventListener('mouseup', onUp);
        });

        bub.appendChild(dragArea);
      } else {
        bub.appendChild(textNode);
      }

      row.appendChild(cb); row.appendChild(bub);
      return row;
    }

    function updateFolderHighlight(x, y) {
      document.querySelectorAll('.folder-target').forEach(f => {
        const r = f.getBoundingClientRect();
        f.classList.toggle('drag-over', x >= r.left && x <= r.right && y >= r.top && y <= r.bottom);
      });
    }

    function getFolderAt(x, y) {
      for (const f of document.querySelectorAll('.folder-target')) {
        const r = f.getBoundingClientRect();
        if (x >= r.left && x <= r.right && y >= r.top && y <= r.bottom) return f.dataset.target;
      }
      return null;
    }

    function cleanupDrag() {
      document.querySelectorAll('.folder-target').forEach(f => f.classList.remove('drag-over'));
      drag.memo = null; drag.active = false;
    }

    /* ── 폴더 이동 팝업 ── */
    const backdrop = document.getElementById('popup-backdrop');
    const dropPopup = document.getElementById('drop-popup');

    function closePopup() {
      dropPopup.classList.remove('visible');
      dropPopup.style.display = '';
      backdrop.classList.remove('visible');
      pendingDrop = null;
    }

    backdrop.addEventListener('click', closePopup);
    dropPopup.addEventListener('touchstart', e => { e.stopPropagation(); }, { passive: true });

    addTap(document.getElementById('drop-close'), closePopup);
    addTap(document.getElementById('drop-cancel'), closePopup);

    function updateDropForm(folder) {
      const hasExtra = ['IDEA', 'TO-DO', 'CART', 'BOOKMARK'].includes(folder);
      document.getElementById('drop-divider').style.display    = hasExtra ? 'block' : 'none';
      document.getElementById('drop-form-idea').style.display     = folder === 'IDEA'     ? 'block' : 'none';
      document.getElementById('drop-form-todo').style.display     = folder === 'TO-DO'    ? 'block' : 'none';
      document.getElementById('drop-form-cart').style.display     = folder === 'CART'     ? 'block' : 'none';
      document.getElementById('drop-form-bookmark').style.display = folder === 'BOOKMARK' ? 'block' : 'none';
    }

    document.getElementById('drop-folder').addEventListener('change', e => updateDropForm(e.target.value));

    function showDropPopup(initialFolder, memo, x, y) {
      pendingDrop = { memo };
      document.getElementById('drop-folder').value = initialFolder;
      document.getElementById('drop-todo-memo').value = '';
      document.getElementById('drop-todo-due').value = '';
      document.getElementById('drop-bookmark-title').value = '';
      document.getElementById('drop-bookmark-link').value = '';
      updateDropForm(initialFolder);

      backdrop.classList.add('visible');
      dropPopup.style.display = 'block';
      const pw = dropPopup.offsetWidth || 210, ph = dropPopup.offsetHeight || 170;
      const vw = window.innerWidth, vh = window.innerHeight;
      dropPopup.style.left = Math.max(8, Math.min(x - pw / 2, vw - pw - 8)) + 'px';
      dropPopup.style.top  = Math.max(8, Math.min(y + 12, vh - ph - 8)) + 'px';
      dropPopup.classList.add('visible');
    }

    let _submitting = false;

    async function handleOk() {
      if (_submitting || !pendingDrop) return;
      _submitting = true;

      const { memo } = pendingDrop;
      const target = document.getElementById('drop-folder').value;
      const opts = {};
      if (target === 'IDEA')     opts.ideaArea      = document.getElementById('drop-idea-area').value;
      if (target === 'TO-DO') {
        opts.todoMemo = document.getElementById('drop-todo-memo').value.trim() || null;
        opts.dueDate  = document.getElementById('drop-todo-due').value || null;
      }
      if (target === 'CART')     opts.cartType      = document.getElementById('drop-cart-type').value;
      if (target === 'BOOKMARK') {
        const title = document.getElementById('drop-bookmark-title').value.trim();
        if (!title) {
          document.getElementById('drop-bookmark-title').focus();
          _submitting = false;
          return;
        }
        opts.bookmarkTitle = title;
        opts.bookmarkLink  = document.getElementById('drop-bookmark-link').value.trim() || null;
      }

      showToast(target + ' 저장 중...', 'pending');
      closePopup();

      await submitRoute(memo, target, opts);
      _submitting = false;
    }

    const dropOk = document.getElementById('drop-ok');
    dropOk.addEventListener('touchstart', e => {
      e.preventDefault();
      e.stopPropagation();
      handleOk();
    }, { passive: false });
    dropOk.addEventListener('click', e => {
      e.stopPropagation();
      handleOk();
    });

    async function submitRoute(memo, target, opts) {
      try {
        const r = await fetch('/api/memo-route', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ memoId: memo.id, text: memo.text, target, ...opts }),
        });
        const d = await r.json();
        if (!r.ok) throw new Error(d.error || `HTTP ${r.status}`);
        memo.category = target;
        renderMemos();
        hideToast();
        showToast(target + ' 저장됨 ✓', 'ok');
      } catch (err) {
        showToast('오류: ' + err.message, 'err');
      }
    }

    function escHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
  </script>
</body>
</html>
